site_name: dbx
site_description: A pragmatic database backup and restore CLI for PostgreSQL and MySQL.
site_url: https://steig.github.io/dbx/
repo_url: https://github.com/steig/dbx
repo_name: steig/dbx
edit_uri: edit/main/docs/

# Internal design plans live in docs/plans/ for working context but don't
# belong on the public docs site. requirements.txt is a build-time dep,
# not docs content.
exclude_docs: |
  plans/
  requirements.txt

copyright: Copyright &copy; 2026 Tom Steigerwald &middot; <a href="https://github.com/steig/dbx/blob/main/LICENSE">MIT</a>

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - announce.dismiss
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - navigation.instant.progress
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - toc.follow
  icon:
    logo: material/database-export
    repo: fontawesome/brands/github
    edit: material/pencil

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/steig/dbx
      name: dbx on GitHub
  generator: false

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Getting started:
      - Install: install.md
      - Quick start: quick-start.md
      - Configuration: configuration.md
      - Interactive wizards: wizards.md
  - Using dbx:
      - Backup: backup.md
      - Restore: restore.md
      - Post-restore hooks: post-restore-hooks.md
      - Subsetting dev clones: subsetting.md
      - Encryption: encryption.md
      - Credential storage: credentials.md
      - Cloud storage: storage.md
      - Scheduled backups: scheduling.md
      - Notifications: notifications.md
  - Reference: reference.md
