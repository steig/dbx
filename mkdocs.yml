site_name: dbx
site_description: A pragmatic database backup and restore CLI for PostgreSQL and MySQL.
site_url: https://steig.github.io/dbx/
repo_url: https://github.com/steig/dbx
repo_name: steig/dbx
edit_uri: edit/main/docs/

# Internal design plans live in docs/plans/ for working context but don't
# belong on the public docs site. requirements.txt is a build-time dep,
# not docs content.
exclude_docs: |
  plans/
  requirements.txt

copyright: Copyright &copy; 2026 Tom Steigerwald &middot; <a href="https://github.com/steig/dbx/blob/main/LICENSE">MIT</a>

theme:
  name: material
  custom_dir: .mkdocs
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - announce.dismiss
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - navigation.instant.progress
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - toc.follow
  icon:
    logo: material/database-export
    repo: fontawesome/brands/github
    edit: material/pencil

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/steig/dbx
      name: dbx on GitHub
  generator: false
  analytics:
    provider: custom
    # POSTHOG_API_KEY is set as a GitHub Actions repo variable + threaded
    # through the docs.yml workflow env. Empty default means local builds
    # without the var skip the snippet entirely (no analytics in preview).
    posthog_key: !ENV [POSTHOG_API_KEY, ""]
    posthog_host: https://us.i.posthog.com
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/thumb-up-outline
          name: This page was helpful
          data: 1
          note: >-
            Thanks! Your feedback helps us prioritize what to improve.
        - icon: material/thumb-down-outline
          name: This page could be improved
          data: 0
          note: >-
            Thanks for letting us know. If you have a specific suggestion,
            <a href="https://github.com/steig/dbx/issues/new?labels=docs&title=Docs+feedback%3A+" target="_blank" rel="noopener">open a docs issue on GitHub</a> —
            we read every one.
  consent:
    title: Cookies & analytics
    description: >-
      We use <a href="https://posthog.com" target="_blank" rel="noopener">PostHog</a>
      to understand which docs pages are useful and where readers get stuck.
      No session recording, no third-party ad networks, no cross-site tracking.
      You can opt out below — your choice is stored locally and respected on
      every page load. The site works identically either way.
    actions:
      - accept
      - reject
      - manage
    cookies:
      analytics:
        name: PostHog (anonymous pageview analytics)
        checked: true

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ['.', 'docs']
      check_paths: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Getting started:
      - Install: install.md
      - Quick start: quick-start.md
      - Configuration: configuration.md
      - Config builder: config-builder.md
      - Interactive wizards: wizards.md
      - Persistent wizard (serve): serve.md
  - Using dbx:
      - Backup: backup.md
      - Restore: restore.md
      - Verifying backups: verifying-backups.md
      - Post-restore hooks: post-restore-hooks.md
      - PII scrub: scrub.md
      - AI restore prep: restore-prep.md
      - Subsetting dev clones: subsetting.md
      - Encryption: encryption.md
      - Credential storage: credentials.md
      - Cloud storage: storage.md
      - Scheduled backups: scheduling.md
      - Notifications: notifications.md
  - Reference: reference.md
