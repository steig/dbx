<!--
  Analyze view fragment. Loaded by `dbx wizard` only.

  Wraps `dbx analyze <host>/<db> --json` so the user can see what's
  actually in their database from the wizard — per-table row count +
  total size, totals, and a dictionary-based PII pre-scan. Same data
  the CLI's interactive view shows, in a stable browser table.

  Hosts + databases come from the existing /api/config endpoint so the
  picker reflects whatever the user has in their config.json.
-->
<style>
  .analyze-piinum { color: var(--amber); }
  .analyze-diag {
    margin-top: 12px;
    font-family: var(--mono);
    font-size: 12.5px;
    white-space: pre-wrap;
    max-height: 200px;
    overflow-y: auto;
  }
  .analyze-piicell { display: flex; flex-wrap: wrap; gap: 6px; }
</style>

<div x-data="dbxAnalyze()" x-init="init()">
  <div class="page-head">
    <div>
      <p class="page-title">Insights</p>
      <h1 class="page-h1">Analyze</h1>
      <p class="page-sub">Table sizes and a pre-scan for personal data.</p>
    </div>
    <div class="head-actions">
      <select aria-label="Host and database" style="width:auto;"
              x-model="hostdb" @change="onHostDbChange()">
        <option value="">(pick a host / database)</option>
        <template x-for="h in hosts" :key="h.alias">
          <template x-if="(h.databases || []).length > 0">
            <optgroup :label="h.alias">
              <template x-for="db in h.databases" :key="h.alias + '/' + db">
                <option :value="h.alias + '/' + db"
                        x-text="h.alias + ' / ' + db"></option>
              </template>
            </optgroup>
          </template>
        </template>
      </select>
      <label class="check">
        <input type="checkbox" x-model="skipPii">
        Skip PII
      </label>
      <button class="btn btn--ghost" @click="runAnalyze()"
              :disabled="!host || !database || running">
        <span x-show="!running">Re-scan</span>
        <span x-show="running">Scanning…</span>
      </button>
    </div>
  </div>

  <template x-if="error">
    <div class="note note--danger" x-text="error"></div>
  </template>

  <template x-if="!result && !running && !error">
    <div class="empty">
      <div class="empty__title">No scan yet</div>
      Pick a host + database, then click <strong>Re-scan</strong>.
      Requires docker — the CLI queries the source host's
      <code>information_schema</code> (or <code>pg_stat_user_tables</code>)
      to get the per-table stats.
    </div>
  </template>

  <template x-if="result">
    <div>
      <!-- STAT TILES -->
      <div class="tiles" style="margin-bottom:18px;">
        <div class="tile">
          <div class="tile__label">Tables</div>
          <div class="tile__value" x-text="formatInt(result.totals.tables)"></div>
          <div class="tile__meta" x-text="hostdb || (host + ' / ' + database)"></div>
        </div>
        <div class="tile">
          <div class="tile__label">Rows</div>
          <div class="tile__value" x-text="formatInt(result.totals.rows)"></div>
          <div class="tile__meta">across all tables</div>
        </div>
        <div class="tile">
          <div class="tile__label">Size</div>
          <div class="tile__value" x-text="formatBytes(result.totals.size_bytes)"></div>
          <div class="tile__meta">on disk, uncompressed</div>
        </div>
        <div class="tile">
          <div class="tile__label">PII columns</div>
          <div class="tile__value">
            <span class="analyze-piinum" x-text="piiColumnCount()"></span>
          </div>
          <div class="tile__meta"
               x-text="`in ${(result.pii || []).length} table${(result.pii || []).length === 1 ? '' : 's'}`"></div>
        </div>
      </div>

      <!-- PII SUMMARY -->
      <template x-if="(result.pii || []).length > 0">
        <div class="card">
          <div class="card__head">
            <div>
              <div class="card__title">Personal data found</div>
              <div class="card__hint">heuristic pre-scan</div>
            </div>
          </div>
          <div class="note note--info">
            We flagged
            <strong x-text="`${piiColumnCount()} column${piiColumnCount() === 1 ? '' : 's'}`"></strong>
            across
            <strong x-text="`${(result.pii || []).length} table${(result.pii || []).length === 1 ? '' : 's'}`"></strong>
            that look like personal data. Flagged columns can be added to your
            Scrub rules so they're masked on restore.
            <a @click="$store.dbx.view = 'scrub'" style="cursor:pointer;">Add to scrub rules →</a>
          </div>
          <template x-if="result.stderr">
            <div class="note note--warn analyze-diag"><span x-text="result.stderr"></span></div>
          </template>
        </div>
      </template>

      <!-- TABLES -->
      <div class="section-title">Tables</div>

      <div class="toolbar">
        <div class="search">
          <input type="search" x-model="filter" placeholder="Filter by table name…">
        </div>
        <span class="muted" x-text="filteredCountLabel()"></span>
        <span class="spacer"></span>
        <span style="font-size:12.5px;"
              :class="excludeDirty ? 'pill pill--accent' : 'muted'"
              x-text="saveMsg || excludeStatusLabel()"></span>
        <button class="btn btn--primary btn--sm" @click="saveExclusions()"
                :disabled="saving || !excludeDirty"
                title="Write the checked tables to this database's exclude_data (schema kept, row data skipped on backup)">
          <span x-show="!saving">Save exclusions</span>
          <span x-show="saving">Saving…</span>
        </button>
      </div>

      <div class="card card--flush">
        <table class="tbl">
          <thead>
            <tr>
              <th style="width:1%; white-space:nowrap;"
                  title="Check to dump schema only (no row data) for this table">Skip&nbsp;data</th>
              <th @click="setSort('name')" style="cursor:pointer;">
                Table <span x-show="sortKey === 'name'" x-text="sortDir === 'asc' ? '▲' : '▼'"></span>
              </th>
              <th @click="setSort('rows')" class="num" style="cursor:pointer;">
                Rows <span x-show="sortKey === 'rows'" x-text="sortDir === 'asc' ? '▲' : '▼'"></span>
              </th>
              <th @click="setSort('size_bytes')" class="num" style="cursor:pointer;">
                Size <span x-show="sortKey === 'size_bytes'" x-text="sortDir === 'asc' ? '▲' : '▼'"></span>
              </th>
              <th>Possible PII</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="t in sortedRows()" :key="t.name">
              <tr>
                <td style="text-align:center;">
                  <input type="checkbox" x-model="t._exclude" @change="saveMsg = ''"
                         :title="`Skip row data for ${t.name} on backup (schema kept)`">
                </td>
                <td class="mono" x-text="t.name"></td>
                <td class="num" x-text="formatInt(t.rows)"></td>
                <td class="num" x-text="formatBytes(t.size_bytes)"></td>
                <td>
                  <template x-if="piiColumnsFor(t.name).length > 0">
                    <span class="analyze-piicell">
                      <template x-for="col in piiColumnsFor(t.name)" :key="col">
                        <span class="chip chip--aging" x-text="col"></span>
                      </template>
                    </span>
                  </template>
                  <template x-if="piiColumnsFor(t.name).length === 0">
                    <span class="muted">—</span>
                  </template>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </div>
  </template>
</div>

<script>
  function dbxAnalyze() {
    return {
      hosts: [],         // [{alias, databases: [...]}]
      host: '',
      database: '',
      hostdb: '',        // combined "alias/db" bound to the head selector
      skipPii: false,
      result: null,
      running: false,
      error: '',

      saving: false,
      saveMsg: '',

      filter: '',
      sortKey: 'size_bytes',
      sortDir: 'desc',

      // Cached lookup for "does this table show up in the PII list" — drives
      // the per-row chip. Rebuilt every time result changes.
      get piiTablesSet() {
        return new Set((this.result?.pii || []).map(p => p.table));
      },

      // PII columns flagged for a given table name (empty array if none).
      piiColumnsFor(name) {
        const row = (this.result?.pii || []).find(p => p.table === name);
        return (row && row.columns) || [];
      },

      // Total count of flagged PII columns across all tables.
      piiColumnCount() {
        return (this.result?.pii || [])
          .reduce((n, p) => n + ((p.columns || []).length), 0);
      },

      get databases() {
        const h = this.hosts.find(x => x.alias === this.host);
        return (h && h.databases) || [];
      },

      init() {
        this.$watch('$store.dbx.view', (v) => { if (v === 'analyze') this.loadConfig(); });
        if (Alpine.store('dbx').view === 'analyze') this.loadConfig();
      },

      async loadConfig() {
        this.error = '';
        try {
          const r = await fetch(Alpine.store('dbx').api('/config'));
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          const cfg = await r.json();
          const hostsBlock = (cfg && cfg.hosts) || {};
          // hosts is object-keyed-by-alias; databases inside each is also
          // object-keyed. Tolerate the older array shape just in case.
          const out = [];
          if (Array.isArray(hostsBlock)) {
            for (const h of hostsBlock) {
              if (h && typeof h.alias === 'string') {
                out.push({ alias: h.alias, databases: Object.keys((h.databases || {})) });
              }
            }
          } else {
            for (const [alias, block] of Object.entries(hostsBlock)) {
              out.push({ alias, databases: Object.keys((block && block.databases) || {}) });
            }
          }
          this.hosts = out.sort((a, b) => a.alias.localeCompare(b.alias));
        } catch (e) {
          this.hosts = [];
          this.error = `Failed to load config: ${e.message || e}`;
        }
      },

      // The head selector binds a single "alias/db" string; split it back
      // into host + database so the existing analyze/save logic is unchanged.
      onHostDbChange() {
        const v = this.hostdb || '';
        const i = v.indexOf('/');
        if (i === -1) { this.host = ''; this.database = ''; }
        else { this.host = v.slice(0, i); this.database = v.slice(i + 1); }
        this.result = null;
        this.error = '';
      },

      onHostChange() {
        // Reset database selection when host changes. If the new host has
        // exactly one database, pre-select it for convenience.
        const dbs = this.databases;
        this.database = (dbs.length === 1) ? dbs[0] : '';
        this.result = null;
        this.error = '';
      },

      async runAnalyze() {
        if (!this.host || !this.database) return;
        this.running = true;
        this.error = '';
        this.result = null;
        try {
          const r = await fetch(Alpine.store('dbx').api('/analyze'), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              host: this.host,
              database: this.database,
              no_pii_scan: this.skipPii,
            }),
          });
          const body = await r.json();
          if (!r.ok) {
            // Surface the CLI's stderr verbatim — usually identifies
            // the docker / credential / network issue in plain English.
            this.error = body.error
              ? `${body.error}${body.stderr ? '\n\n' + body.stderr : ''}`
              : `HTTP ${r.status}`;
            return;
          }
          // Seed the per-row checkbox from the CLI's `excluded` flag (which it
          // derives from the current config.exclude_data) BEFORE assigning
          // result, so the property exists when Alpine makes the rows reactive.
          // `excluded` stays the saved baseline; `_exclude` is the live edit.
          for (const t of (body.tables || [])) t._exclude = !!t.excluded;
          this.result = body;
          this.saveMsg = '';
        } catch (e) {
          this.error = `dbx analyze failed: ${e.message || e}`;
        } finally {
          this.running = false;
        }
      },

      // --- exclude_data builder -------------------------------------------
      excludeCount() {
        return (this.result?.tables || []).filter(t => t._exclude).length;
      },

      // Dirty when any row's live checkbox differs from its saved baseline.
      get excludeDirty() {
        return (this.result?.tables || []).some(t => !!t._exclude !== !!t.excluded);
      },

      excludeStatusLabel() {
        if (!this.result) return '';
        const n = this.excludeCount();
        const base = `${n} table${n === 1 ? '' : 's'} skip data`;
        return this.excludeDirty ? `${base} • unsaved` : base;
      },

      async saveExclusions() {
        if (!this.host || !this.database || !this.excludeDirty) return;
        this.saving = true;
        this.saveMsg = '';
        this.error = '';
        try {
          const tables = (this.result.tables || [])
            .filter(t => t._exclude).map(t => t.name).sort();
          const r = await fetch(Alpine.store('dbx').api('/analyze/exclude'), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ host: this.host, database: this.database, exclude_data: tables }),
          });
          const body = await r.json().catch(() => ({}));
          if (!r.ok) {
            this.error = body.error || `HTTP ${r.status}`;
            return;
          }
          // Promote the live edits to the saved baseline so excludeDirty
          // clears and a re-run of analyze would agree with what's on disk.
          for (const t of (this.result.tables || [])) t.excluded = !!t._exclude;
          this.saveMsg = tables.length
            ? `Saved — ${tables.length} table${tables.length === 1 ? '' : 's'} set to schema-only.`
            : 'Saved — data included for all tables.';
        } catch (e) {
          this.error = `Save failed: ${e.message || e}`;
        } finally {
          this.saving = false;
        }
      },

      setSort(key) {
        if (this.sortKey === key) {
          this.sortDir = this.sortDir === 'asc' ? 'desc' : 'asc';
        } else {
          this.sortKey = key;
          // Default direction by data type — strings ascending, numbers descending.
          this.sortDir = (key === 'name') ? 'asc' : 'desc';
        }
      },

      sortedRows() {
        const rows = (this.result?.tables || []).slice();
        const f = this.filter.trim().toLowerCase();
        const filtered = f ? rows.filter(r => (r.name || '').toLowerCase().includes(f)) : rows;
        const dir = this.sortDir === 'asc' ? 1 : -1;
        const key = this.sortKey;
        filtered.sort((a, b) => {
          const av = a[key], bv = b[key];
          if (av < bv) return -1 * dir;
          if (av > bv) return  1 * dir;
          return 0;
        });
        return filtered;
      },

      filteredCountLabel() {
        if (!this.result) return '';
        const total = (this.result.tables || []).length;
        const shown = this.sortedRows().length;
        if (!this.filter || shown === total) return `${total} table${total === 1 ? '' : 's'}`;
        return `${shown} of ${total} matching`;
      },

      pctOfLargest(bytes) {
        const tables = this.result?.tables || [];
        if (!tables.length) return 0;
        const max = Math.max(...tables.map(t => t.size_bytes || 0));
        if (!max) return 0;
        return Math.min(100, (bytes / max) * 100);
      },

      formatInt(n) {
        if (n === undefined || n === null) return '—';
        return Number(n).toLocaleString();
      },

      formatBytes(n) {
        if (n === undefined || n === null) return '—';
        const v = Number(n);
        if (!Number.isFinite(v) || v < 0) return '—';
        const units = ['B', 'KB', 'MB', 'GB', 'TB'];
        let i = 0; let x = v;
        while (x >= 1024 && i < units.length - 1) { x /= 1024; i++; }
        return `${x.toFixed(i === 0 ? 0 : 1)} ${units[i]}`;
      },
    };
  }
</script>
