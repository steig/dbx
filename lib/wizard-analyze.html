<!--
  Analyze view fragment. Loaded by `dbx wizard` only.

  Wraps `dbx analyze <host>/<db> --json` (added in this PR) so the user
  can see what's actually in their database from the wizard — per-table
  row count + total size, totals, and a dictionary-based PII pre-scan.
  Same data the CLI's interactive view shows, just in a stable browser
  table instead of an fzf picker.

  Hosts + databases come from the existing /api/config endpoint so the
  picker reflects whatever the user has in their config.json. Empty-host
  / empty-database states fall back to a "configure a host first" hint.
-->
<style>
  .dbx-analyze__toolbar { display: flex; gap: 0.75rem; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
  .dbx-analyze__select, .dbx-analyze__input {
    padding: 0.375rem 0.5rem;
    border: 1px solid var(--md-default-fg-color--lighter);
    border-radius: 6px;
    background: var(--md-default-bg-color); color: var(--md-default-fg-color);
    font-size: 0.875rem;
    min-width: 180px;
  }

  .dbx-analyze__totals {
    display: flex; gap: 1.5rem; flex-wrap: wrap;
    background: var(--md-code-bg-color);
    border: 1px solid var(--md-default-fg-color--lightest);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    margin-bottom: 1rem;
  }
  .dbx-analyze__stat strong { display: block; font-size: 1.25rem; letter-spacing: -0.01em; }
  .dbx-analyze__stat small { color: var(--md-default-fg-color--light); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }

  .dbx-analyze__table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
  .dbx-analyze__table th { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 2px solid var(--md-default-fg-color--lightest); font-weight: 600; cursor: pointer; user-select: none; }
  .dbx-analyze__table th.dbx-analyze__sort-active { color: var(--md-accent-fg-color); }
  .dbx-analyze__table td { padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--md-default-fg-color--lightest); vertical-align: middle; }
  .dbx-analyze__table tbody tr:hover { background: var(--md-code-bg-color); }
  .dbx-analyze__table td.num { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
  /* Compact bar showing size relative to the largest table. */
  .dbx-analyze__bar-cell { width: 120px; }
  .dbx-analyze__bar {
    display: block; height: 6px;
    background: var(--md-accent-fg-color--transparent);
    border-radius: 3px;
    overflow: hidden;
  }
  .dbx-analyze__bar i { display: block; height: 100%; background: var(--md-accent-fg-color); border-radius: 3px; }

  .dbx-analyze__chip { display: inline-block; padding: 0.125rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
  .dbx-analyze__chip--pii      { background: rgba(196, 61, 61, 0.30); color: #8a1f1f; }
  @media (prefers-color-scheme: dark) {
    .dbx-analyze__chip--pii      { color: #ff8a8a; }
  }

  .dbx-analyze__pii-panel {
    background: var(--md-code-bg-color);
    border: 1px solid var(--md-default-fg-color--lightest);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    margin-bottom: 1rem;
  }
  .dbx-analyze__pii-panel h3 { margin: 0 0 0.5rem; font-size: 1rem; }
  /* Diagnostics panel for CLI stderr: log_step / log_warn lines that the
     server captures while running `dbx analyze --json`. Yellow-tinted so
     it's visually distinct from the red error panel — these are usually
     informational ("Scanning for PII...") rather than fatal. */
  .dbx-analyze__diag {
    background: rgba(218, 135, 33, 0.10);
    border: 1px solid rgba(218, 135, 33, 0.45);
    border-radius: 6px;
    padding: 0.5rem 0.75rem;
    margin-bottom: 1rem;
    font-family: var(--md-code-font-family);
    font-size: 0.8125rem;
    white-space: pre-wrap;
    color: var(--md-default-fg-color);
    max-height: 200px;
    overflow-y: auto;
  }
  .dbx-analyze__diag-label {
    display: block;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: #8a4c10;
    margin-bottom: 0.25rem;
  }
  @media (prefers-color-scheme: dark) {
    .dbx-analyze__diag-label { color: #ffbf6b; }
  }
  .dbx-analyze__pii-list { margin: 0; padding-left: 1.25rem; font-size: 0.875rem; }
  .dbx-analyze__pii-list code { font-size: 0.8125rem; }
  .dbx-analyze__pii-list li + li { margin-top: 0.125rem; }

  .dbx-analyze__error {
    color: #8a1f1f;
    background: rgba(196, 61, 61, 0.10);
    padding: 0.5rem 0.75rem;
    border-radius: 4px;
    margin: 0.5rem 0;
    font-size: 0.875rem;
    white-space: pre-wrap;
    font-family: var(--md-code-font-family);
  }
  .dbx-analyze__empty { padding: 2rem; text-align: center; color: var(--md-default-fg-color--light); }
  .dbx-analyze__note { color: var(--md-default-fg-color--light); font-size: 0.8125rem; margin: 0.25rem 0 0.75rem; }
</style>

<div x-data="dbxAnalyze()" x-init="init()">
  <header class="dbx-view__header">
    <h2 class="dbx-view__title">Analyze</h2>
    <p class="dbx-view__subtitle">
      Per-table row count and on-disk size for any configured database,
      plus a PII pre-scan that flags columns matching the built-in
      dictionary. Same data as <code>dbx analyze &lt;host&gt; &lt;db&gt;</code>
      on the CLI, just structured. Use it to decide what to put in
      <code>exclude_data</code> and which columns need a scrub strategy.
    </p>
  </header>

  <div class="dbx-analyze__toolbar">
    <select class="dbx-analyze__select" x-model="host" @change="onHostChange()">
      <option value="">(pick a host)</option>
      <template x-for="h in hosts" :key="h.alias">
        <option :value="h.alias" x-text="h.alias"></option>
      </template>
    </select>

    <template x-if="host && databases.length > 0">
      <select class="dbx-analyze__select" x-model="database">
        <option value="">(pick a database)</option>
        <template x-for="db in databases" :key="db">
          <option :value="db" x-text="db"></option>
        </template>
      </select>
    </template>
    <template x-if="host && databases.length === 0">
      <input type="text" class="dbx-analyze__input" x-model="database"
             placeholder="database name">
    </template>

    <label style="font-size: 0.8125rem; color: var(--md-default-fg-color--light);">
      <input type="checkbox" x-model="skipPii">
      Skip PII scan (faster)
    </label>

    <button class="dbx-backups__btn" @click="runAnalyze()"
            :disabled="!host || !database || running">
      <span x-show="!running">Run analyze</span>
      <span x-show="running">Analyzing…</span>
    </button>
  </div>

  <template x-if="error">
    <p class="dbx-analyze__error" x-text="error"></p>
  </template>

  <template x-if="!result && !running && !error">
    <p class="dbx-analyze__empty">
      Pick a host + database, then click <strong>Run analyze</strong>.
      Requires docker — the CLI queries the source host's
      <code>information_schema</code> (or <code>pg_stat_user_tables</code>)
      to get the per-table stats.
    </p>
  </template>

  <template x-if="result">
    <div>
      <div class="dbx-analyze__totals">
        <div class="dbx-analyze__stat">
          <strong x-text="formatInt(result.totals.tables)"></strong>
          <small>tables</small>
        </div>
        <div class="dbx-analyze__stat">
          <strong x-text="formatInt(result.totals.rows)"></strong>
          <small>rows</small>
        </div>
        <div class="dbx-analyze__stat">
          <strong x-text="formatBytes(result.totals.size_bytes)"></strong>
          <small>total size</small>
        </div>
        <div class="dbx-analyze__stat">
          <strong x-text="result.engine || '—'"></strong>
          <small>engine</small>
        </div>
        <div class="dbx-analyze__stat">
          <strong x-text="(result.pii || []).length"></strong>
          <small>tables with PII candidates</small>
        </div>
      </div>

      <template x-if="result.stderr">
        <div class="dbx-analyze__diag">
          <span class="dbx-analyze__diag-label">CLI diagnostics</span><span x-text="result.stderr"></span>
        </div>
      </template>

      <template x-if="(result.pii || []).length > 0">
        <div class="dbx-analyze__pii-panel">
          <h3>PII candidates</h3>
          <p class="dbx-analyze__note">
            Columns whose names match the built-in dictionary. The
            <a @click="$store.dbx.view = 'scrub'" style="cursor: pointer; color: var(--md-accent-fg-color);">Scrub view</a>
            turns these into a manifest. The pre-scan respects
            <code>dictionary.extend</code> / <code>dictionary.exclude</code>
            from the host's existing manifest (if any).
          </p>
          <ul class="dbx-analyze__pii-list">
            <template x-for="row in (result.pii || [])" :key="row.table">
              <li>
                <code x-text="row.table"></code> —
                <span x-text="(row.columns || []).join(', ')"></span>
              </li>
            </template>
          </ul>
        </div>
      </template>

      <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem;">
        <input type="search" class="dbx-analyze__input" style="flex: 1; min-width: 240px;"
               x-model="filter" placeholder="Filter by table name…">
        <span style="color: var(--md-default-fg-color--light); font-size: 0.875rem;"
              x-text="filteredCountLabel()"></span>
        <span style="font-size: 0.8125rem;"
              :style="excludeDirty ? 'color: var(--md-accent-fg-color);' : 'color: var(--md-default-fg-color--light);'"
              x-text="saveMsg || excludeStatusLabel()"></span>
        <button class="dbx-backups__btn" @click="saveExclusions()"
                :disabled="saving || !excludeDirty"
                title="Write the checked tables to this database's exclude_data (schema kept, row data skipped on backup)">
          <span x-show="!saving">Save exclusions</span>
          <span x-show="saving">Saving…</span>
        </button>
      </div>

      <table class="dbx-analyze__table">
        <thead>
          <tr>
            <th style="width: 1%; text-align: center; white-space: nowrap;"
                title="Check to dump schema only (no row data) for this table">Skip&nbsp;data</th>
            <th @click="setSort('name')"
                :class="{ 'dbx-analyze__sort-active': sortKey === 'name' }">
              Table <span x-show="sortKey === 'name'" x-text="sortDir === 'asc' ? '▲' : '▼'"></span>
            </th>
            <th @click="setSort('rows')" class="num"
                :class="{ 'dbx-analyze__sort-active': sortKey === 'rows' }">
              Rows <span x-show="sortKey === 'rows'" x-text="sortDir === 'asc' ? '▲' : '▼'"></span>
            </th>
            <th @click="setSort('size_bytes')" class="num"
                :class="{ 'dbx-analyze__sort-active': sortKey === 'size_bytes' }">
              Size <span x-show="sortKey === 'size_bytes'" x-text="sortDir === 'asc' ? '▲' : '▼'"></span>
            </th>
            <th class="dbx-analyze__bar-cell">% of total</th>
            <th>Flags</th>
          </tr>
        </thead>
        <tbody>
          <template x-for="t in sortedRows()" :key="t.name">
            <tr>
              <td style="text-align: center;">
                <input type="checkbox" x-model="t._exclude" @change="saveMsg = ''"
                       :title="`Skip row data for ${t.name} on backup (schema kept)`">
              </td>
              <td><code x-text="t.name"></code></td>
              <td class="num" x-text="formatInt(t.rows)"></td>
              <td class="num" x-text="formatBytes(t.size_bytes)"></td>
              <td class="dbx-analyze__bar-cell">
                <span class="dbx-analyze__bar">
                  <i :style="`width: ${pctOfLargest(t.size_bytes)}%`"></i>
                </span>
              </td>
              <td>
                <template x-if="piiTablesSet.has(t.name)">
                  <span class="dbx-analyze__chip dbx-analyze__chip--pii">PII</span>
                </template>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </template>
</div>

<script>
  function dbxAnalyze() {
    return {
      hosts: [],         // [{alias, databases: [...]}]
      host: '',
      database: '',
      skipPii: false,
      result: null,
      running: false,
      error: '',

      saving: false,
      saveMsg: '',

      filter: '',
      sortKey: 'size_bytes',
      sortDir: 'desc',

      // Cached lookup for "does this table show up in the PII list" — drives
      // the per-row chip. Rebuilt every time result changes.
      get piiTablesSet() {
        return new Set((this.result?.pii || []).map(p => p.table));
      },

      get databases() {
        const h = this.hosts.find(x => x.alias === this.host);
        return (h && h.databases) || [];
      },

      init() {
        this.$watch('$store.dbx.view', (v) => { if (v === 'analyze') this.loadConfig(); });
        if (Alpine.store('dbx').view === 'analyze') this.loadConfig();
      },

      async loadConfig() {
        this.error = '';
        try {
          const r = await fetch(Alpine.store('dbx').api('/config'));
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          const cfg = await r.json();
          const hostsBlock = (cfg && cfg.hosts) || {};
          // hosts is object-keyed-by-alias; databases inside each is also
          // object-keyed. Tolerate the older array shape just in case.
          const out = [];
          if (Array.isArray(hostsBlock)) {
            for (const h of hostsBlock) {
              if (h && typeof h.alias === 'string') {
                out.push({ alias: h.alias, databases: Object.keys((h.databases || {})) });
              }
            }
          } else {
            for (const [alias, block] of Object.entries(hostsBlock)) {
              out.push({ alias, databases: Object.keys((block && block.databases) || {}) });
            }
          }
          this.hosts = out.sort((a, b) => a.alias.localeCompare(b.alias));
        } catch (e) {
          this.hosts = [];
          this.error = `Failed to load config: ${e.message || e}`;
        }
      },

      onHostChange() {
        // Reset database selection when host changes. If the new host has
        // exactly one database, pre-select it for convenience.
        const dbs = this.databases;
        this.database = (dbs.length === 1) ? dbs[0] : '';
        this.result = null;
        this.error = '';
      },

      async runAnalyze() {
        if (!this.host || !this.database) return;
        this.running = true;
        this.error = '';
        this.result = null;
        try {
          const r = await fetch(Alpine.store('dbx').api('/analyze'), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              host: this.host,
              database: this.database,
              no_pii_scan: this.skipPii,
            }),
          });
          const body = await r.json();
          if (!r.ok) {
            // Surface the CLI's stderr verbatim — usually identifies
            // the docker / credential / network issue in plain English.
            this.error = body.error
              ? `${body.error}${body.stderr ? '\n\n' + body.stderr : ''}`
              : `HTTP ${r.status}`;
            return;
          }
          // Seed the per-row checkbox from the CLI's `excluded` flag (which it
          // derives from the current config.exclude_data) BEFORE assigning
          // result, so the property exists when Alpine makes the rows reactive.
          // `excluded` stays the saved baseline; `_exclude` is the live edit.
          for (const t of (body.tables || [])) t._exclude = !!t.excluded;
          this.result = body;
          this.saveMsg = '';
        } catch (e) {
          this.error = `Analyze failed: ${e.message || e}`;
        } finally {
          this.running = false;
        }
      },

      // --- exclude_data builder -------------------------------------------
      excludeCount() {
        return (this.result?.tables || []).filter(t => t._exclude).length;
      },

      // Dirty when any row's live checkbox differs from its saved baseline.
      get excludeDirty() {
        return (this.result?.tables || []).some(t => !!t._exclude !== !!t.excluded);
      },

      excludeStatusLabel() {
        if (!this.result) return '';
        const n = this.excludeCount();
        const base = `${n} table${n === 1 ? '' : 's'} skip data`;
        return this.excludeDirty ? `${base} • unsaved` : base;
      },

      async saveExclusions() {
        if (!this.host || !this.database || !this.excludeDirty) return;
        this.saving = true;
        this.saveMsg = '';
        this.error = '';
        try {
          const tables = (this.result.tables || [])
            .filter(t => t._exclude).map(t => t.name).sort();
          const r = await fetch(Alpine.store('dbx').api('/analyze/exclude'), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ host: this.host, database: this.database, exclude_data: tables }),
          });
          const body = await r.json().catch(() => ({}));
          if (!r.ok) {
            this.error = body.error || `HTTP ${r.status}`;
            return;
          }
          // Promote the live edits to the saved baseline so excludeDirty
          // clears and a re-run of analyze would agree with what's on disk.
          for (const t of (this.result.tables || [])) t.excluded = !!t._exclude;
          this.saveMsg = tables.length
            ? `Saved — ${tables.length} table${tables.length === 1 ? '' : 's'} set to schema-only.`
            : 'Saved — data included for all tables.';
        } catch (e) {
          this.error = `Save failed: ${e.message || e}`;
        } finally {
          this.saving = false;
        }
      },

      setSort(key) {
        if (this.sortKey === key) {
          this.sortDir = this.sortDir === 'asc' ? 'desc' : 'asc';
        } else {
          this.sortKey = key;
          // Default direction by data type — strings ascending, numbers descending.
          this.sortDir = (key === 'name') ? 'asc' : 'desc';
        }
      },

      sortedRows() {
        const rows = (this.result?.tables || []).slice();
        const f = this.filter.trim().toLowerCase();
        const filtered = f ? rows.filter(r => (r.name || '').toLowerCase().includes(f)) : rows;
        const dir = this.sortDir === 'asc' ? 1 : -1;
        const key = this.sortKey;
        filtered.sort((a, b) => {
          const av = a[key], bv = b[key];
          if (av < bv) return -1 * dir;
          if (av > bv) return  1 * dir;
          return 0;
        });
        return filtered;
      },

      filteredCountLabel() {
        if (!this.result) return '';
        const total = (this.result.tables || []).length;
        const shown = this.sortedRows().length;
        if (!this.filter || shown === total) return `${total} table${total === 1 ? '' : 's'}`;
        return `${shown} of ${total} matching`;
      },

      pctOfLargest(bytes) {
        const tables = this.result?.tables || [];
        if (!tables.length) return 0;
        const max = Math.max(...tables.map(t => t.size_bytes || 0));
        if (!max) return 0;
        return Math.min(100, (bytes / max) * 100);
      },

      formatInt(n) {
        if (n === undefined || n === null) return '—';
        return Number(n).toLocaleString();
      },

      formatBytes(n) {
        if (n === undefined || n === null) return '—';
        const v = Number(n);
        if (!Number.isFinite(v) || v < 0) return '—';
        const units = ['B', 'KB', 'MB', 'GB', 'TB'];
        let i = 0; let x = v;
        while (x >= 1024 && i < units.length - 1) { x /= 1024; i++; }
        return `${x.toFixed(i === 0 ? 0 : 1)} ${units[i]}`;
      },
    };
  }
</script>
