<!DOCTYPE html>
<html lang="en" data-mode="cli" data-save-url="__DBX_SAVE_URL__">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <title>dbx</title>
  <style>
    /* =====================================================================
       dbx control panel — "Calm modern SaaS" skin.
       Shared design system + component library. Every view fragment composes
       from these classes; per-fragment <style> blocks should only hold
       genuinely view-unique layout and must reference these CSS variables
       (never hardcode colors).
       ===================================================================== */
    :root {
      --bg:        #fafafa;
      --surface:   #ffffff;
      --surface-2: #f6f6f8;
      --text:      #18181b;
      --text-2:    #52525b;
      --text-3:    #9b9ba4;
      --border:    #ececef;
      --border-2:  #e2e2e6;
      --accent:    #5b5bd6;
      --accent-2:  #4f4fc9;
      --accent-weak: #f0f0fb;
      --green:     #15803d; --green-weak: #e7f6ec;
      --amber:     #b45309; --amber-weak: #fbf1de;
      --red:       #dc2626; --red-weak:   #fbe9e9;
      --blue:      #1d4ed8; --blue-weak:  #e8eefc;
      --shadow:    0 1px 2px rgba(16,16,40,.04), 0 1px 3px rgba(16,16,40,.06);
      --shadow-lg: 0 4px 16px rgba(16,16,40,.08);
      --radius:    14px;
      --radius-sm: 10px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:        #0a0a0e;
        --surface:   #131318;
        --surface-2: #17171d;
        --text:      #ededf2;
        --text-2:    #a1a1ab;
        --text-3:    #6a6a76;
        --border:    #222228;
        --border-2:  #2c2c34;
        --accent:    #8b8bf0;
        --accent-2:  #9d9df5;
        --accent-weak: #1a1a2c;
        --green:     #54c98a; --green-weak: #122a1d;
        --amber:     #f0b454; --amber-weak: #2a2113;
        --red:       #f08a8a; --red-weak:   #2a1515;
        --blue:      #8fb3ff; --blue-weak:  #16203a;
        --shadow:    none;
        --shadow-lg: none;
      }
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font); font-size: 14px; line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--accent); text-decoration: none; }

    /* ---- App shell ---- */
    .app { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }

    /* ---- Sidebar ---- */
    .side { padding: 22px 0; border-right: 1px solid var(--border); position: sticky; top: 0; align-self: start; height: 100vh; overflow-y: auto; }
    .brand { padding: 0 22px 22px; display: flex; align-items: center; gap: 10px; }
    .brand__mark { width: 30px; height: 30px; border-radius: 8px; background: linear-gradient(135deg, var(--accent), #8a6df0); display: grid; place-items: center; color: #fff; font-weight: 800; font-size: 15px; letter-spacing: -.04em; }
    .brand__name { font-weight: 700; font-size: 16px; letter-spacing: -.02em; }
    .brand__sub  { font-size: 11px; color: var(--text-3); }
    .nav__group { margin-top: 18px; padding: 0 14px; }
    .nav__label { font-size: 10.5px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--text-3); padding: 0 8px 6px; }
    .nav__item { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 7px 8px; border-radius: 8px; color: var(--text-2); font-size: 13.5px; font-weight: 500; user-select: none; text-decoration: none; }
    .nav__item:hover { background: var(--accent-weak); color: var(--text); }
    .nav__item.active { background: var(--accent-weak); color: var(--accent); font-weight: 600; }
    .nav__dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: .55; }
    .nav__badge { margin-left: auto; font-size: 11px; font-weight: 700; color: var(--red); background: var(--red-weak); padding: 1px 7px; border-radius: 999px; }

    /* ---- Main + page header ---- */
    .main { padding: 34px 40px 80px; max-width: 1080px; }
    .page-head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 26px; gap: 16px; flex-wrap: wrap; }
    .page-title { font-size: 13px; font-weight: 600; color: var(--text-3); letter-spacing: .04em; text-transform: uppercase; margin: 0 0 4px; }
    .page-h1 { font-size: 26px; font-weight: 700; letter-spacing: -.025em; margin: 0; }
    .page-sub { color: var(--text-2); margin: 6px 0 0; max-width: 64ch; }
    .head-actions { display: flex; align-items: center; gap: 12px; }
    .updated { font-size: 12.5px; color: var(--text-3); display: flex; align-items: center; gap: 7px; }
    .section-title { font-size: 13px; font-weight: 600; color: var(--text-3); letter-spacing: .04em; text-transform: uppercase; margin: 26px 0 10px; }

    /* ---- Buttons ---- */
    .btn { font: inherit; font-size: 13px; font-weight: 600; cursor: pointer; border-radius: 9px; padding: 8px 14px; border: 1px solid transparent; display: inline-flex; align-items: center; gap: 7px; }
    .btn--ghost { background: var(--surface); color: var(--text-2); border-color: var(--border-2); }
    .btn--ghost:hover { color: var(--text); border-color: var(--text-3); }
    .btn--primary { background: var(--accent); color: #fff; }
    .btn--primary:hover { background: var(--accent-2); }
    .btn--danger { background: var(--red); color: #fff; }
    .btn--danger:hover { filter: brightness(1.05); }
    .btn--sm { padding: 5px 10px; font-size: 12.5px; border-radius: 8px; }
    .btn:disabled { opacity: .45; cursor: not-allowed; }

    /* ---- Cards ---- */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 22px; box-shadow: var(--shadow); }
    .card + .card { margin-top: 14px; }
    .card__head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; gap: 12px; }
    .card__title { font-size: 14px; font-weight: 650; letter-spacing: -.01em; }
    .card__hint { font-size: 12px; color: var(--text-3); }
    .bignum { font-size: 24px; font-weight: 700; letter-spacing: -.03em; font-variant-numeric: tabular-nums; }
    .card--flush { padding: 6px 10px; }

    /* ---- Stat tiles ---- */
    .tiles { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
    .tile { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px 18px; box-shadow: var(--shadow); }
    .tile__label { font-size: 11.5px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--text-3); }
    .tile__value { font-size: 27px; font-weight: 700; letter-spacing: -.03em; margin-top: 6px; font-variant-numeric: tabular-nums; }
    .tile__meta { font-size: 12.5px; color: var(--text-3); margin-top: 2px; }
    .delta { font-weight: 600; }
    .delta--up { color: var(--green); }
    .delta--down { color: var(--red); }

    /* ---- Layout helpers ---- */
    .cols-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .cols-21 { display: grid; grid-template-columns: 1.4fr 1fr; gap: 14px; }
    .stack { display: flex; flex-direction: column; gap: 14px; }
    .row { display: flex; align-items: center; gap: 12px; }
    .spacer { margin-left: auto; }
    .muted { color: var(--text-3); }
    .mono { font-family: var(--mono); }

    /* ---- Pills / badges / dots ---- */
    .pill { font-size: 11.5px; font-weight: 600; padding: 2px 8px; border-radius: 999px; }
    .pill--up { color: var(--green); background: var(--green-weak); }
    .pill--accent { color: var(--accent); background: var(--accent-weak); }
    .badge { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 999px; letter-spacing: .02em; display: inline-flex; align-items: center; gap: 5px; }
    .badge--ok   { color: var(--green); background: var(--green-weak); }
    .badge--fail { color: var(--red);   background: var(--red-weak); }
    .badge--age  { color: var(--amber); background: var(--amber-weak); }
    .badge--info { color: var(--blue);  background: var(--blue-weak); }
    .badge--mut  { color: var(--text-2); background: var(--surface-2); }
    .sdot { width: 8px; height: 8px; border-radius: 50%; flex: none; display: inline-block; }
    .sdot--ok { background: var(--green); }
    .sdot--fail { background: var(--red); }
    .sdot--warn { background: var(--amber); }
    .sdot--run { background: var(--accent); box-shadow: 0 0 0 3px var(--accent-weak); }

    /* status chips (backup file states) */
    .chip { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11.5px; font-weight: 600; background: var(--surface-2); color: var(--text-2); }
    .chip--fresh { color: var(--green); background: var(--green-weak); }
    .chip--aging { color: var(--amber); background: var(--amber-weak); }
    .chip--stale { color: var(--red); background: var(--red-weak); }
    .chip--enc   { color: var(--accent); background: var(--accent-weak); }
    .chip--prod  { color: var(--red); background: var(--red-weak); letter-spacing:.03em; }
    .chip--stage { color: var(--amber); background: var(--amber-weak); letter-spacing:.03em; }
    .chip--complete   { color: var(--green); background: var(--green-weak); }
    .chip--incomplete { color: var(--red); background: var(--red-weak); }

    /* ---- Tables ---- */
    .tbl { width: 100%; border-collapse: collapse; font-size: 13.5px; }
    .tbl th { text-align: left; padding: 9px 12px; color: var(--text-3); font-weight: 600; font-size: 11.5px; letter-spacing: .04em; text-transform: uppercase; border-bottom: 1px solid var(--border); }
    .tbl td { padding: 11px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .tbl tbody tr:last-child td { border-bottom: none; }
    .tbl tbody tr:hover { background: var(--surface-2); }
    .tbl .num { font-variant-numeric: tabular-nums; text-align: right; }
    .tbl__actions { display: flex; gap: 6px; justify-content: flex-end; }

    /* ---- Toolbar / search / segmented ---- */
    .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .search { flex: 1; min-width: 200px; position: relative; }
    .search input { width: 100%; padding: 9px 11px 9px 32px; }
    .search::before { content: "⌕"; position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-3); font-size: 15px; }
    .seg { display: inline-flex; background: var(--surface-2); border: 1px solid var(--border-2); border-radius: 9px; padding: 2px; gap: 2px; }
    .seg button { font: inherit; font-size: 12.5px; font-weight: 600; border: none; background: transparent; color: var(--text-2); padding: 5px 11px; border-radius: 7px; cursor: pointer; }
    .seg button.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }

    /* ---- Forms ---- */
    .form-grid { display: grid; gap: 16px; max-width: 560px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field > label { font-size: 12.5px; font-weight: 600; color: var(--text-2); }
    .field .hint { font-size: 12px; color: var(--text-3); }
    input[type=text], input[type=number], input[type=password], select, textarea {
      font: inherit; font-size: 13.5px; width: 100%;
      padding: 9px 11px; border: 1px solid var(--border-2); border-radius: 9px;
      background: var(--surface); color: var(--text);
    }
    textarea { resize: vertical; min-height: 90px; font-family: var(--mono); font-size: 12.5px; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-weak); }
    .check { display: inline-flex; align-items: center; gap: 8px; font-size: 13.5px; color: var(--text-2); cursor: pointer; }
    .check input { width: auto; }
    .field-row { display: flex; gap: 12px; flex-wrap: wrap; }

    /* switch */
    .switch { position: relative; width: 36px; height: 20px; flex: none; cursor: pointer; display: inline-block; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .switch__track { position: absolute; inset: 0; background: var(--border-2); border-radius: 999px; transition: .15s; }
    .switch__track::after { content: ""; position: absolute; left: 2px; top: 2px; width: 16px; height: 16px; background: #fff; border-radius: 50%; transition: .15s; box-shadow: var(--shadow); }
    .switch input:checked + .switch__track { background: var(--accent); }
    .switch input:checked + .switch__track::after { transform: translateX(16px); }

    /* ---- Console / live log ---- */
    .console { background: #0e0f13; color: #d6d9e0; font-family: var(--mono); font-size: 12.5px; line-height: 1.65; padding: 14px 16px; border-radius: var(--radius-sm); max-height: 360px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; border: 1px solid var(--border-2); }
    @media (prefers-color-scheme: dark) { .console { background: #06070a; } }
    .console__line--ok   { color: #7ee0a6; }
    .console__line--warn { color: #f0c069; }
    .console__line--err  { color: #f29393; }
    .console__line--dim  { color: #6a6f7d; }
    .console__cursor { display:inline-block; width:8px; height:14px; background:#7ee0a6; vertical-align:-2px; animation: blink 1s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    /* live-job status strip */
    .jobbar { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); margin-bottom: 12px; }
    .jobbar__status { font-weight: 650; }
    .progress { flex: 1; height: 7px; background: var(--surface-2); border-radius: 999px; overflow: hidden; }
    .progress__bar { height: 100%; background: var(--accent); border-radius: 999px; }
    .elapsed { font-variant-numeric: tabular-nums; color: var(--text-2); font-size: 13px; }

    /* ---- Callouts ---- */
    .note { border: 1px solid var(--border); border-left-width: 3px; border-radius: var(--radius-sm); padding: 12px 14px; font-size: 13px; color: var(--text-2); background: var(--surface); }
    .note strong { color: var(--text); }
    .note--warn   { border-left-color: var(--amber); background: var(--amber-weak); color: var(--amber); }
    .note--danger { border-left-color: var(--red);   background: var(--red-weak);   color: var(--red); }
    .note--info   { border-left-color: var(--blue);  background: var(--blue-weak);  color: var(--blue); }

    /* ---- Empty state ---- */
    .empty { padding: 48px 20px; text-align: center; color: var(--text-3); border: 1px dashed var(--border-2); border-radius: var(--radius); }
    .empty__title { font-size: 15px; font-weight: 600; color: var(--text-2); margin-bottom: 4px; }

    /* ---- Charts + misc ---- */
    .chart { width: 100%; display: block; }
    .kv { display: grid; grid-template-columns: auto 1fr; gap: 6px 18px; font-size: 13px; }
    .kv dt { color: var(--text-3); }
    .kv dd { margin: 0; text-align: right; font-variant-numeric: tabular-nums; }
    .divider { height: 1px; background: var(--border); margin: 14px 0; border: none; }
  </style>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <script>
    // Shared app state lives here so child views (Backups / Restore) can
    // coordinate without prop-drilling. Read by every view via $store.dbx.
    document.addEventListener('alpine:init', () => {
      const token = new URLSearchParams(window.location.search).get('token') || '';
      // #123: the token only rode in on the URL to bootstrap the HttpOnly
      // session cookie the server set on this page load. Scrub it from the
      // address bar / history so it stops leaking; the cookie authenticates
      // every request from here on (api() sends an empty token, ignored).
      if (token && window.history && window.history.replaceState) {
        window.history.replaceState(null, '', window.location.pathname + window.location.hash);
      }
      Alpine.store('dbx', {
        view: 'dashboard',
        token,
        api(path) { return `/api${path}?token=${this.token}`; },
        selectedBackup: null,   // populated by Backups view, read by Restore view (PR-1 follow-up)
        // Dashboard cards set this to "host/db" before flipping to the
        // Backups view; the Backups view consumes + clears it on mount so
        // back/forward navigation doesn't re-apply a stale filter.
        backupFilter: '',
        // Restore view: 'quick' (single-form, default for power users) or
        // 'guided' (3-step source→target→confirm wizard). Persisted here
        // so the user's choice survives navigating away + back.
        restoreMode: 'quick',

        // Valid section slugs, used for #hash routing in init() below.
        views: ['dashboard','backup','restore','backups','runs','config','schedule','vault','scrub','storage','analyze'],

        // Mirror `view` <-> the URL hash so every section has a shareable slug
        // (#restore, #config, …), the browser back/forward buttons navigate
        // between sections, and a reload / deep link lands on the right one.
        // `view` stays the single source of truth: nav clicks AND programmatic
        // view changes (dashboard quick-links, etc.) both reflect into the hash.
        init() {
          const slugOf = () => (window.location.hash || '').replace(/^#/, '');
          const valid = (s) => this.views.includes(s);
          const initial = slugOf();
          if (valid(initial)) {
            this.view = initial;
          } else {
            // Reflect the default slug without adding a spurious history entry.
            history.replaceState(null, '', '#' + this.view);
          }
          // hash -> view (back/forward, manual edits, deep links)
          window.addEventListener('hashchange', () => {
            const v = slugOf();
            if (valid(v) && v !== this.view) this.view = v;
          });
          // view -> hash (push, so each navigation is its own history entry)
          Alpine.effect(() => {
            const slug = this.view;
            if (slug && slugOf() !== slug) window.location.hash = slug;
          });
        },
      });
    });
  </script>
</head>
<body>
  <div class="app">
    <aside class="side">
      <div class="brand">
        <div class="brand__mark">d</div>
        <div>
          <div class="brand__name">dbx</div>
          <div class="brand__sub">control panel</div>
        </div>
      </div>

      <nav x-data>
        <div class="nav__group">
          <a class="nav__item" :class="{active: $store.dbx.view === 'dashboard'}" @click="$store.dbx.view = 'dashboard'"><span class="nav__dot"></span> Overview</a>
        </div>
        <div class="nav__group">
          <div class="nav__label">Operate</div>
          <a class="nav__item" :class="{active: $store.dbx.view === 'backup'}"  @click="$store.dbx.view = 'backup'"><span class="nav__dot"></span> Backup</a>
          <a class="nav__item" :class="{active: $store.dbx.view === 'restore'}" @click="$store.dbx.view = 'restore'"><span class="nav__dot"></span> Restore</a>
          <a class="nav__item" :class="{active: $store.dbx.view === 'backups'}" @click="$store.dbx.view = 'backups'"><span class="nav__dot"></span> Backups</a>
          <a class="nav__item" :class="{active: $store.dbx.view === 'runs'}"    @click="$store.dbx.view = 'runs'"><span class="nav__dot"></span> Runs</a>
        </div>
        <div class="nav__group">
          <div class="nav__label">Configure</div>
          <a class="nav__item" :class="{active: $store.dbx.view === 'config'}"   @click="$store.dbx.view = 'config'"><span class="nav__dot"></span> Hosts &amp; databases</a>
          <a class="nav__item" :class="{active: $store.dbx.view === 'schedule'}" @click="$store.dbx.view = 'schedule'"><span class="nav__dot"></span> Schedule</a>
          <a class="nav__item" :class="{active: $store.dbx.view === 'vault'}"    @click="$store.dbx.view = 'vault'"><span class="nav__dot"></span> Vault</a>
          <a class="nav__item" :class="{active: $store.dbx.view === 'scrub'}"    @click="$store.dbx.view = 'scrub'"><span class="nav__dot"></span> Scrub rules</a>
        </div>
        <div class="nav__group">
          <div class="nav__label">Insights</div>
          <a class="nav__item" :class="{active: $store.dbx.view === 'storage'}" @click="$store.dbx.view = 'storage'"><span class="nav__dot"></span> Storage</a>
          <a class="nav__item" :class="{active: $store.dbx.view === 'analyze'}" @click="$store.dbx.view = 'analyze'"><span class="nav__dot"></span> Analyze</a>
        </div>
      </nav>
    </aside>
    <main class="main">
      <section x-data x-show="$store.dbx.view === 'dashboard'">
        <!-- __DBX_DASHBOARD_FRAGMENT__ -->
      </section>
      <section x-data x-show="$store.dbx.view === 'config'">
        <!-- __DBX_FORM_FRAGMENT__ -->
      </section>
      <section x-data x-show="$store.dbx.view === 'backup'">
        <!-- __DBX_BACKUP_FRAGMENT__ -->
      </section>
      <section x-data x-show="$store.dbx.view === 'backups'">
        <!-- __DBX_BACKUPS_FRAGMENT__ -->
      </section>
      <section x-data x-show="$store.dbx.view === 'runs'">
        <!-- __DBX_RUNS_FRAGMENT__ -->
      </section>
      <section x-data x-show="$store.dbx.view === 'restore'">
        <!-- __DBX_RESTORE_FRAGMENT__ -->
      </section>
      <section x-data x-show="$store.dbx.view === 'vault'">
        <!-- __DBX_VAULT_FRAGMENT__ -->
      </section>
      <section x-data x-show="$store.dbx.view === 'scrub'">
        <!-- __DBX_SCRUB_FRAGMENT__ -->
      </section>
      <section x-data x-show="$store.dbx.view === 'analyze'">
        <!-- __DBX_ANALYZE_FRAGMENT__ -->
      </section>
      <section x-data x-show="$store.dbx.view === 'schedule'">
        <!-- __DBX_SCHEDULE_FRAGMENT__ -->
      </section>
      <section x-data x-show="$store.dbx.view === 'storage'">
        <!-- __DBX_STORAGE_FRAGMENT__ -->
      </section>
    </main>
  </div>
</body>
</html>
