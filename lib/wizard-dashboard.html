<!--
  Dashboard view fragment. Loaded by `dbx wizard` only (NOT embedded in mkdocs).
  This is the wizard's landing tab — the first thing the user sees when they
  open the control panel. Goal: surface backups that are at risk (stale or
  failing) before the user has to dig through Backups/Runs to find out.

  Reads /api/dashboard, which composes data from DATA_DIR + audit.log +
  config.json schedules into a single payload — see lib/wizard-server.py's
  compute_dashboard() for the shape.

  Refreshes on tab entry. Clicking a card/row jumps to the Backups view
  filtered to that host/db via $store.dbx.backupFilter (read by
  wizard-backups.html on its next render).

  Skin: shared "Calm modern SaaS" classes (card / tile / badge / sdot / btn …)
  defined in the shell (wizard.html). The only per-view CSS below is layout
  unique to the hero/donut + the restyled "Test connection" log panel, all in
  terms of shared CSS vars.
-->
<style>
  /* hero band: donut + headline + CTA on one row, wraps on narrow widths */
  .dbx-dash__hero { display: flex; align-items: center; gap: 22px; margin-bottom: 18px; flex-wrap: wrap; }
  .dbx-dash__hero-body { flex: 1; min-width: 260px; }
  .dbx-dash__hero-eyebrow { font-size: 12px; font-weight: 600; letter-spacing: .03em; text-transform: uppercase; }
  .dbx-dash__hero-eyebrow--ok { color: var(--green); }
  .dbx-dash__hero-eyebrow--warn { color: var(--amber); }
  .dbx-dash__hero-eyebrow--bad { color: var(--red); }
  .dbx-dash__hero-title { font-size: 22px; font-weight: 700; letter-spacing: -.02em; margin: 3px 0 5px; }
  .dbx-dash__hero-sub { color: var(--text-2); max-width: 60ch; }

  /* "Needs attention" + "Recent activity" rows reuse .row/.card from the
     shell. Per-row separators + the inline error line are the only extras. */
  .dbx-dash__att-row { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .dbx-dash__att-row:last-child { border-bottom: none; }
  .dbx-dash__err { font-family: var(--mono); font-size: 12px; color: var(--text-2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 52ch; }
  .dbx-dash__act-row { padding: 10px 0; border-bottom: 1px solid var(--border); }
  .dbx-dash__act-row:last-child { border-bottom: none; }

  /* per-card "Test connection" live log — restyled console pill */
  .dbx-dash__test-log { background: #0e0f13; color: #d6d9e0; font-family: var(--mono); font-size: 12.5px; line-height: 1.6; padding: 12px 14px; border-radius: var(--radius-sm); max-height: 22rem; overflow-y: auto; white-space: pre-wrap; word-break: break-word; border: 1px solid var(--border-2); margin-top: 10px; }
  .dbx-dash__test-log--empty { color: var(--text-3); font-style: italic; }
  @media (prefers-color-scheme: dark) { .dbx-dash__test-log { background: #06070a; } }
</style>

<div x-data="dbxDashboard()" x-init="init()">
  <div class="page-head">
    <div>
      <p class="page-title">Control panel</p>
      <h1 class="page-h1">Overview</h1>
    </div>
    <div class="head-actions">
      <span class="updated" x-show="!loading && cards.length > 0">
        <span class="sdot sdot--ok"></span>
        <span x-text="countLabel()"></span>
      </span>
      <button class="btn btn--ghost" @click="load()" :disabled="loading"
              x-text="loading ? 'Refreshing…' : 'Refresh'"></button>
      <button class="btn btn--primary" @click="$store.dbx.view = 'backup'">+ New backup</button>
    </div>
  </div>

  <template x-if="loading">
    <div class="empty">Loading…</div>
  </template>

  <template x-if="!loading && cards.length === 0">
    <div class="empty">
      <div class="empty__title">No backups yet</div>
      <div>Go to the
        <a style="cursor:pointer;" @click="$store.dbx.view = 'backup'">Backup</a>
        tab to create one.</div>
    </div>
  </template>

  <template x-if="!loading && cards.length > 0">
    <div>
      <!-- HERO STATUS: donut + headline wired to summary counts -->
      <div class="card dbx-dash__hero">
        <svg width="72" height="72" viewBox="0 0 72 72" style="flex:none;">
          <!-- track -->
          <circle cx="36" cy="36" r="30" fill="none" stroke="var(--border-2)" stroke-width="10"/>
          <!-- stale segment (red) -->
          <circle cx="36" cy="36" r="30" fill="none" stroke="var(--red)" stroke-width="10"
                  :stroke-dasharray="donutDash('stale')" :stroke-dashoffset="donutOffset('stale')"
                  transform="rotate(-90 36 36)" stroke-linecap="butt"/>
          <!-- aging segment (amber) -->
          <circle cx="36" cy="36" r="30" fill="none" stroke="var(--amber)" stroke-width="10"
                  :stroke-dasharray="donutDash('aging')" :stroke-dashoffset="donutOffset('aging')"
                  transform="rotate(-90 36 36)" stroke-linecap="butt"/>
          <!-- fresh segment (green) -->
          <circle cx="36" cy="36" r="30" fill="none" stroke="var(--green)" stroke-width="10"
                  :stroke-dasharray="donutDash('fresh')" :stroke-dashoffset="donutOffset('fresh')"
                  transform="rotate(-90 36 36)" stroke-linecap="butt"/>
          <text x="36" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="var(--text)"
                x-text="summary.fresh"></text>
          <text x="36" y="48" text-anchor="middle" font-size="9.5" fill="var(--text-3)"
                x-text="'of ' + summary.databases + ' fresh'"></text>
        </svg>
        <div class="dbx-dash__hero-body">
          <div class="dbx-dash__hero-eyebrow" :class="heroEyebrowClass()" x-text="heroEyebrow()"></div>
          <div class="dbx-dash__hero-title" x-text="heroTitle()"></div>
          <div class="dbx-dash__hero-sub" x-text="heroSub()"></div>
        </div>
        <template x-if="topRisk()">
          <button class="btn btn--primary" style="flex:none;" @click="openInBackups(topRisk())"
                  x-text="'Review ' + topRisk().host + ' / ' + topRisk().database + ' →'"></button>
        </template>
      </div>

      <!-- STAT TILES: wired to summary + derived oldest/at-risk -->
      <div class="tiles" style="margin-bottom:18px;">
        <div class="tile">
          <div class="tile__label">Backups</div>
          <div class="tile__value" x-text="summary.total_backups"></div>
          <div class="tile__meta" x-text="'across ' + summary.hosts + countLabelHosts()"></div>
        </div>
        <div class="tile">
          <div class="tile__label">On disk</div>
          <div class="tile__value" x-text="formatSize(summary.total_bytes)"></div>
          <div class="tile__meta">total backup size</div>
        </div>
        <div class="tile">
          <div class="tile__label">Databases</div>
          <div class="tile__value" x-text="summary.databases"></div>
          <div class="tile__meta" x-text="summary.hosts + countLabelHosts()"></div>
        </div>
        <div class="tile">
          <div class="tile__label">Oldest backup</div>
          <div class="tile__value" x-text="oldestAgeLabel()"></div>
          <div class="tile__meta" x-text="oldestPairLabel()"></div>
        </div>
      </div>

      <!-- TODO: trend charts need a time-series from /api/dashboard -->

      <!-- NEEDS ATTENTION: real cards filtered to non-fresh / failures -->
      <template x-if="attentionCards().length > 0">
        <div class="card" style="border-color: color-mix(in srgb, var(--amber) 35%, var(--border));">
          <div class="card__head" style="margin-bottom:4px;">
            <div class="card__title">Needs attention</div>
            <div class="card__hint" x-text="attentionCards().length + (attentionCards().length === 1 ? ' pair' : ' pairs')"></div>
          </div>

          <template x-for="c in attentionCards()" :key="c.host + '/' + c.database">
            <div class="dbx-dash__att-row">
              <div class="row">
                <template x-if="c.last_failure">
                  <span class="badge badge--fail">✕ failing</span>
                </template>
                <template x-if="!c.last_failure && c.status === 'stale'">
                  <span class="badge badge--fail">stale</span>
                </template>
                <template x-if="!c.last_failure && c.status === 'aging'">
                  <span class="badge badge--age">aging</span>
                </template>
                <div>
                  <div style="font-weight:600;">
                    <span x-text="c.host"></span>
                    <span class="muted" style="font-weight:400;" x-text="'/ ' + c.database"></span>
                  </div>
                  <template x-if="c.last_failure && c.last_failure.error">
                    <div class="dbx-dash__err" :title="c.last_failure.error"
                         x-text="c.last_failure.error + ' · ' + formatAge(c.last_failure.timestamp) + ' ago'"></div>
                  </template>
                  <template x-if="c.last_failure && !c.last_failure.error">
                    <div class="dbx-dash__err" x-text="'last failure ' + formatAge(c.last_failure.timestamp) + ' ago'"></div>
                  </template>
                  <template x-if="!c.last_failure">
                    <div class="dbx-dash__err" x-text="'last success ' + lastSuccessLabel(c) + ' ago'"></div>
                  </template>
                </div>
                <div class="spacer"></div>
                <!--
                  PR-Y4: per-card "Test connection" affordance. Wraps `dbx test
                  <host>` so the user can validate connectivity (ssh → container
                  → creds → SELECT 1) without leaving the dashboard. Restyled to
                  the shared .btn look.
                -->
                <button class="btn btn--ghost btn--sm"
                        @click="toggleTest(c)"
                        x-text="testButtonLabel(c)"></button>
                <span class="badge" :class="testBadgeClass(c)" x-show="testPillLabel(c)"
                      x-text="testPillLabel(c)"></span>
                <button class="btn btn--primary btn--sm" @click="openInBackups(c)">Back up now</button>
              </div>

              <template x-if="testState(c).expanded">
                <div class="dbx-dash__test-log"
                     :class="{ 'dbx-dash__test-log--empty': testState(c).log.length === 0 }">
                  <template x-if="testState(c).log.length === 0">
                    <span>(starting…)</span>
                  </template>
                  <template x-for="(line, i) in testState(c).log" :key="i">
                    <div x-text="line"></div>
                  </template>
                </div>
              </template>
            </div>
          </template>
        </div>
      </template>

      <template x-if="attentionCards().length === 0">
        <div class="note note--info">
          <strong>All clear.</strong> Every host / database pair has a fresh backup.
        </div>
      </template>

      <!-- RECENT ACTIVITY: derived from cards' last_success/last_failure -->
      <div class="section-title">Recent activity</div>
      <div class="card" style="padding-top:6px; padding-bottom:6px;">
        <template x-for="a in recentActivity()" :key="a.host + '/' + a.database + '/' + a.kind">
          <div class="dbx-dash__act-row row" style="cursor:pointer;" @click="openInBackups(a)"
               role="button" tabindex="0"
               @keydown.enter.prevent="openInBackups(a)"
               @keydown.space.prevent="openInBackups(a)">
            <span class="sdot" :class="a.kind === 'failure' ? 'sdot--fail' : 'sdot--ok'"></span>
            <div style="font-weight:550;">
              <span x-text="a.host"></span>
              <span class="muted" style="font-weight:400;" x-text="'/ ' + a.database"></span>
            </div>
            <span class="spacer muted" x-text="a.ageLabel"></span>
            <span class="num" style="width:72px; text-align:right;" x-text="a.sizeLabel"></span>
          </div>
        </template>
      </div>
    </div>
  </template>
</div>

<script>
  function dbxDashboard() {
    return {
      summary: { total_backups: 0, total_bytes: 0, hosts: 0, databases: 0, fresh: 0, aging: 0, stale: 0 },
      cards: [],
      loading: true,
      // PR-Y4: per-card connection-test state, keyed by `host/database` (the
      // same key x-for uses on each card). Kept in a plain object rather
      // than a Map so Alpine's reactivity catches new keys on first access.
      // Shape: { expanded: bool, log: [str], jobId: str|null, status: 'idle'|'running'|'ok'|'err', exitCode: int|null, eventSource: EventSource|null }
      tests: {},

      init() {
        // Dashboard is the landing view, so always load on first mount.
        // Also refresh on tab re-entry so a backup taken in the Backup tab
        // is reflected when the user navigates back.
        this.$watch('$store.dbx.view', (v) => { if (v === 'dashboard') this.load(); });
        this.load();
      },

      // PR-Y4: lookup-or-init helper. Returns a stable per-card object so
      // Alpine bindings can reactively track its fields. Callers must
      // always read state via this method (rather than `this.tests[k]`)
      // so newly-created keys are reactive.
      testState(c) {
        const k = c.host + '/' + c.database;
        if (!this.tests[k]) {
          this.tests[k] = { expanded: false, log: [], jobId: null, status: 'idle', exitCode: null, eventSource: null };
        }
        return this.tests[k];
      },

      testButtonLabel(c) {
        const s = this.testState(c);
        if (s.status === 'running') return 'Cancel test';
        if (s.expanded) return 'Hide log';
        return 'Test connection';
      },

      testPillLabel(c) {
        const s = this.testState(c);
        if (s.status === 'idle')    return s.expanded ? 'Pending' : '';
        if (s.status === 'running') return 'Testing…';
        if (s.status === 'ok')      return '✓ Connected';
        if (s.status === 'err')     return '✗ Failed (exit ' + (s.exitCode == null ? '?' : s.exitCode) + ')';
        return '';
      },

      // PR-Y4: button is a tri-state — collapsed/idle → start; running →
      // cancel; finished (collapsed open) → collapse back. We keep the log
      // around when collapsing so re-opening shows the previous run.
      toggleTest(c) {
        const s = this.testState(c);
        if (s.status === 'running') {
          this.cancelTest(c);
          return;
        }
        if (s.expanded) {
          // Collapse the panel; preserve log/status so the user can
          // re-expand and see the previous result without re-running.
          s.expanded = false;
          return;
        }
        this.startTest(c);
      },

      async startTest(c) {
        const s = this.testState(c);
        s.expanded = true;
        s.log = [];
        s.status = 'running';
        s.exitCode = null;
        s.jobId = null;
        try {
          const r = await fetch(Alpine.store('dbx').api('/host-test'), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ host: c.host }),
          });
          if (!r.ok) {
            const err = await r.json().catch(() => ({ error: 'HTTP ' + r.status }));
            s.log.push('Failed to start: ' + (err.error || r.status));
            s.status = 'err';
            s.exitCode = -1;
            return;
          }
          const { job_id } = await r.json();
          s.jobId = job_id;
          this.attachTestStream(c, job_id);
        } catch (e) {
          s.log.push('Network error: ' + e);
          s.status = 'err';
          s.exitCode = -1;
        }
      },

      attachTestStream(c, jobId) {
        const s = this.testState(c);
        const url = Alpine.store('dbx').api('/jobs/' + jobId + '/events');
        const es = new EventSource(url);
        s.eventSource = es;
        es.onmessage = (ev) => {
          try {
            const { line } = JSON.parse(ev.data);
            if (line !== undefined) s.log.push(line);
          } catch (e) { /* ignore */ }
        };
        es.addEventListener('done', (ev) => {
          try {
            const { exit_code } = JSON.parse(ev.data);
            s.exitCode = exit_code;
            s.status = exit_code === 0 ? 'ok' : 'err';
          } catch (e) {
            s.status = 'err';
          } finally {
            es.close();
            s.eventSource = null;
          }
        });
        es.onerror = () => {
          // EventSource auto-reconnects on transient drops; only close if
          // the server side already finished (otherwise we'd cut the
          // reconnect attempt and miss the `done` event).
          if (s.status !== 'running') {
            es.close();
            s.eventSource = null;
          }
        };
      },

      async cancelTest(c) {
        const s = this.testState(c);
        if (!s.jobId) return;
        try {
          await fetch(Alpine.store('dbx').api('/jobs/' + s.jobId + '/cancel'), { method: 'POST' });
        } catch (e) { /* swallow — server's done event will arrive shortly after SIGTERM */ }
      },

      async load() {
        this.loading = true;
        try {
          const r = await fetch(Alpine.store('dbx').api('/dashboard'));
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          const payload = await r.json();
          this.summary = payload.summary || this.summary;
          this.cards = payload.cards || [];
        } catch (e) {
          this.cards = [];
          console.error('Failed to load dashboard:', e);
        } finally {
          this.loading = false;
        }
      },

      openInBackups(c) {
        // Surface the filter to the Backups view via the shared store. The
        // Backups view reads it on next render and pre-populates its search
        // input. We pass `host/db` so a multi-word filter still uniquely
        // identifies the pair when host or db names happen to overlap.
        Alpine.store('dbx').backupFilter = c.host + '/' + c.database;
        Alpine.store('dbx').view = 'backups';
      },

      countLabel() {
        const n = this.cards.length;
        if (n === 0) return '';
        return `${n} host/db pair${n === 1 ? '' : 's'}`;
      },

      lastSuccessLabel(c) {
        if (!c.last_success) return '—';
        return this.formatAge(c.last_success.timestamp) + ' ago';
      },

      formatAge(ts) {
        if (!ts) return '—';
        const d = new Date(ts);
        if (isNaN(d.getTime())) return ts;
        const ageSec = Math.max(0, Math.floor((Date.now() - d.getTime()) / 1000));
        if (ageSec < 60) return `${ageSec}s`;
        if (ageSec < 3600) return `${Math.floor(ageSec / 60)}m`;
        if (ageSec < 86400) return `${Math.floor(ageSec / 3600)}h`;
        if (ageSec < 86400 * 14) return `${Math.floor(ageSec / 86400)}d`;
        return `${Math.floor(ageSec / 86400)}d`;
      },

      formatNextAt(ts) {
        if (!ts) return '—';
        const d = new Date(ts);
        if (isNaN(d.getTime())) return ts;
        const deltaSec = Math.floor((d.getTime() - Date.now()) / 1000);
        if (deltaSec < 0) return 'overdue';
        if (deltaSec < 3600) return `in ${Math.floor(deltaSec / 60)}m`;
        if (deltaSec < 86400) return `in ${Math.floor(deltaSec / 3600)}h`;
        return `in ${Math.floor(deltaSec / 86400)}d`;
      },

      formatSize(n) {
        if (n == null) return '—';
        if (n < 1024) return n + ' B';
        if (n < 1024 ** 2) return (n / 1024).toFixed(1) + ' KB';
        if (n < 1024 ** 3) return (n / 1024 / 1024).toFixed(1) + ' MB';
        return (n / 1024 ** 3).toFixed(2) + ' GB';
      },

      // Hero badge: map test status → shared .badge variant.
      testBadgeClass(c) {
        const s = this.testState(c);
        if (s.status === 'running') return 'badge--info';
        if (s.status === 'ok')      return 'badge--ok';
        if (s.status === 'err')     return 'badge--fail';
        return 'badge--mut';
      },

      // Donut geometry. Circumference of r=30 ≈ 188.5. Each status segment's
      // arc length is proportional to its share of the total pairs.
      _donutCirc() { return 2 * Math.PI * 30; },
      _donutTotal() {
        const t = this.summary.fresh + this.summary.aging + this.summary.stale;
        return t > 0 ? t : 1;
      },
      _donutLen(kind) {
        return (this.summary[kind] / this._donutTotal()) * this._donutCirc();
      },
      donutDash(kind) {
        const len = this._donutLen(kind);
        return `${len} ${this._donutCirc() - len}`;
      },
      // Stack segments in draw order stale → aging → fresh (matches markup).
      donutOffset(kind) {
        const c = this._donutCirc();
        if (kind === 'stale') return 0;
        if (kind === 'aging') return -this._donutLen('stale');
        return -(this._donutLen('stale') + this._donutLen('aging'));
      },

      // Cards needing attention: any non-fresh status or a recorded failure,
      // highest-risk first (cards already arrive stale→aging→fresh sorted).
      attentionCards() {
        return this.cards.filter(c => c.status !== 'fresh' || c.last_failure);
      },

      // The single worst pair, used by the hero CTA. null when all fresh.
      topRisk() {
        const a = this.attentionCards();
        return a.length > 0 ? a[0] : null;
      },

      heroEyebrow() {
        const n = this.attentionCards().length;
        if (n === 0) return 'All healthy';
        return `${n} need${n === 1 ? 's' : ''} attention`;
      },
      heroEyebrowClass() {
        if (this.summary.stale > 0 || this.cards.some(c => c.last_failure)) return 'dbx-dash__hero-eyebrow--bad';
        if (this.summary.aging > 0) return 'dbx-dash__hero-eyebrow--warn';
        return 'dbx-dash__hero-eyebrow--ok';
      },
      heroTitle() {
        const t = this.topRisk();
        if (!t) return 'Everything is healthy';
        if (this.attentionCards().length === 1) return 'Almost everything is healthy';
        return 'Some backups need attention';
      },
      heroSub() {
        const total = this.summary.databases;
        const fresh = this.summary.fresh;
        const t = this.topRisk();
        const head = `${fresh} of your ${total} host / database pair${total === 1 ? '' : 's'} ${fresh === 1 ? 'has' : 'have'} a fresh backup.`;
        if (!t) return head;
        const where = `${t.host} / ${t.database}`;
        if (t.last_failure) {
          return `${head} ${where} has been failing — its last successful backup is ${t.status}.`;
        }
        return `${head} ${where}'s last backup is ${t.status} (${this.lastSuccessLabel(t)}).`;
      },

      countLabelHosts() {
        return this.summary.hosts === 1 ? ' host' : ' hosts';
      },

      // Oldest backup tile: the pair with the largest last_success age.
      _oldestCard() {
        let best = null;
        for (const c of this.cards) {
          const age = (c.last_success && c.last_success.age_seconds) || 0;
          if (!best || age > best._age) { best = { card: c, _age: age }; }
        }
        return best;
      },
      oldestAgeLabel() {
        const o = this._oldestCard();
        if (!o || !o.card.last_success) return '—';
        return this.formatAge(o.card.last_success.timestamp);
      },
      oldestPairLabel() {
        const o = this._oldestCard();
        if (!o) return '—';
        return `${o.card.host} / ${o.card.database}`;
      },

      // Recent activity feed: one row per pair, using the more-recent of its
      // last_success / last_failure, newest first, capped to a short list.
      recentActivity() {
        const rows = [];
        for (const c of this.cards) {
          let kind = null, ts = null, size = null;
          const succ = c.last_success && c.last_success.timestamp ? new Date(c.last_success.timestamp).getTime() : null;
          const fail = c.last_failure && c.last_failure.timestamp ? new Date(c.last_failure.timestamp).getTime() : null;
          if (fail != null && (succ == null || fail >= succ)) {
            kind = 'failure'; ts = c.last_failure.timestamp; size = null;
          } else if (succ != null) {
            kind = 'success'; ts = c.last_success.timestamp; size = c.last_success.size;
          } else {
            continue;
          }
          rows.push({
            host: c.host,
            database: c.database,
            kind,
            _t: new Date(ts).getTime() || 0,
            ageLabel: this.formatAge(ts) + ' ago',
            sizeLabel: kind === 'failure' ? '—' : this.formatSize(size),
          });
        }
        rows.sort((a, b) => b._t - a._t);
        return rows.slice(0, 8);
      },
    };
  }
</script>
