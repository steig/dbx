<!--
  Runs view fragment. Loaded by `dbx wizard` only (NOT embedded in mkdocs).
  Renders the recent audit-log entries written by lib/core.sh:audit_log()
  whenever the user runs `dbx backup` / `dbx restore` / vault ops. Today
  backups are CLI/cron only, so the user has no other window into past
  successes/failures from inside the wizard — this view closes that gap.

  Filtering: action / outcome dropdowns + date range + a regex `q=` are
  applied server-side via /api/audit-log. Free-text "host filter" still
  runs client-side because that's the common interactive case.

  Reads /api/audit-log, refreshes on tab switch.
-->
<style>
  .runs-row--fail td { background: var(--red-weak); }
  .runs-row--fail:hover td { background: var(--red-weak); }
  .runs-result { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .runs-file { font-family: var(--mono); font-size: 12px; color: var(--text-3); }
  .runs-empty { padding: 48px 20px; text-align: center; color: var(--text-3); }
  .runs-empty code { font-family: var(--mono); font-size: 12.5px; }
</style>

<div x-data="dbxRuns()" x-init="init()">
  <div class="page-head">
    <div>
      <p class="page-title">Operate</p>
      <h1 class="page-h1">Runs</h1>
      <p class="page-sub">Audit log of every backup, restore, and maintenance action.</p>
    </div>
    <div class="head-actions">
      <button class="btn btn--ghost btn--sm" @click="load()" :disabled="loading">Refresh</button>
      <button class="btn btn--ghost btn--sm" @click="reset()" title="Clear all filters">Reset</button>
    </div>
  </div>

  <div class="toolbar">
    <div class="search">
      <input type="search" x-model.debounce.300ms="filter" @input="load()"
             placeholder="Search runs (regex over message text, or plain text)…">
    </div>
    <!-- Action-type filter. Wired to the existing actionFilter state; the
         server allowlists backup|restore and we fold the rest into __other__. -->
    <div class="seg">
      <button :class="{ active: actionFilter === '' }" @click="actionFilter = ''; load()">All</button>
      <button :class="{ active: actionFilter === 'backup' }" @click="actionFilter = 'backup'; load()">Backups</button>
      <button :class="{ active: actionFilter === 'restore' }" @click="actionFilter = 'restore'; load()">Restores</button>
      <button :class="{ active: actionFilter === '__other__' }" @click="actionFilter = '__other__'; load()">Maintenance</button>
    </div>
    <span class="spacer"></span>
    <span class="card__hint" x-text="countLabel()"></span>
  </div>

  <div class="toolbar">
    <label class="check">
      Outcome
      <select x-model="outcomeFilter" @change="load()" style="width:auto;">
        <option value="">All</option>
        <option value="success">Success</option>
        <option value="failure">Failure</option>
      </select>
    </label>
    <input type="date" x-model="fromDate" @change="load()" title="From date" style="width:auto;">
    <input type="date" x-model="toDate" @change="load()" title="To date" style="width:auto;">
    <button class="badge badge--fail" style="cursor:pointer;border:none;"
            @click="applyPresetFailedProdRestores()"
            title="Quick filter: failed restores against a prod-mysql host">
      Failed restores against prod-mysql
    </button>
    <template x-if="regexInvalid">
      <span class="card__hint" style="color: var(--amber);">
        (invalid regex — searching as text)
      </span>
    </template>
  </div>

  <template x-if="loading">
    <div class="runs-empty">Loading…</div>
  </template>

  <template x-if="!loading && rows.length === 0">
    <div class="runs-empty">
      <div class="empty__title">No runs found</div>
      The audit log lives at <code>~/.local/share/dbx/audit.log</code> — it
      accumulates as you run <code>dbx backup</code> and <code>dbx restore</code>.
    </div>
  </template>

  <template x-if="!loading && rows.length > 0">
    <div class="card card--flush">
      <table class="tbl">
        <thead>
          <tr>
            <th></th>
            <th>Action</th>
            <th>Host / DB</th>
            <th>When</th>
            <th class="num">Duration</th>
            <th>Result</th>
          </tr>
        </thead>
        <tbody>
          <template x-for="(r, i) in filtered()" :key="i">
            <tr :class="{ 'runs-row--fail': r.outcome === 'failure' }">
              <td>
                <span class="sdot"
                      :class="r.outcome === 'failure' ? 'sdot--fail' : (r.outcome === 'success' ? 'sdot--ok' : 'sdot--warn')"></span>
              </td>
              <td x-text="r.action || '—'"></td>
              <td x-text="hostDbLabel(r)"></td>
              <td class="muted" x-text="formatTimestamp(r.timestamp)"></td>
              <td class="num" x-text="formatDuration(r.duration_sec)"></td>
              <td>
                <div class="runs-result">
                  <template x-if="r.outcome === 'success'">
                    <span class="badge badge--ok">ok</span>
                  </template>
                  <template x-if="r.outcome === 'failure'">
                    <span class="badge badge--fail">failed</span>
                  </template>
                  <template x-if="r.outcome !== 'success' && r.outcome !== 'failure'">
                    <span class="badge badge--mut" x-text="r.outcome || '—'"></span>
                  </template>
                  <template x-if="fileLabel(r)">
                    <span class="runs-file" x-text="fileLabel(r)"></span>
                  </template>
                </div>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </template>
</div>

<script>
  function dbxRuns() {
    return {
      rows: [],
      loading: true,
      filter: '',
      actionFilter: '',    // '' = all, 'backup', 'restore', or '__other__'
      outcomeFilter: '',   // '' = all, 'success', 'failure'
      fromDate: '',        // YYYY-MM-DD from the date picker
      toDate: '',          // YYYY-MM-DD
      // Result-envelope counters from the server. Both default to whatever
      // the last successful /api/audit-log call returned; pre-load they read
      // as 0/0, which is fine because the table is hidden behind loading.
      total: 0,
      filteredCount: 0,
      // Server replies 400 with "invalid regex: ..." when the q= pattern
      // won't compile. We catch that and tell the UI to fall back to plain
      // substring matching on the client, plus show a small hint.
      regexInvalid: false,

      init() {
        // Lazy-load: only hit /api/audit-log when the user actually opens
        // this tab. Reading the audit log can spawn a `tail` subprocess on
        // the server, which we don't want firing on every wizard launch.
        this.$watch('$store.dbx.view', (v) => { if (v === 'runs') this.load(); });
        if (Alpine.store('dbx').view === 'runs') this.load();
      },

      async load() {
        this.loading = true;
        this.regexInvalid = false;
        try {
          // When the dropdown is set to "__other__" we still fetch with
          // action='' (all), then filter client-side. That keeps the
          // server-side allowlist tight (backup|restore|...) without
          // requiring a NOT-IN dance in the URL.
          const apiAction = this.actionFilter === '__other__' ? '' : this.actionFilter;
          // format=v2 opts into the envelope shape unconditionally. We need
          // total/filtered for the "Showing 42 of 1247" label even when no
          // filter is active.
          const params = new URLSearchParams({ limit: '200', format: 'v2' });
          if (apiAction) params.set('action', apiAction);
          if (this.outcomeFilter) params.set('outcome', this.outcomeFilter);
          if (this.fromDate) params.set('from', this.fromDate);
          if (this.toDate) params.set('to', this.toDate);
          // Server-side regex search. If the user's pattern is an invalid
          // regex the server replies 400; we transparently retry without
          // the q= param and remember the failure so the client-side
          // filter() can do plain-substring matching on it instead.
          const q = this.filter.trim();
          if (q) params.set('q', q);

          const url = Alpine.store('dbx').api('/audit-log') + '&' + params.toString();
          let r = await fetch(url);
          if (r.status === 400 && q) {
            // Likely an invalid regex. Retry without q= so the user still
            // sees results, then client-side substring-filter on q below.
            this.regexInvalid = true;
            params.delete('q');
            const retryUrl = Alpine.store('dbx').api('/audit-log') + '&' + params.toString();
            r = await fetch(retryUrl);
          }
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          const body = await r.json();
          // Envelope shape from format=v2. Defensive: also tolerate the
          // legacy bare-array shape in case something downstream changes.
          if (Array.isArray(body)) {
            this.rows = body;
            this.total = body.length;
            this.filteredCount = body.length;
          } else {
            this.rows = body.entries || [];
            this.total = body.total || 0;
            this.filteredCount = body.filtered || 0;
          }
        } catch (e) {
          this.rows = [];
          this.total = 0;
          this.filteredCount = 0;
          console.error('Failed to load audit log:', e);
        } finally {
          this.loading = false;
        }
      },

      filtered() {
        let rows = this.rows;
        // Client-side "__other__" filter: anything not backup/restore.
        if (this.actionFilter === '__other__') {
          rows = rows.filter(r => r.action !== 'backup' && r.action !== 'restore');
        }
        // If the server rejected our regex, fall back to a plain substring
        // match against the JSON-stringified row. Same haystack shape the
        // server would have used, just client-side.
        if (this.regexInvalid && this.filter) {
          const f = this.filter.toLowerCase();
          rows = rows.filter(r => JSON.stringify(r).toLowerCase().includes(f));
        }
        return rows;
      },

      reset() {
        // Clear every filter and reload. Quicker than clicking through
        // each control individually.
        this.filter = '';
        this.actionFilter = '';
        this.outcomeFilter = '';
        this.fromDate = '';
        this.toDate = '';
        this.load();
      },

      applyPresetFailedProdRestores() {
        // Spec-defined preset: action=restore, outcome=failure, q=prod-mysql.
        // Setting q= here triggers the server-side regex match — `prod-mysql`
        // is a valid plain pattern so no fallback fires.
        this.actionFilter = 'restore';
        this.outcomeFilter = 'failure';
        this.filter = 'prod-mysql';
        this.fromDate = '';
        this.toDate = '';
        this.load();
      },

      countLabel() {
        // Always visible — even with no filters active, "Showing 42 of 42
        // entries" tells the user the audit log tail window is loaded.
        if (this.total === 0) return 'No entries';
        const shown = this.filtered().length;
        if (shown === this.total && shown === this.filteredCount) {
          return `Showing ${shown} ${shown === 1 ? 'entry' : 'entries'}`;
        }
        return `Showing ${shown} of ${this.total} ${this.total === 1 ? 'entry' : 'entries'}`;
      },

      hostDbLabel(r) {
        // Backup audit rows: db_host + database. Restore: target_db.
        // Vault: account. Show what's available without inventing fields.
        if (r.db_host && r.database) return `${r.db_host} / ${r.database}`;
        if (r.target_db) return `→ ${r.target_db}`;
        if (r.account) return `account: ${r.account}`;
        return '—';
      },

      fileLabel(r) {
        if (!r.file) return '';
        // Strip the full path; show just the basename.
        const parts = r.file.split('/');
        return parts[parts.length - 1] || r.file;
      },

      formatTimestamp(ts) {
        if (!ts) return '—';
        // audit_log emits ISO 8601 Z timestamps. Display in the user's local
        // timezone for human readability; fall back to raw string if Date
        // can't parse (don't drop information when the timestamp is weird).
        const d = new Date(ts);
        if (isNaN(d.getTime())) return ts;
        return d.toISOString().replace('T', ' ').replace(/\..+/, '') + ' UTC';
      },

      formatDuration(secs) {
        if (secs === undefined || secs === null || secs === '') return '—';
        const n = Number(secs);
        if (!Number.isFinite(n) || n < 0) return '—';
        if (n < 60) return `${n}s`;
        if (n < 3600) return `${Math.floor(n / 60)}m ${n % 60}s`;
        const h = Math.floor(n / 3600);
        const rem = n % 3600;
        return `${h}h ${Math.floor(rem / 60)}m ${rem % 60}s`;
      },
    };
  }
</script>
