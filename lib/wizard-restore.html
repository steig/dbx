<!--
  Restore view fragment. Loaded by `dbx wizard` only.
  Wraps `dbx restore` with a form + EventSource log stream + cancel.
-->
<style>

  /* Source summary line: a compact monospace strip showing the staged backup. */
  .rstr-source { padding: 10px 14px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: var(--mono); font-size: 12.5px; color: var(--text-2); }
  .rstr-source strong { color: var(--text); }

  /* Elapsed badge in the page header. */
  .rstr-elapsed { display: inline-block; padding: 2px 9px; margin-left: 10px; border-radius: 999px; background: var(--surface-2); border: 1px solid var(--border-2); color: var(--text-2); font-family: var(--mono); font-size: 12.5px; font-variant-numeric: tabular-nums; }
  .rstr-elapsed--running { color: var(--accent); border-color: var(--accent); }

  /* Inline backup picker hint. */
  .rstr-picker-hint { color: var(--text-3); font-size: 13px; margin: 0; }
  .rstr-picker-empty { padding: 16px; text-align: center; color: var(--text-3); font-size: 13px; }

  /* Failure root-cause line, pinned above the log. */
  .rstr-root-cause { margin-bottom: 12px; padding: 12px 14px; background: var(--red-weak); border-left: 3px solid var(--red); border-radius: var(--radius-sm); font-family: var(--mono); font-size: 12.5px; color: var(--text-2); white-space: pre-wrap; word-break: break-word; }
  .rstr-root-cause-label { display: block; font-family: var(--font); font-size: 11px; font-weight: 700; color: var(--red); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; }
  .rstr-audit-hint { margin-top: 6px; color: var(--text-3); font-size: 12px; }

  /* Status banner reuses .note tones; just the spacing wrapper here. */
  .rstr-status { margin-bottom: 12px; }

  /* Guided step indicator: 1 — 2 — 3 with active / done highlight. */
  .rstr-steps { display: flex; align-items: center; gap: 10px; margin: 4px 0 22px; }
  .rstr-step { display: flex; align-items: center; gap: 8px; color: var(--text-3); font-size: 13px; }
  .rstr-step-num { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 999px; background: var(--surface-2); border: 1px solid var(--border-2); color: var(--text-3); font-weight: 700; font-size: 12px; }
  .rstr-step.active .rstr-step-num,
  .rstr-step.done .rstr-step-num { background: var(--accent); border-color: var(--accent); color: #fff; }
  .rstr-step.active, .rstr-step.done { color: var(--text); font-weight: 600; }
  .rstr-step-sep { flex: 0 0 24px; height: 1px; background: var(--border-2); }
  .rstr-step.done + .rstr-step-sep { background: var(--accent); }

  /* Guided diff preview block. */
  .rstr-diff { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; font-family: var(--mono); font-size: 12.5px; max-height: 320px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; }
  .rstr-diff-line--rm { color: var(--red); }

  /* Checkbox grid for the quick-mode toggles. */
  .rstr-checks { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 18px; }
</style>

<div x-data="dbxRestore()" x-init="init()">
  <div class="page-head">
    <div>
      <p class="page-title">Operate</p>
      <h1 class="page-h1">Restore
        <template x-if="startedAt">
          <span class="rstr-elapsed"
                :class="{ 'rstr-elapsed--running': running }"
                x-text="'Elapsed: ' + formatElapsed(elapsed)"></span>
        </template>
      </h1>
      <p class="page-sub">
        Wraps <code class="mono">dbx restore</code> against a local backup. Output streams live;
        the restore keeps running if you close the browser.
      </p>
    </div>
    <!--
      Mode toggle. "Quick" is the original single-form flow; "Guided"
      walks the user through source → target → confirm. Disabled while a
      restore is mid-run so the user can't switch modes and lose their log.
    -->
    <div class="head-actions">
      <div class="seg" role="tablist" aria-label="Restore mode">
        <button type="button" :class="{ active: mode() === 'quick' }"
                @click="setMode('quick')" :disabled="running">Quick restore</button>
        <button type="button" :class="{ active: mode() === 'guided' }"
                @click="setMode('guided')" :disabled="running">Guided restore</button>
      </div>
    </div>
  </div>

  <!--
    Quick-restore mode (default). Single form: pick a backup, fill checkboxes,
    Start. This is the original behavior; the guided block below sits next
    to it and renders only when the user flips the mode toggle.
  -->
  <template x-if="mode() === 'quick'">
  <div>
  <template x-if="source">
    <div class="rstr-source" style="margin-bottom:14px;">
      <span>
        <strong x-text="source.host"></strong> /
        <strong x-text="source.database"></strong> &nbsp;·&nbsp;
        <code x-text="source.filename"></code> &nbsp;·&nbsp;
        <span x-text="source.encryption" class="chip"
              :class="{ 'chip--enc': source.encryption === 'age' || source.encryption === 'gpg' }"></span>
        <template x-if="source.safety === 'prod'">
          <span class="chip chip--prod" style="margin-left: 8px;">PROD</span>
        </template>
        <template x-if="source.safety === 'stage'">
          <span class="chip chip--stage" style="margin-left: 8px;">STAGE</span>
        </template>
      </span>
    </div>
  </template>

  <!--
    Inline backup picker. Renders when no backup is staged so the user
    can pick one without bouncing to the Backups tab and back. Mirrors the
    Backups view table shape (host / safety / database / when / size /
    encryption / status). Hidden the moment a row is picked (selectedBackup
    is set on the shared store, refresh() then populates this.source and
    Alpine collapses the picker block).
  -->
  <template x-if="!source">
    <div class="card">
      <div class="card__head">
        <div>
          <div class="card__title">Pick a backup</div>
          <p class="rstr-picker-hint" style="margin-top:4px;">
            Pick a backup below to begin — or visit the <strong>Backups</strong> tab for the full view.
          </p>
        </div>
        <div class="search" style="max-width:320px;">
          <input type="search" x-model="pickerFilter"
                 placeholder="Filter by host or database…">
        </div>
      </div>

      <template x-if="pickerLoading">
        <p class="rstr-picker-empty">Loading backups…</p>
      </template>

      <template x-if="!pickerLoading && pickerRows.length === 0">
        <p class="rstr-picker-empty">No backups found. Run <code class="mono">dbx backup &lt;host&gt; &lt;db&gt;</code> first.</p>
      </template>

      <template x-if="!pickerLoading && pickerRows.length > 0">
        <table class="tbl">
          <thead>
            <tr>
              <th class="sortable" @click="setSort('host')">Host<span class="sort-ind" x-text="sortInd('host')"></span></th>
              <th class="sortable" @click="setSort('safety')">Safety<span class="sort-ind" x-text="sortInd('safety')"></span></th>
              <th class="sortable" @click="setSort('database')">Database<span class="sort-ind" x-text="sortInd('database')"></span></th>
              <th class="sortable grow" @click="setSort('filename')">Backup<span class="sort-ind" x-text="sortInd('filename')"></span></th>
              <th class="num sortable" @click="setSort('size', 'desc')">Size<span class="sort-ind" x-text="sortInd('size')"></span></th>
              <th>Encryption</th>
              <th class="sortable" @click="setSort('mtime', 'desc')">When<span class="sort-ind" x-text="sortInd('mtime')"></span></th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            <template x-for="b in pickerFiltered()" :key="b.path">
              <tr :class="{ 'is-incomplete': !b.complete }">
                <td class="nowrap" x-text="b.host"></td>
                <td>
                  <template x-if="b.safety === 'prod'">
                    <span class="chip chip--prod">PROD</span>
                  </template>
                  <template x-if="b.safety === 'stage'">
                    <span class="chip chip--stage">STAGE</span>
                  </template>
                  <template x-if="!b.safety || b.safety === 'local'">
                    <span class="muted" style="font-size:12px;">local</span>
                  </template>
                </td>
                <td x-text="b.database"></td>
                <td class="grow ellip" :title="b.filename"><code class="mono" x-text="b.filename"></code></td>
                <td class="num" x-text="formatSize(b.size)"></td>
                <td>
                  <span class="chip"
                        :class="{ 'chip--enc': b.encryption === 'age' || b.encryption === 'gpg' }"
                        x-text="b.encryption"></span>
                </td>
                <td class="when" :title="dbxFmt.iso(b.timestamp || b.mtime)" x-text="formatWhen(b)"></td>
                <td>
                  <template x-if="b.complete">
                    <span class="chip chip--complete"
                          title="Backup has a .meta.json sidecar — finished successfully">✓ complete</span>
                  </template>
                  <template x-if="!b.complete">
                    <span class="chip chip--incomplete"
                          title="No .meta.json sidecar — likely partial; can't restore.">⚠ incomplete</span>
                  </template>
                </td>
                <td style="white-space: nowrap; text-align: right;">
                  <button class="btn btn--ghost btn--sm" @click="pick(b)"
                          :disabled="!b.complete"
                          :title="b.complete ? 'Pick this backup' : 'Cannot restore an incomplete backup'">Pick</button>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </template>
    </div>
  </template>

  <!--
    Prominent danger note: prod-source backups can't be restored with
    --into. Wired to the existing source.safety flag from config.
  -->
  <template x-if="source && source.safety === 'prod'">
    <div class="note note--danger rstr-status" style="margin-bottom:14px;">
      <strong>This backup is from a host marked safety=prod.</strong>
      Plain restore into the managed dev container is allowed (the source backup is read-only at this point).
      However, <code class="mono">--into &lt;container&gt;</code> is refused for prod-source backups — clear the
      container picker before starting, or remove the safety flag in config.json if this is intentional.
    </div>
  </template>

  <template x-if="source">
    <div>
      <!-- DESTINATION -->
      <div class="card">
        <div class="card__head">
          <div class="card__title">Destination</div>
          <div class="card__hint">where the data goes</div>
        </div>
        <div class="form-grid" style="max-width:none;">
          <div class="field-row">
            <div class="field" style="flex:1; min-width:200px;">
              <label for="dbx-r-name">Target database name</label>
              <input id="dbx-r-name" type="text" x-model="form.name"
                     placeholder="(auto: e.g. myapp_v1_20260524)"
                     pattern="[A-Za-z0-9][A-Za-z0-9_-]*">
              <span class="hint">Letters, numbers, <code class="mono">_</code> and <code class="mono">-</code>. Leave blank to let dbx auto-generate.</span>
            </div>
            <div class="field" style="flex:1; min-width:200px;">
              <label for="dbx-r-into">Restore into container</label>
              <select id="dbx-r-into" x-model="form.into"
                      :disabled="!containers.length || isMysql()">
                <option value="">(default: managed postgres-dbx / mysql-dbx)</option>
                <template x-for="name in containers" :key="name">
                  <option :value="name" x-text="name"></option>
                </template>
              </select>
              <span class="hint" x-show="!isMysql()">Optional. Postgres only.</span>
              <span class="hint" x-show="isMysql()">
                <code class="mono">--into</code> is postgres-only — the CLI rejects it for MySQL backups.
              </span>
            </div>
          </div>
        </div>
      </div>

      <!-- OPTIONS -->
      <div class="card">
        <div class="card__head">
          <div class="card__title">Options</div>
        </div>
        <div class="rstr-checks">
          <label class="check"><input type="checkbox" x-model="form.no_post_restore"> Skip post-restore hooks</label>
          <label class="check"><input type="checkbox" x-model="form.hooks_only"> Re-run hooks only (no engine restore)</label>
          <label class="check"><input type="checkbox" x-model="form.no_scrub"> Skip PII scrub gate (break-glass)</label>
          <label class="check"><input type="checkbox" x-model="form.keep_download"> Keep downloaded backup after restore</label>
        </div>
        <hr class="divider">
        <div class="row">
          <button class="btn btn--danger" @click="start()"
                  :disabled="running || !source || prodIntoBlocked()"
                  :title="prodIntoBlocked() ? 'Prod-source restore --into is refused (clear the container picker)' : ''">
            <span x-show="!running">Restore</span>
            <span x-show="running">Restoring…</span>
          </button>
          <button class="btn btn--ghost" @click="cancel()" :disabled="!running">
            Cancel
          </button>
          <!--
            Retry re-issues the SAME body the previous run used, so the
            user doesn't have to re-toggle the checkboxes after a transient
            failure (network blip, container OOM, etc.). Only enabled after a
            failed run while not actively running.
          -->
          <button class="btn btn--ghost" @click="retry()"
                  :disabled="running || exitCode == null || exitCode === 0"
                  title="Re-run with the same options">
            Retry
          </button>
          <!--
            Copy the full captured log to the clipboard. Useful for
            pasting into a bug report. Plain log lines (no ANSI), since the
            SSE stream already strips them server-side.
          -->
          <button class="btn btn--ghost" @click="copyLog()"
                  :disabled="!log.length"
                  :title="copyState || 'Copy the full log to clipboard'">
            <span x-text="copyState || 'Copy log'"></span>
          </button>
          <button class="btn btn--ghost" @click="clearLog()" :disabled="running || !log.length">
            Clear log
          </button>
        </div>
      </div>

      <template x-if="status">
        <div class="note rstr-status"
             :class="statusNoteClass()" style="margin-top:14px;" x-text="status"></div>
      </template>

      <!--
        When a run fails, scan the captured log for the LAST line that
        looks like a dump-tool error (mysqldump:/pg_restore:/etc.) and pin
        it at the top of the log area. Saves the user scrolling through
        hundreds of progress lines to find the root cause.
      -->
      <template x-if="rootCause">
        <div class="rstr-root-cause" style="margin-top:14px;">
          <span class="rstr-root-cause-label">Likely root cause</span>
          <span x-text="rootCause"></span>
          <div class="rstr-audit-hint">
            Full restore record in <code class="mono">~/.local/share/dbx/audit.log</code>.
          </div>
        </div>
      </template>

      <div class="section-title">Live log</div>
      <div class="console" :class="{ 'is-empty': !log.length }">
        <template x-if="!log.length">
          <span class="console__line--dim">(no output yet — click "Restore" to begin)</span>
        </template>
        <template x-for="(line, i) in log" :key="i">
          <div x-text="line"></div>
        </template>
      </div>
    </div>
  </template>
  </div>
  </template>

  <!--
    Guided mode: 3-step source → target → confirm flow. Reuses the same
    backend (POST /api/restore + SSE stream) so a guided run shares the
    log + cancel + retry plumbing with the quick form below.
  -->
  <template x-if="mode() === 'guided'">
    <div>
      <!-- Step indicator: 1 — 2 — 3 with active highlight + done state. -->
      <div class="rstr-steps">
        <div class="rstr-step"
             :class="{ active: guidedStep === 1, done: guidedStep > 1 }">
          <span class="rstr-step-num">1</span>
          <span>Source</span>
        </div>
        <span class="rstr-step-sep"
              :class="{ done: guidedStep > 1 }"></span>
        <div class="rstr-step"
             :class="{ active: guidedStep === 2, done: guidedStep > 2 }">
          <span class="rstr-step-num">2</span>
          <span>Target</span>
        </div>
        <span class="rstr-step-sep"
              :class="{ done: guidedStep > 2 }"></span>
        <div class="rstr-step"
             :class="{ active: guidedStep === 3 }">
          <span class="rstr-step-num">3</span>
          <span>Confirm</span>
        </div>
      </div>

      <!-- Step 1: pick a source backup. Reuses the same row shape as the
           Backups view and the quick-mode inline picker. -->
      <template x-if="guidedStep === 1">
        <div class="card">
          <div class="card__head">
            <div>
              <div class="card__title">Source</div>
              <p class="rstr-picker-hint" style="margin-top:4px;">
                Pick the backup you want to restore.
              </p>
            </div>
            <div class="search" style="max-width:320px;">
              <input type="search" x-model="pickerFilter"
                     placeholder="Filter by host or database…">
            </div>
          </div>

          <template x-if="pickerLoading">
            <p class="rstr-picker-empty">Loading backups…</p>
          </template>
          <template x-if="!pickerLoading && pickerRows.length === 0">
            <p class="rstr-picker-empty">
              No backups found. Run <code class="mono">dbx backup &lt;host&gt; &lt;db&gt;</code> first.
            </p>
          </template>
          <template x-if="!pickerLoading && pickerRows.length > 0">
            <table class="tbl">
              <thead>
                <tr>
                  <th class="sortable" @click="setSort('host')">Host<span class="sort-ind" x-text="sortInd('host')"></span></th>
                  <th class="sortable" @click="setSort('safety')">Safety<span class="sort-ind" x-text="sortInd('safety')"></span></th>
                  <th class="sortable" @click="setSort('database')">Database<span class="sort-ind" x-text="sortInd('database')"></span></th>
                  <th class="sortable grow" @click="setSort('filename')">Backup<span class="sort-ind" x-text="sortInd('filename')"></span></th>
                  <th class="num sortable" @click="setSort('size', 'desc')">Size<span class="sort-ind" x-text="sortInd('size')"></span></th>
                  <th>Encryption</th>
                  <th class="sortable" @click="setSort('mtime', 'desc')">When<span class="sort-ind" x-text="sortInd('mtime')"></span></th>
                  <th>Status</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                <template x-for="b in pickerFiltered()" :key="b.path">
                  <tr :class="{ 'is-incomplete': !b.complete }">
                    <td class="nowrap" x-text="b.host"></td>
                    <td>
                      <template x-if="b.safety === 'prod'">
                        <span class="chip chip--prod">PROD</span>
                      </template>
                      <template x-if="b.safety === 'stage'">
                        <span class="chip chip--stage">STAGE</span>
                      </template>
                      <template x-if="!b.safety || b.safety === 'local'">
                        <span class="muted" style="font-size:12px;">local</span>
                      </template>
                    </td>
                    <td x-text="b.database"></td>
                    <td class="grow ellip" :title="b.filename"><code class="mono" x-text="b.filename"></code></td>
                    <td class="num" x-text="formatSize(b.size)"></td>
                    <td>
                      <span class="chip"
                            :class="{ 'chip--enc': b.encryption === 'age' || b.encryption === 'gpg' }"
                            x-text="b.encryption"></span>
                    </td>
                    <td class="when" :title="dbxFmt.iso(b.timestamp || b.mtime)" x-text="formatWhen(b)"></td>
                    <td>
                      <template x-if="b.complete">
                        <span class="chip chip--complete">✓ complete</span>
                      </template>
                      <template x-if="!b.complete">
                        <span class="chip chip--incomplete">⚠ incomplete</span>
                      </template>
                    </td>
                    <td style="white-space: nowrap; text-align: right;">
                      <button class="btn btn--ghost btn--sm"
                              @click="pickGuided(b)"
                              :disabled="!b.complete"
                              :title="b.complete ? 'Use this backup' : 'Cannot restore an incomplete backup'">
                        Use this
                      </button>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </template>
        </div>
      </template>

      <!-- Step 2: name the target + prod-acknowledgement + scrub toggle. -->
      <template x-if="guidedStep === 2">
        <div>
          <template x-if="source">
            <div class="rstr-source" style="margin-bottom:14px;">
              <span>
                <strong x-text="source.host"></strong> /
                <strong x-text="source.database"></strong> &nbsp;·&nbsp;
                <code x-text="source.filename"></code> &nbsp;·&nbsp;
                <span x-text="formatSize(source.size)"></span> &nbsp;·&nbsp;
                <span x-text="formatWhen(source)"></span>
                <template x-if="source.safety === 'prod'">
                  <span class="chip chip--prod" style="margin-left: 8px;">PROD</span>
                </template>
                <template x-if="source.safety === 'stage'">
                  <span class="chip chip--stage" style="margin-left: 8px;">STAGE</span>
                </template>
              </span>
            </div>
          </template>

          <!--
            Prominent danger note for prod data, wired to source.safety.
          -->
          <template x-if="source && source.safety === 'prod'">
            <div class="note note--danger" style="margin-bottom:14px;">
              <strong>This backup is from a production host.</strong>
              Confirm you understand you are about to load prod data into a
              local dev container. The scrub step (default on) sanitizes PII
              before any consumers can see it.
            </div>
          </template>

          <div class="card">
            <div class="card__head">
              <div class="card__title">Target</div>
              <div class="card__hint">where the data goes</div>
            </div>
            <div class="form-grid">
              <div class="field">
                <label for="dbx-g-name">Target database name</label>
                <input id="dbx-g-name" type="text" x-model="guidedTarget"
                       pattern="[A-Za-z0-9][A-Za-z0-9_-]*"
                       placeholder="(auto-generated)">
                <span class="hint">Letters, numbers, <code class="mono">_</code> and <code class="mono">-</code>.</span>
              </div>
              <label class="check">
                <input type="checkbox" x-model="guidedScrub">
                Run scrub (sanitize PII before any consumer sees the data)
              </label>
              <template x-if="source && source.safety === 'prod'">
                <label class="check">
                  <input type="checkbox" x-model="guidedAcknowledged">
                  <strong>I understand this is prod data.</strong>
                </label>
              </template>
            </div>
            <hr class="divider">
            <div class="row">
              <button class="btn btn--ghost"
                      @click="guidedBack()">Back</button>
              <button class="btn btn--primary"
                      @click="guidedNext()"
                      :disabled="!guidedCanAdvance()">Next</button>
            </div>
          </div>
        </div>
      </template>

      <!-- Step 3: diff preview + Run restore. -->
      <template x-if="guidedStep === 3">
        <div>
          <template x-if="source">
            <div class="rstr-source" style="margin-bottom:14px;">
              <span>
                <strong x-text="source.host"></strong> /
                <strong x-text="source.database"></strong> &nbsp;→&nbsp;
                <code x-text="guidedTarget || '(auto)'"></code>
              </span>
            </div>
          </template>

          <div class="card">
            <div class="card__head">
              <div class="card__title">Confirm</div>
              <div class="card__hint">review before restoring</div>
            </div>

            <template x-if="diffLoading">
              <p class="rstr-picker-empty">Inspecting target…</p>
            </template>

            <template x-if="!diffLoading && diffError">
              <div class="note note--danger" x-text="diffError"></div>
            </template>

            <template x-if="!diffLoading && !diffError && diff">
              <div>
                <div class="note note--info" style="margin-bottom:12px;" x-text="diff.diff_summary"></div>
                <template x-if="diff.target && diff.target.tables && diff.target.tables.length > 0">
                  <div class="rstr-diff">
                    <template x-for="t in diff.target.tables" :key="t">
                      <div x-text="'- ' + t" class="rstr-diff-line--rm"></div>
                    </template>
                    <template x-if="diff.target.table_count > diff.target.tables.length">
                      <div x-text="'(… ' + (diff.target.table_count - diff.target.tables.length) + ' more)'"></div>
                    </template>
                  </div>
                </template>
              </div>
            </template>

            <hr class="divider">
            <div class="row">
              <button class="btn btn--ghost"
                      @click="guidedBack()"
                      :disabled="running">Back</button>
              <button class="btn btn--danger"
                      @click="runGuided()"
                      :disabled="running || !source || diffLoading">
                <span x-show="!running">Run restore</span>
                <span x-show="running">Restoring…</span>
              </button>
              <button class="btn btn--ghost"
                      @click="cancel()" :disabled="!running">Cancel</button>
            </div>
          </div>
        </div>
      </template>
    </div>
  </template>

  <!--
    Shared post-run UI (status banner + root-cause + log). Visible in either
    mode once a run is in flight or has completed. Same Alpine state as the
    quick form, since both modes funnel into start().
  -->
  <template x-if="mode() === 'guided' && (running || log.length || status)">
    <div style="margin-top: 14px;">
      <template x-if="status">
        <div class="note rstr-status"
             :class="statusNoteClass()" x-text="status"></div>
      </template>
      <template x-if="rootCause">
        <div class="rstr-root-cause">
          <span class="rstr-root-cause-label">Likely root cause</span>
          <span x-text="rootCause"></span>
          <div class="rstr-audit-hint">
            Full restore record in <code class="mono">~/.local/share/dbx/audit.log</code>.
          </div>
        </div>
      </template>
      <div class="section-title">Live log</div>
      <div class="console" :class="{ 'is-empty': !log.length }">
        <template x-if="!log.length">
          <span class="console__line--dim">(no output yet — click "Run restore" to begin)</span>
        </template>
        <template x-for="(line, i) in log" :key="i">
          <div x-text="line"></div>
        </template>
      </div>
    </div>
  </template>
</div>

<script>
  function dbxRestore() {
    return Object.assign(dbxSortable('mtime', 'desc'), {
      source: null,
      containers: [],
      form: { name: '', into: '', no_post_restore: false, hooks_only: false, no_scrub: false, keep_download: false },
      log: [],
      // Cap the live log at a tail window. Verbose restores emit a line per
      // object/row, so an unbounded array + one DOM node per line via x-for
      // grows until the browser tab runs out of memory. Keep the most recent
      // lines; older output scrolls off.
      maxLogLines: 5000,
      jobId: null,
      eventSource: null,
      running: false,
      status: '',
      exitCode: null,
      // Elapsed counter. `startedAt` is the ms-epoch we set on a successful
      // POST /api/restore; `elapsed` is the live seconds value driven by
      // setInterval and frozen on the `done` event. `tickHandle` lets us
      // clear the interval cleanly on done / cancel / browser nav.
      startedAt: null,
      elapsed: 0,
      tickHandle: null,
      // PR-K: inline picker state. Loaded once on init() (and re-loaded on
      // re-entering the view when nothing is staged) so the user can pick
      // a backup without bouncing to the Backups tab.
      pickerRows: [],
      pickerLoading: false,
      pickerFilter: '',
      // PR-M: the captured body of the last successful POST /api/restore.
      // Retry replays this verbatim so the user doesn't have to re-toggle
      // checkboxes after a transient failure.
      lastBody: null,
      // PR-M: the highlighted line surfaced after a failed run. Recomputed
      // from this.log on each `done` event with non-zero exit_code.
      rootCause: '',
      // PR-M: transient label on the "Copy log" button (e.g. "Copied!").
      // Cleared by a setTimeout so the button reverts to its default label.
      copyState: '',
      // PR-Y6: guided-restore state. `guidedStep` is 1..3; the rest are
      // the per-step form fields. Persistence is intentional: navigating
      // away and back keeps the user where they were so a half-filled
      // wizard isn't lost. The mode itself is on $store.dbx.restoreMode
      // so it also survives view switches.
      guidedStep: 1,
      guidedTarget: '',
      guidedAcknowledged: false,
      guidedScrub: true,        // default ON; turned off only deliberately
      diff: null,
      diffLoading: false,
      diffError: '',

      init() {
        // Re-read the selected backup whenever the user switches into the
        // Restore view. Cheaper than a Watch on $store.dbx.selectedBackup
        // and keeps the form snapshot of what was clicked in Backups.
        this.$watch('$store.dbx.view', (v) => { if (v === 'restore') this.refresh(); });
        // PR-Y6: in guided mode, the user may have arrived from Backups
        // with a selectedBackup already staged. Skip step 1 in that case
        // so they land on the "name your target" step.
        if (this.mode() === 'guided' && Alpine.store('dbx').selectedBackup) {
          this.guidedStep = 2;
        }
        this.refresh();
        this.resumeJob();
      },

      // Reattach to a restore that was running when the page was last open.
      // The server keeps the job alive and buffers its output; on reload we
      // re-subscribe and replay it. A stale id (server restarted) streams a
      // 404, handled in attachStream's onerror as "nothing to resume".
      resumeJob() {
        let saved = null;
        try { saved = localStorage.getItem('dbx:job:restore'); } catch (e) { return; }
        if (!saved) return;
        this.jobId = saved;
        this.running = true;
        this.status = 'Reattaching to running restore…';
        this.log = [];
        this.rootCause = '';
        this.startedAt = Date.now();
        this.startTicker();
        this.attachStream(saved);
      },

      // PR-Y6: read the mode flag from the shared store. Wrapped in a
      // method (not a getter) so Alpine's reactivity tracks store mutations
      // the same way it does for $store.dbx.view in other views.
      mode() { return Alpine.store('dbx').restoreMode || 'quick'; },
      setMode(m) {
        if (this.running) return;
        Alpine.store('dbx').restoreMode = m;
        if (m === 'guided') {
          // Land on step 2 if we already have a source; otherwise step 1.
          this.guidedStep = this.source ? 2 : 1;
          // Default target name = `<db>_restored_YYYYMMDD` so the user has
          // a sensible suggestion to override. Mirrors the CLI auto-name
          // shape (which uses the backup timestamp). Computed here rather
          // than on each render so editing in the field doesn't fight the
          // suggestion.
          if (this.source && !this.guidedTarget) {
            this.guidedTarget = this.defaultTargetName();
          }
        }
      },

      defaultTargetName() {
        if (!this.source || !this.source.database) return '';
        const d = new Date();
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        return `${this.source.database}_restored_${yyyy}${mm}${dd}`;
      },

      // Step 1 → step 2: stage the source and seed the target name.
      pickGuided(b) {
        if (!b.complete) return;
        Alpine.store('dbx').selectedBackup = b;
        this.source = b;
        this.guidedTarget = this.defaultTargetName();
        // Reset prod ack when a new source is picked so the user has to
        // re-affirm if they switch from a prod backup to a stage one and
        // back, or vice versa.
        this.guidedAcknowledged = false;
        // Default scrub ON for prod sources; stays at user's last choice
        // for non-prod (they may have unchecked it on purpose).
        if (b.safety === 'prod') this.guidedScrub = true;
        this.guidedStep = 2;
      },

      guidedBack() {
        if (this.running) return;
        if (this.guidedStep > 1) this.guidedStep -= 1;
      },

      guidedNext() {
        if (!this.guidedCanAdvance()) return;
        if (this.guidedStep === 2) {
          this.guidedStep = 3;
          this.loadDiff();
          return;
        }
      },

      // Step 2 → step 3 gate: must have a source, a valid target name (or
      // empty for auto), and for prod sources the "I understand" checkbox.
      guidedCanAdvance() {
        if (!this.source) return false;
        if (this.guidedTarget && !/^[A-Za-z0-9][A-Za-z0-9_-]{0,63}$/.test(this.guidedTarget)) {
          return false;
        }
        if (this.source.safety === 'prod' && !this.guidedAcknowledged) {
          return false;
        }
        return true;
      },

      // Step 3 load: ask the server what'll happen against this target.
      async loadDiff() {
        if (!this.source) return;
        this.diff = null;
        this.diffError = '';
        this.diffLoading = true;
        try {
          // `host/db/latest` shape — same source format the POST endpoint
          // accepts. The server resolves it to the newest sql.zst[.age|.gpg]
          // under DATA_DIR/<host>/<db>/.
          const src = `${this.source.host}/${this.source.database}/latest`;
          const target = this.guidedTarget || this.defaultTargetName() || 'restored';
          const params = new URLSearchParams({ source: src, target });
          const r = await fetch(Alpine.store('dbx').api('/restore/diff') + '&' + params.toString());
          if (!r.ok) {
            const err = await r.json().catch(() => ({ error: `HTTP ${r.status}` }));
            this.diffError = err.error || `HTTP ${r.status}`;
            return;
          }
          this.diff = await r.json();
        } catch (e) {
          this.diffError = `Network error: ${e}`;
        } finally {
          this.diffLoading = false;
        }
      },

      // Step 3 → fire restore. Builds the same body shape as buildBody()
      // but pulls fields from the guided state.
      runGuided() {
        if (this.running || !this.source) return;
        const body = { source: this.source.path };
        if (this.guidedTarget) body.name = this.guidedTarget;
        if (!this.guidedScrub)  body.no_scrub = true;
        this.start(body);
      },

      async refresh() {
        this.source = Alpine.store('dbx').selectedBackup;
        // PR-K: when nothing is staged, populate the inline picker. We do
        // this BEFORE the early-return below so the picker is ready by the
        // time Alpine renders it.
        if (!this.source) {
          await this.loadPicker();
          return;
        }
        // Reset form + log when the source changes.
        if (!this.running) {
          this.log = [];
          this.status = '';
          this.exitCode = null;
          this.startedAt = null;
          this.elapsed = 0;
          this.rootCause = '';
        }
        // If the new source is a MySQL backup, clear any stale --into
        // value from a previous (postgres) selection. Otherwise the
        // hidden picker still has a value and buildConfig() would send
        // it to the server, which would then 400 with the CLI's
        // "--into is only supported for postgres" error.
        if (this.isMysql()) this.form.into = '';
        // Pull container list for the --into picker.
        try {
          const r = await fetch(Alpine.store('dbx').api('/containers'));
          if (r.ok) this.containers = await r.json();
        } catch (e) { this.containers = []; }
      },

      // PR-K: load /api/backups for the inline picker. Mirrors dbxBackups()
      // load() but lives here so the picker is self-contained and doesn't
      // depend on the Backups view component being mounted.
      async loadPicker() {
        this.pickerLoading = true;
        try {
          const r = await fetch(Alpine.store('dbx').api('/backups'));
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          this.pickerRows = await r.json();
        } catch (e) {
          this.pickerRows = [];
          console.error('Failed to load backups for picker:', e);
        } finally {
          this.pickerLoading = false;
        }
      },

      // PR-K: apply the search filter to the picker rows. Same shape as
      // dbxBackups().filtered() — host or database substring, lowercased.
      pickerFiltered() {
        const f = this.pickerFilter.trim().toLowerCase();
        const rows = f
          ? this.pickerRows.filter(b =>
              b.host.toLowerCase().includes(f) || b.database.toLowerCase().includes(f))
          : this.pickerRows;
        return this.applySort(rows);
      },

      // PR-K: stage a row as the selected backup. Same effect as clicking
      // "Restore" on the Backups view — drops into the shared store, which
      // refresh() then promotes to this.source on the next tick.
      pick(b) {
        if (!b.complete) return;
        Alpine.store('dbx').selectedBackup = b;
        this.refresh();
      },

      // PR-K helpers, kept in sync with dbxBackups()'s formatters so the
      // picker renders the same columns the user sees on the Backups tab.
      formatSize(n) { return dbxFmt.size(n); },

      formatWhen(b) { return dbxFmt.date(b.timestamp || b.mtime); },

      buildBody() {
        const body = { source: this.source.path };
        if (this.form.name)            body.name = this.form.name;
        if (this.form.into)            body.into = this.form.into;
        if (this.form.no_post_restore) body.no_post_restore = true;
        if (this.form.hooks_only)      body.hooks_only = true;
        if (this.form.no_scrub)        body.no_scrub = true;
        if (this.form.keep_download)   body.keep_download = true;
        return body;
      },

      async start(bodyOverride) {
        if (this.running) return;
        this.log = [];
        this.status = 'Starting restore…';
        this.running = true;
        // PR-M: clear the root-cause panel from any previous failed run.
        this.rootCause = '';
        // Reset elapsed state on a fresh run; we'll set startedAt only on
        // a successful POST so a 4xx response doesn't kick off the timer.
        this.startedAt = null;
        this.elapsed = 0;
        this.stopTicker();
        // PR-M: snapshot the body that we're about to send so retry() can
        // replay it verbatim. Use the override if the caller (retry) passed
        // one explicitly; otherwise build fresh from the form.
        const body = bodyOverride || this.buildBody();
        this.lastBody = body;
        try {
          const r = await fetch(Alpine.store('dbx').api('/restore'), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          if (!r.ok) {
            const err = await r.json().catch(() => ({ error: `HTTP ${r.status}` }));
            this.status = `Failed to start: ${err.error || r.status}`;
            this.running = false;
            return;
          }
          const { job_id } = await r.json();
          this.jobId = job_id;
          try { localStorage.setItem('dbx:job:restore', job_id); } catch (e) {}
          // Timer starts when the server accepted the job. setInterval at
          // 1s gives a once-per-second tick; the JS `elapsed` field is
          // recomputed from Date.now() each tick so we never accumulate
          // drift if the browser is throttled while backgrounded.
          this.startedAt = Date.now();
          this.startTicker();
          this.attachStream(job_id);
        } catch (e) {
          this.status = `Network error: ${e}`;
          this.running = false;
        }
      },

      // PR-M: re-issue the previous body. If lastBody was never populated
      // (e.g. user clicks Retry before any run), fall back to building
      // from the current form so we still do the sensible thing.
      retry() {
        const body = this.lastBody || this.buildBody();
        this.start(body);
      },

      // PR-M: scan the captured log lines (back to front) for a dump-tool
      // error line. Returns '' if nothing matches — the panel then stays
      // hidden. Regex deliberately broad to catch the common engines
      // (mysqldump, mysql, pg_dump, pg_restore) plus generic [ERROR]
      // markers that dbx itself emits via log_err.
      detectRootCause(lines) {
        // Iterate back to front: the LAST error line is usually the
        // proximate cause; earlier ones are often noise from cleanup.
        const pat = /^\[ERROR\]|^ERROR \d|^mysqldump:.*[Ee]rror|^mysql:.*[Ee]rror|^pg_restore: error|^pg_dump: error|^FATAL:/;
        for (let i = lines.length - 1; i >= 0; i--) {
          if (pat.test(lines[i])) return lines[i];
        }
        return '';
      },

      // PR-M: copy the full captured log to the clipboard for pasting
      // into bug reports / chats. Falls back to a doc.execCommand path
      // when the Async Clipboard API is unavailable (non-HTTPS, old
      // browsers); see MDN for the writeText caveat.
      async copyLog() {
        if (!this.log.length) return;
        const text = this.log.join('\n');
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(text);
          } else {
            // Legacy fallback. textarea must be in the DOM for execCommand
            // to read its selection, so attach + detach inside the same tick.
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
          }
          this.copyState = 'Copied!';
        } catch (e) {
          this.copyState = 'Copy failed';
        } finally {
          // Revert the button label after a beat so the user sees the
          // confirmation but the button doesn't get permanently labeled.
          setTimeout(() => { this.copyState = ''; }, 1500);
        }
      },

      startTicker() {
        this.stopTicker();
        // Compute immediately so the user doesn't see "0m 0s" for a full second
        this.elapsed = Math.floor((Date.now() - this.startedAt) / 1000);
        this.tickHandle = setInterval(() => {
          if (!this.startedAt) return;
          this.elapsed = Math.floor((Date.now() - this.startedAt) / 1000);
        }, 1000);
      },

      stopTicker() {
        if (this.tickHandle != null) {
          clearInterval(this.tickHandle);
          this.tickHandle = null;
        }
      },

      // Pure formatter — matches the format_duration semantics on the
      // bash side (Ns / XmYs / XhYmZs). No DOM dependencies; easy to unit
      // test from node if/when we add a JS smoke harness.
      formatElapsed(secs) {
        if (!Number.isFinite(secs) || secs < 0) return '0s';
        const s = Math.floor(secs);
        if (s < 60) return s + 's';
        if (s < 3600) {
          const m = Math.floor(s / 60);
          return m + 'm ' + (s % 60) + 's';
        }
        const h = Math.floor(s / 3600);
        const rem = s % 3600;
        const m = Math.floor(rem / 60);
        return h + 'h ' + m + 'm ' + (rem % 60) + 's';
      },

      attachStream(jobId) {
        // EventSource handles reconnects on transient drops automatically.
        const url = Alpine.store('dbx').api(`/jobs/${jobId}/events`);
        const es = new EventSource(url);
        this.eventSource = es;
        es.onmessage = (ev) => {
          try {
            const { line } = JSON.parse(ev.data);
            if (line !== undefined) {
              this.log.push(line);
              if (this.log.length > this.maxLogLines) {
                this.log.splice(0, this.log.length - this.maxLogLines);
              }
            }
          } catch (e) { /* ignore */ }
        };
        es.addEventListener('done', (ev) => {
          try {
            const { exit_code } = JSON.parse(ev.data);
            this.exitCode = exit_code;
            this.status = exit_code === 0
              ? 'Restore completed successfully.'
              : `Restore failed (exit ${exit_code}).`;
            // PR-M: on a non-zero exit, hoist the last dump-tool error
            // line into the highlighted panel. Computed once here rather
            // than reactively so a long log isn't re-scanned on every
            // unrelated re-render.
            if (exit_code !== 0) {
              this.rootCause = this.detectRootCause(this.log);
            } else {
              this.rootCause = '';
            }
          } catch (e) {
            this.status = 'Restore finished (unknown exit code).';
          } finally {
            this.running = false;
            // Final tick so the elapsed shows total wall-clock time of
            // the run, then stop the interval. We keep startedAt set so
            // the badge stays visible until the user clears the log.
            if (this.startedAt) {
              this.elapsed = Math.floor((Date.now() - this.startedAt) / 1000);
            }
            this.stopTicker();
            try { localStorage.removeItem('dbx:job:restore'); } catch (e) {}
            es.close();
            this.eventSource = null;
          }
        });
        es.onerror = () => {
          // readyState CLOSED = the server failed the stream outright (e.g. a
          // stale job id after a server restart); the browser won't retry, so
          // stop and drop the saved id. CONNECTING = a transient drop being
          // retried, so leave a live job alone.
          if (es.readyState === EventSource.CLOSED) {
            this.running = false;
            this.stopTicker();
            es.close();
            this.eventSource = null;
            try { localStorage.removeItem('dbx:job:restore'); } catch (e) {}
            if (this.log.length === 0) this.status = 'No running restore to resume.';
          } else if (!this.running) {
            es.close();
            this.eventSource = null;
          }
        };
      },

      async cancel() {
        if (!this.jobId) return;
        try {
          await fetch(Alpine.store('dbx').api(`/jobs/${this.jobId}/cancel`), { method: 'POST' });
        } catch (e) { /* swallow */ }
        // The server's done event will arrive shortly after SIGTERM and
        // flip running=false. No need to do it here.
      },

      clearLog() {
        this.log = [];
        this.status = '';
        this.exitCode = null;
        this.startedAt = null;
        this.elapsed = 0;
        // PR-M: drop the root-cause panel along with the rest of the
        // post-run state.
        this.rootCause = '';
        this.stopTicker();
      },

      // Map run state to a shared .note tone for the status banner.
      statusNoteClass() {
        if (this.running) return 'note--info';
        if (this.exitCode === 0) return 'note--info';
        if (this.exitCode != null) return 'note--danger';
        return '';
      },

      // Mirror the CLI refusal: `dbx restore --into <c>` against a
      // backup whose source host is safety=prod is rejected. Block the
      // Start button up front so the user gets immediate feedback
      // rather than a server-side error.
      prodIntoBlocked() {
        return !!(this.source && this.source.safety === 'prod' && this.form.into);
      },

      // `dbx restore --into <c>` is postgres-only — the CLI rejects it
      // for MySQL/MariaDB backups with "--into is only supported for
      // postgres restores". Disable the picker in the UI so the user
      // can't even reach that error.
      isMysql() {
        if (!this.source) return false;
        const f = (this.source.source_flavor || '').toLowerCase();
        return f === 'mysql' || f === 'mariadb';
      },
    });
  }
</script>
