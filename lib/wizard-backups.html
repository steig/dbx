<!--
  Backups view fragment. Loaded by `dbx wizard` only (NOT embedded in mkdocs).
  Fetches /api/backups on mount and renders a filterable table. The "Restore"
  button stages the row in $store.dbx.selectedBackup and switches view — the
  Restore view itself lands in a follow-up commit.
-->
<style>
  .bk-loading { padding: 28px 12px; color: var(--text-3); }
  .tbl tbody tr.is-incomplete { opacity: .55; }
  .tbl tbody tr.is-incomplete:hover { opacity: .75; }
</style>

<div x-data="dbxBackups()" x-init="init()">
  <div class="page-head">
    <div>
      <p class="page-title">Operate</p>
      <h1 class="page-h1">Backups</h1>
      <p class="page-sub" x-text="subtitle()"></p>
    </div>
    <div class="head-actions">
      <button class="btn btn--ghost" @click="load()" :disabled="loading">Refresh</button>
    </div>
  </div>

  <div class="toolbar">
    <div class="search">
      <input type="search" x-model="filter"
             placeholder="Filter by host, database, or file…">
    </div>
    <div class="seg">
      <button :class="{ active: freshFilter === 'all' }"   @click="setFresh('all')">All</button>
      <button :class="{ active: freshFilter === 'fresh' }" @click="setFresh('fresh')">Fresh</button>
      <button :class="{ active: freshFilter === 'aging' }" @click="setFresh('aging')">Aging</button>
      <button :class="{ active: freshFilter === 'stale' }" @click="setFresh('stale')">Stale</button>
    </div>
    <span class="spacer"></span>
    <span class="card__hint" x-text="countHint()"></span>
  </div>

  <template x-if="loading">
    <div class="bk-loading">Loading…</div>
  </template>

  <template x-if="!loading && rows.length === 0">
    <div class="empty">
      <div class="empty__title">No backups yet</div>
      <div>Nothing found under <span class="mono" x-text="dataDir() || '~/.data/dbx'"></span>.</div>
    </div>
  </template>

  <template x-if="!loading && rows.length > 0">
    <div class="card card--flush">
      <table class="tbl">
        <thead>
          <tr>
            <th>Host / DB</th>
            <th>File</th>
            <th class="num">Created</th>
            <th class="num">Size</th>
            <th>Tags</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <template x-for="b in filtered()" :key="b.path">
            <tr :class="{ 'is-incomplete': !b.complete }">
              <td>
                <span x-text="b.host"></span>
                <span class="muted">/ <span x-text="b.database"></span></span>
              </td>
              <td class="mono" :class="{ muted: !b.complete }" x-text="b.filename"></td>
              <td class="num" x-text="formatWhen(b)"></td>
              <td class="num" x-text="formatSize(b.size)"></td>
              <td>
                <span class="chip"
                      :class="{ 'chip--enc': b.encryption === 'age' || b.encryption === 'gpg' }"
                      x-text="b.encryption"></span>
                <template x-if="b.safety === 'prod'">
                  <span class="chip chip--prod">prod</span>
                </template>
                <template x-if="b.safety === 'stage'">
                  <span class="chip chip--stage">staging</span>
                </template>
                <template x-if="b.complete">
                  <span class="chip chip--complete"
                        title="Backup has a .meta.json sidecar — finished successfully">complete</span>
                </template>
                <template x-if="!b.complete">
                  <span class="chip chip--incomplete"
                        title="No .meta.json sidecar — likely a partial backup from a crashed run. Safe to delete.">incomplete</span>
                </template>
                <span class="chip"
                      :class="{ 'chip--fresh': freshness(b) === 'fresh',
                                'chip--aging': freshness(b) === 'aging',
                                'chip--stale': freshness(b) === 'stale' }"
                      x-text="freshness(b)"></span>
              </td>
              <td>
                <div class="tbl__actions">
                  <button class="btn btn--primary btn--sm" @click="restore(b)"
                          :disabled="!b.complete"
                          :title="b.complete ? 'Restore this backup' : 'Cannot restore an incomplete backup'">Restore</button>
                  <a class="btn btn--ghost btn--sm" :href="downloadHref(b)" download
                     title="Download this backup file">Download</a>
                  <button class="btn btn--danger btn--sm" @click="deleteBackup(b)"
                          title="Delete this backup and its .meta.json sidecar (no undo)">Delete</button>
                </div>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </template>
</div>

<script>
  function dbxBackups() {
    return {
      rows: [],
      loading: true,
      filter: '',
      freshFilter: 'all',

      init() {
        // The Dashboard view sets $store.dbx.backupFilter to "host/db" when
        // the user clicks a card. Consume it here so the search input lands
        // pre-populated, then clear the store value so manual navigation
        // back to Backups doesn't re-apply a stale filter.
        const incoming = Alpine.store('dbx').backupFilter;
        if (incoming) {
          this.filter = incoming;
          Alpine.store('dbx').backupFilter = '';
        }
        // Re-consume the filter on every entry to this view. Watching the
        // shared `view` flag is cheaper than a polling timer.
        this.$watch('$store.dbx.view', (v) => {
          if (v !== 'backups') return;
          const f = Alpine.store('dbx').backupFilter;
          if (f) {
            this.filter = f;
            Alpine.store('dbx').backupFilter = '';
          }
        });
        this.load();
      },

      async load() {
        this.loading = true;
        try {
          const r = await fetch(Alpine.store('dbx').api('/backups'));
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          this.rows = await r.json();
        } catch (e) {
          this.rows = [];
          console.error('Failed to load backups:', e);
        } finally {
          this.loading = false;
        }
      },

      filtered() {
        const f = this.filter.trim().toLowerCase();
        let rows = this.rows;
        if (f) {
          // Dashboard hands us "host/db" — try the combined form first so a
          // click from a card narrows to exactly that pair, then fall back
          // to substring match on either field for free-typed filters.
          rows = rows.filter(b => {
            const hostDb = (b.host + '/' + b.database).toLowerCase();
            return hostDb.includes(f)
              || b.host.toLowerCase().includes(f)
              || b.database.toLowerCase().includes(f);
          });
        }
        if (this.freshFilter !== 'all') {
          rows = rows.filter(b => this.freshness(b) === this.freshFilter);
        }
        return rows;
      },

      // Freshness bucket from the file's mtime, mirroring the server's
      // dashboard thresholds (fresh <24h, aging <7d, else stale — see
      // wizard-server.py:1441). Additive client-side derivation; the
      // /api/backups payload always carries `mtime`.
      freshness(b) {
        if (b.mtime == null) return 'stale';
        const ageDays = (Date.now() / 1000 - b.mtime) / 86400;
        if (ageDays < 1) return 'fresh';
        if (ageDays < 7) return 'aging';
        return 'stale';
      },

      setFresh(which) {
        this.freshFilter = which;
      },

      countHint() {
        if (this.loading) return '';
        const shown = this.filtered();
        const totalBytes = shown.reduce((sum, b) => sum + (b.size || 0), 0);
        const n = shown.length;
        return `${n} backup${n === 1 ? '' : 's'} · ${this.formatSize(totalBytes)}`;
      },

      subtitle() {
        if (this.loading) return 'Reading from your DATA_DIR…';
        const n = this.rows.length;
        if (n === 0) return 'No backups yet.';
        const filtered = this.filtered().length;
        return filtered === n
          ? `${n} backup${n === 1 ? '' : 's'} across ${this.uniqueHosts()} host${this.uniqueHosts() === 1 ? '' : 's'}.`
          : `${filtered} of ${n} backups matching the filter.`;
      },

      uniqueHosts() {
        return new Set(this.rows.map(r => r.host)).size;
      },

      dataDir() {
        return null;   // server doesn't expose DATA_DIR yet; default subtitle copy
      },

      formatSize(n) {
        if (n == null) return '—';
        if (n < 1024) return n + ' B';
        if (n < 1024 ** 2) return (n / 1024).toFixed(1) + ' KB';
        if (n < 1024 ** 3) return (n / 1024 / 1024).toFixed(1) + ' MB';
        return (n / 1024 ** 3).toFixed(2) + ' GB';
      },

      formatWhen(b) {
        if (b.timestamp) return b.timestamp;
        if (b.mtime) return new Date(b.mtime * 1000).toISOString().replace('T', ' ').replace(/\..+/, '');
        return '—';
      },

      sourceLabel(b) {
        // mysql_detect_server_version / pg_detect_server_version return the
        // sentinels "unknown" / "0" when probing the source failed (e.g.
        // SSH tunnel auth issue, or the user lacks SELECT on version()).
        // Render those gracefully rather than as the raw "unknown 0".
        const rawFlavor = (b.source_flavor || '').trim();
        const rawMajor  = String(b.source_major_version || '').trim();
        const flavor = (rawFlavor && rawFlavor !== 'unknown') ? rawFlavor : '';
        const major  = (rawMajor  && rawMajor  !== '0' && rawMajor !== 'unknown') ? rawMajor : '';
        if (!flavor && !major) return '—';
        if (!major) return flavor;
        if (!flavor) return major;
        return `${flavor} ${major}`;
      },

      // Build the download URL: the shared api() helper already appends
      // ?token=…, so the file path is added as a second query param. The
      // server validates it resolves to a real backup file inside DATA_DIR.
      downloadHref(b) {
        return Alpine.store('dbx').api('/backups/download') + '&path=' + encodeURIComponent(b.path);
      },

      restore(b) {
        if (!b.complete) return;
        Alpine.store('dbx').selectedBackup = b;
        Alpine.store('dbx').view = 'restore';
      },

      async deleteBackup(b) {
        const label = `${b.host}/${b.database}/${b.filename}`;
        const detail = b.complete ? '' : '\n\n(This backup is INCOMPLETE — safe to delete; it can\'t be restored anyway.)';
        if (!window.confirm(`Delete ${label}?${detail}\n\nThis cannot be undone.`)) return;
        try {
          const r = await fetch(Alpine.store('dbx').api('/backups/delete'), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ path: b.path }),
          });
          if (!r.ok) {
            const err = await r.json().catch(() => ({ error: `HTTP ${r.status}` }));
            window.alert(`Delete failed: ${err.error || r.status}`);
            return;
          }
          // Optimistic: drop the row locally without a full reload.
          this.rows = this.rows.filter(row => row.path !== b.path);
        } catch (e) {
          window.alert(`Network error: ${e}`);
        }
      },
    };
  }
</script>
