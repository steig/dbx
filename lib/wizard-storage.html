<!--
  Storage view fragment. Loaded by `dbx wizard` only (NOT embedded in mkdocs).
  Three panels:
    1. Disk-usage bar (total backup bytes / total file count / free space).
    2. Per host/db table sortable by size descending.
    3. Retention preview + Apply button that spawns `dbx clean`.

  /api/storage/usage    — composed payload from DATA_DIR + statvfs.
  /api/storage/clean-preview?keep=N&older_than=D — preview the sweep.
  /api/storage/clean    — actually spawns dbx clean with the chosen args.

  Job output streams via /api/jobs/<id>/events, same SSE machinery used by
  Restore + Backup views.
-->
<style>
  .dbx-storage__layout { display: grid; grid-template-columns: minmax(0, 2fr) minmax(280px, 1fr); gap: 1.25rem; align-items: flex-start; }
  @media (max-width: 880px) {
    .dbx-storage__layout { grid-template-columns: 1fr; }
  }

  .dbx-storage__usage-bar { background: var(--md-code-bg-color); border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 1rem; }
  .dbx-storage__usage-head { display: flex; align-items: baseline; justify-content: space-between; gap: 0.75rem; margin-bottom: 0.5rem; font-size: 0.875rem; }
  .dbx-storage__usage-head strong { font-variant-numeric: tabular-nums; }
  .dbx-storage__usage-track { position: relative; height: 12px; background: var(--md-default-fg-color--lightest); border-radius: 6px; overflow: hidden; }
  .dbx-storage__usage-fill { position: absolute; left: 0; top: 0; bottom: 0; background: var(--md-accent-fg-color); border-radius: 6px; transition: width 0.2s ease; }
  .dbx-storage__usage-fill--full { background: #c43d3d; }
  .dbx-storage__usage-fill--high { background: #da8721; }
  .dbx-storage__usage-meta { color: var(--md-default-fg-color--light); font-size: 0.8125rem; margin-top: 0.375rem; }

  .dbx-storage__summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.75rem; margin-bottom: 1.25rem; }
  .dbx-storage__stat { padding: 0.625rem 0.875rem; border: 1px solid var(--md-default-fg-color--lightest); border-radius: 8px; background: var(--md-default-bg-color); }
  .dbx-storage__stat-label { font-size: 0.7rem; color: var(--md-default-fg-color--light); text-transform: uppercase; letter-spacing: 0.05em; }
  .dbx-storage__stat-value { font-size: 1.25rem; font-weight: 700; margin-top: 0.125rem; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }

  /* Retention preview panel — anchored on the right of the layout. */
  .dbx-storage__preview { border: 1px solid var(--md-accent-fg-color); border-radius: 10px; padding: 1rem 1.125rem; background: rgba(0, 102, 255, 0.06); display: flex; flex-direction: column; gap: 0.75rem; position: sticky; top: 1rem; }
  @media (prefers-color-scheme: dark) {
    .dbx-storage__preview { background: rgba(78, 168, 222, 0.10); }
  }
  .dbx-storage__preview h3 { margin: 0; font-size: 1rem; font-weight: 600; letter-spacing: -0.01em; }
  .dbx-storage__field { display: flex; flex-direction: column; gap: 0.25rem; }
  .dbx-storage__field label { font-size: 0.8125rem; font-weight: 500; }
  .dbx-storage__field input { padding: 0.4rem 0.6rem; border: 1px solid var(--md-default-fg-color--lighter); border-radius: 6px; background: var(--md-default-bg-color); color: var(--md-default-fg-color); font-size: 0.875rem; font-variant-numeric: tabular-nums; }
  .dbx-storage__field small { font-size: 0.75rem; color: var(--md-default-fg-color--light); }
  .dbx-storage__mode { display: flex; gap: 0.5rem; font-size: 0.8125rem; }
  .dbx-storage__mode label { display: flex; align-items: center; gap: 0.25rem; cursor: pointer; }
  .dbx-storage__preview-result { font-size: 0.875rem; line-height: 1.4; padding: 0.625rem 0.75rem; background: var(--md-default-bg-color); border-radius: 6px; border: 1px solid var(--md-default-fg-color--lightest); }
  .dbx-storage__preview-result code { font-family: var(--md-code-font-family); font-size: 0.8125rem; }
  .dbx-storage__preview-error { color: #a83232; font-size: 0.8125rem; }

  .dbx-storage__apply { background: #c43d3d; color: #fff; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.875rem; font-weight: 600; }
  .dbx-storage__apply:disabled { opacity: 0.5; cursor: not-allowed; }
  .dbx-storage__dry { background: transparent; color: var(--md-default-fg-color); border: 1px solid var(--md-default-fg-color--lighter); padding: 0.4rem 0.75rem; border-radius: 6px; cursor: pointer; font-size: 0.8125rem; }
  .dbx-storage__dry:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Per-pair table — clickable rows drill into the Backups view filtered to
     that host/db (same backupFilter mechanism the dashboard cards use). */
  .dbx-storage__pair-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
  .dbx-storage__pair-table th { text-align: left; padding: 0.5rem 0.625rem; border-bottom: 2px solid var(--md-default-fg-color--lightest); font-weight: 600; font-size: 0.8125rem; }
  .dbx-storage__pair-table td { padding: 0.5rem 0.625rem; border-bottom: 1px solid var(--md-default-fg-color--lightest); vertical-align: middle; font-variant-numeric: tabular-nums; }
  .dbx-storage__pair-table tbody tr { cursor: pointer; }
  .dbx-storage__pair-table tbody tr:hover { background: var(--md-code-bg-color); }
  .dbx-storage__pair-table td.dbx-storage__pair-name { font-variant-numeric: normal; }
  .dbx-storage__empty { padding: 1.5rem; text-align: center; color: var(--md-default-fg-color--light); border: 1px dashed var(--md-default-fg-color--lightest); border-radius: 8px; }

  .dbx-storage__log { background: #1a1d22; color: #d4d7dd; font-family: var(--md-code-font-family); font-size: 0.8125rem; padding: 1rem; border-radius: 6px; min-height: 180px; max-height: 420px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; margin-top: 1rem; }
  .dbx-storage__log--empty { color: #666; font-style: italic; }
  .dbx-storage__status { padding: 0.6rem 0.875rem; border-radius: 6px; margin-top: 0.75rem; font-size: 0.875rem; }
  .dbx-storage__status--ok { background: rgba(74, 158, 76, 0.12); color: #2f7d31; }
  .dbx-storage__status--err { background: rgba(196, 61, 61, 0.12); color: #a83232; }
  .dbx-storage__status--running { background: rgba(11, 107, 203, 0.12); color: var(--md-accent-fg-color); }
</style>

<div x-data="dbxStorage()" x-init="init()">
  <header class="dbx-view__header">
    <h2 class="dbx-view__title">Storage</h2>
    <p class="dbx-view__subtitle">
      Disk usage across all backups and a retention sweep that wraps
      <code>dbx clean</code>. Use the preview on the right to see what
      would be deleted before you click Apply.
    </p>
  </header>

  <div class="dbx-storage__toolbar" style="display:flex; gap:0.75rem; align-items:center; margin-bottom:1rem;">
    <button class="dbx-backups__btn" @click="load()" :disabled="loading">Refresh</button>
    <span style="color: var(--md-default-fg-color--light); font-size: 0.875rem;"
          x-text="loading ? 'Reading…' : ''"></span>
  </div>

  <template x-if="loading">
    <p class="dbx-storage__empty">Loading…</p>
  </template>

  <template x-if="!loading">
    <div>
      <!-- Disk usage bar (used / free on DATA_DIR's filesystem). -->
      <div class="dbx-storage__usage-bar">
        <div class="dbx-storage__usage-head">
          <span x-text="usageBarLabel()"></span>
          <strong x-text="usagePercentLabel()"></strong>
        </div>
        <div class="dbx-storage__usage-track">
          <div class="dbx-storage__usage-fill"
               :class="{
                 'dbx-storage__usage-fill--high': usagePercent() >= 70 && usagePercent() < 90,
                 'dbx-storage__usage-fill--full': usagePercent() >= 90,
               }"
               :style="'width:' + Math.min(100, usagePercent()) + '%'"></div>
        </div>
        <div class="dbx-storage__usage-meta" x-text="usageMetaLabel()"></div>
      </div>

      <!-- Top-line totals. -->
      <div class="dbx-storage__summary">
        <div class="dbx-storage__stat">
          <div class="dbx-storage__stat-label">Backup files</div>
          <div class="dbx-storage__stat-value" x-text="usage.total_files"></div>
        </div>
        <div class="dbx-storage__stat">
          <div class="dbx-storage__stat-label">Bytes on disk</div>
          <div class="dbx-storage__stat-value" x-text="formatSize(usage.total_bytes)"></div>
        </div>
        <div class="dbx-storage__stat">
          <div class="dbx-storage__stat-label">Host/db pairs</div>
          <div class="dbx-storage__stat-value" x-text="usage.by_pair.length"></div>
        </div>
        <div class="dbx-storage__stat">
          <div class="dbx-storage__stat-label">Disk free</div>
          <div class="dbx-storage__stat-value" x-text="usage.free_bytes == null ? '—' : formatSize(usage.free_bytes)"></div>
        </div>
      </div>

      <div class="dbx-storage__layout">
        <!-- Per host/db table. Click a row to jump to filtered Backups view. -->
        <div>
          <template x-if="usage.by_pair.length === 0">
            <p class="dbx-storage__empty">
              No backups under <code x-text="usage.data_dir || 'DATA_DIR'"></code>.
              Run <code>dbx backup &lt;host&gt;</code> to create some.
            </p>
          </template>

          <template x-if="usage.by_pair.length > 0">
            <table class="dbx-storage__pair-table">
              <thead>
                <tr>
                  <th>Host</th>
                  <th>Database</th>
                  <th># Backups</th>
                  <th>Total</th>
                  <th>Largest</th>
                  <th>Oldest</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="p in usage.by_pair" :key="p.host + '/' + p.database">
                  <tr @click="drillInto(p)"
                      role="button" tabindex="0"
                      @keydown.enter.prevent="drillInto(p)"
                      @keydown.space.prevent="drillInto(p)"
                      :title="'View backups for ' + p.host + '/' + p.database">
                    <td class="dbx-storage__pair-name" x-text="p.host"></td>
                    <td class="dbx-storage__pair-name" x-text="p.database"></td>
                    <td x-text="p.count"></td>
                    <td x-text="formatSize(p.bytes)"></td>
                    <td x-text="formatSize(p.largest_bytes)"></td>
                    <td x-text="formatDate(p.oldest_iso)"></td>
                  </tr>
                </template>
              </tbody>
            </table>
          </template>
        </div>

        <!-- Retention preview panel. Updates live on input change. -->
        <aside class="dbx-storage__preview">
          <h3>Retention preview</h3>
          <p style="margin:0; color: var(--md-default-fg-color--light); font-size: 0.8125rem;">
            Pick one mode. Adjust the value to see what
            <code>dbx clean</code> would remove.
          </p>

          <div class="dbx-storage__mode">
            <label><input type="radio" name="dbx-storage-mode" value="keep" x-model="mode"> Keep N per pair</label>
            <label><input type="radio" name="dbx-storage-mode" value="older" x-model="mode"> Older than N days</label>
          </div>

          <template x-if="mode === 'keep'">
            <div class="dbx-storage__field">
              <label for="dbx-st-keep">Keep newest per host/db</label>
              <input id="dbx-st-keep" type="number" min="1" max="1000" x-model.number="keepN">
              <small>Range 1–1000. Equivalent to <code>dbx clean --keep N</code>.</small>
            </div>
          </template>

          <template x-if="mode === 'older'">
            <div class="dbx-storage__field">
              <label for="dbx-st-older">Older than (days)</label>
              <input id="dbx-st-older" type="number" min="1" max="3650" x-model.number="olderDays">
              <small>Range 1–3650. Equivalent to <code>dbx clean --older-than D</code>.</small>
            </div>
          </template>

          <template x-if="preview.error">
            <div class="dbx-storage__preview-error" x-text="preview.error"></div>
          </template>

          <template x-if="!preview.error">
            <div class="dbx-storage__preview-result" x-text="previewSentence()"></div>
          </template>

          <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
            <button class="dbx-storage__apply" @click="apply(false)"
                    :disabled="!canApply() || running"
                    :title="canApply() ? 'Spawn dbx clean for real' : 'Nothing to reclaim'">
              <span x-show="!running" x-text="applyLabel()"></span>
              <span x-show="running">Running…</span>
            </button>
            <button class="dbx-storage__dry" @click="apply(true)" :disabled="running"
                    title="Run dbx clean --dry-run; nothing is deleted">
              Dry run
            </button>
          </div>
        </aside>
      </div>

      <!-- Cleanup output panel (same pattern as Restore/Backup views). -->
      <template x-if="status || log.length">
        <div>
          <template x-if="status">
            <div class="dbx-storage__status" :class="statusClass()" x-text="status"></div>
          </template>
          <div class="dbx-storage__log" :class="{ 'dbx-storage__log--empty': !log.length }">
            <template x-if="!log.length">
              <span>(no output yet)</span>
            </template>
            <template x-for="(line, i) in log" :key="i">
              <div x-text="line"></div>
            </template>
          </div>
        </div>
      </template>
    </div>
  </template>
</div>

<script>
  function dbxStorage() {
    return {
      usage: { total_bytes: 0, total_files: 0, free_bytes: null, by_pair: [] },
      loading: true,

      // Retention controls. `mode` flips between keep-count and older-than.
      // The preview endpoint accepts either or both, but the UI is
      // deliberately one-mode-at-a-time so the user matches what the real
      // `dbx clean` is going to do.
      mode: 'keep',
      keepN: 7,
      olderDays: 30,
      preview: { would_delete: [], reclaim_bytes: 0, reclaim_count: 0, error: '' },
      debounceHandle: null,

      // Run state (same shape Restore/Backup use).
      jobId: null,
      eventSource: null,
      running: false,
      log: [],
      status: '',
      exitCode: null,

      init() {
        // Reload usage on tab entry so a backup just taken on the Backup
        // tab is reflected when the user navigates back here. The preview
        // is recomputed in the same watcher because reclaim totals would
        // otherwise lag behind the table.
        this.$watch('$store.dbx.view', (v) => { if (v === 'storage') this.load(); });
        // Recompute the preview whenever the relevant inputs change.
        // Debounced inside refreshPreview so a held-down arrow key on the
        // spinner doesn't hammer the server.
        this.$watch('mode',       () => this.refreshPreview());
        this.$watch('keepN',      () => this.refreshPreview());
        this.$watch('olderDays',  () => this.refreshPreview());
        this.load();
      },

      async load() {
        this.loading = true;
        try {
          const r = await fetch(Alpine.store('dbx').api('/storage/usage'));
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          this.usage = await r.json();
          this.usage.by_pair = this.usage.by_pair || [];
        } catch (e) {
          this.usage = { total_bytes: 0, total_files: 0, free_bytes: null, by_pair: [] };
          console.error('Failed to load storage usage:', e);
        } finally {
          this.loading = false;
        }
        this.refreshPreview();
      },

      refreshPreview() {
        // Debounce so spinner clicks / typed input don't fire one request
        // per keystroke. 300ms matches the spec.
        if (this.debounceHandle) clearTimeout(this.debounceHandle);
        this.debounceHandle = setTimeout(() => this.fetchPreview(), 300);
      },

      async fetchPreview() {
        // Build the query for the chosen mode only. Sending both would
        // give union semantics on the server, but the UI/Apply path only
        // ever invokes one flag — keep them in lockstep.
        const params = new URLSearchParams();
        if (this.mode === 'keep') {
          if (!Number.isInteger(this.keepN) || this.keepN < 1 || this.keepN > 1000) {
            this.preview = { would_delete: [], reclaim_bytes: 0, reclaim_count: 0,
                             error: 'Keep must be an integer between 1 and 1000.' };
            return;
          }
          params.set('keep', String(this.keepN));
        } else {
          if (!Number.isInteger(this.olderDays) || this.olderDays < 1 || this.olderDays > 3650) {
            this.preview = { would_delete: [], reclaim_bytes: 0, reclaim_count: 0,
                             error: 'Older-than must be an integer between 1 and 3650.' };
            return;
          }
          params.set('older_than', String(this.olderDays));
        }
        try {
          const r = await fetch(Alpine.store('dbx').api('/storage/clean-preview') + '&' + params.toString());
          if (!r.ok) {
            const body = await r.json().catch(() => ({ error: `HTTP ${r.status}` }));
            this.preview = { would_delete: [], reclaim_bytes: 0, reclaim_count: 0,
                             error: body.error || `HTTP ${r.status}` };
            return;
          }
          const data = await r.json();
          data.error = '';
          this.preview = data;
        } catch (e) {
          this.preview = { would_delete: [], reclaim_bytes: 0, reclaim_count: 0,
                           error: `Network error: ${e}` };
        }
      },

      canApply() {
        return !this.preview.error && this.preview.reclaim_count > 0;
      },

      applyLabel() {
        if (!this.preview.reclaim_count) return 'Nothing to clean';
        return `Apply (delete ${this.preview.reclaim_count})`;
      },

      previewSentence() {
        const flag = this.mode === 'keep'
          ? `--keep ${this.keepN}`
          : `--older-than ${this.olderDays}`;
        if (!this.preview.reclaim_count) {
          return `dbx clean ${flag} would not delete anything.`;
        }
        return `If you ran \`dbx clean ${flag}\` you'd reclaim ${this.formatSize(this.preview.reclaim_bytes)} across ${this.preview.reclaim_count} file${this.preview.reclaim_count === 1 ? '' : 's'}.`;
      },

      // The Apply button is destructive — confirm before spawning.
      // `dryRun` skips the confirm (and passes --dry-run to dbx clean).
      async apply(dryRun) {
        if (this.running) return;
        if (!dryRun) {
          if (!this.canApply()) return;
          const msg = `Delete ${this.preview.reclaim_count} backup file${this.preview.reclaim_count === 1 ? '' : 's'} reclaiming ${this.formatSize(this.preview.reclaim_bytes)}?\n\nThis cannot be undone.`;
          if (!window.confirm(msg)) return;
        }
        const body = { dry_run: !!dryRun };
        if (this.mode === 'keep') body.keep = this.keepN;
        else                       body.older_than = this.olderDays;

        this.log = [];
        this.status = dryRun ? 'Starting dry run…' : 'Starting cleanup…';
        this.running = true;
        this.exitCode = null;
        try {
          const r = await fetch(Alpine.store('dbx').api('/storage/clean'), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          if (!r.ok) {
            const err = await r.json().catch(() => ({ error: `HTTP ${r.status}` }));
            this.status = `Failed to start: ${err.error || r.status}`;
            this.running = false;
            return;
          }
          const { job_id } = await r.json();
          this.jobId = job_id;
          this.attachStream(job_id);
        } catch (e) {
          this.status = `Network error: ${e}`;
          this.running = false;
        }
      },

      attachStream(jobId) {
        const url = Alpine.store('dbx').api(`/jobs/${jobId}/events`);
        const es = new EventSource(url);
        this.eventSource = es;
        es.onmessage = (ev) => {
          try {
            const { line } = JSON.parse(ev.data);
            if (line !== undefined) this.log.push(line);
          } catch (e) { /* ignore */ }
        };
        es.addEventListener('done', (ev) => {
          try {
            const { exit_code } = JSON.parse(ev.data);
            this.exitCode = exit_code;
            this.status = exit_code === 0
              ? 'Cleanup completed.'
              : `Cleanup failed (exit ${exit_code}).`;
          } catch (e) {
            this.status = 'Cleanup finished (unknown exit code).';
          } finally {
            this.running = false;
            es.close();
            this.eventSource = null;
            // Refresh usage + preview after the sweep so the table reflects
            // what's actually still on disk. Skip on dry-run (nothing
            // changed) but the extra fetch is cheap enough that we don't
            // bother branching on it.
            this.load();
          }
        });
        es.onerror = () => {
          if (!this.running) { es.close(); this.eventSource = null; }
        };
      },

      statusClass() {
        if (this.running) return 'dbx-storage__status--running';
        if (this.exitCode === 0) return 'dbx-storage__status--ok';
        if (this.exitCode != null) return 'dbx-storage__status--err';
        return '';
      },

      drillInto(p) {
        // Same backupFilter convention the dashboard cards use — the
        // Backups view consumes the shared store value on next render.
        Alpine.store('dbx').backupFilter = p.host + '/' + p.database;
        Alpine.store('dbx').view = 'backups';
      },

      // Used / free presentation helpers.
      usedBytesOnFs() {
        // Free space is a property of the filesystem, not just DATA_DIR —
        // so "used" here is *everything else* on that filesystem. The bar
        // shows total occupied vs total capacity, with the backup share
        // surfaced in the meta line below.
        if (this.usage.free_bytes == null) return null;
        // We don't have a total capacity number; approximate from
        // "free + something" by treating the free fraction as 1 - usage.
        // The percent label uses (1 - free / (free + estimated_used)),
        // but without total we fall back to "free bytes vs free + total
        // backup bytes" which at least shows growth as backups accumulate.
        return null;
      },

      usagePercent() {
        // If we have neither free_bytes nor any backups, render an empty
        // bar (0%). When free_bytes is known, the bar shows the share of
        // backup bytes against (backup + free) so the user sees their
        // backups grow against headroom rather than against unknowable
        // total capacity.
        const total = this.usage.total_bytes;
        const free = this.usage.free_bytes;
        if (free == null || total + free === 0) return 0;
        return Math.round((total / (total + free)) * 100);
      },

      usageBarLabel() {
        const total = this.usage.total_bytes;
        return `Backups on disk: ${this.formatSize(total)}`;
      },

      usagePercentLabel() {
        if (this.usage.free_bytes == null) return '';
        return `${this.usagePercent()}% of available space used`;
      },

      usageMetaLabel() {
        if (this.usage.free_bytes == null) {
          return `${this.usage.total_files} file${this.usage.total_files === 1 ? '' : 's'}.`;
        }
        return `${this.usage.total_files} file${this.usage.total_files === 1 ? '' : 's'} · ${this.formatSize(this.usage.free_bytes)} free on the filesystem holding DATA_DIR.`;
      },

      // Shared formatters — kept in lockstep with Backups + Dashboard so
      // table cells render uniformly across the wizard.
      formatSize(n) {
        if (n == null) return '—';
        if (n < 1024) return n + ' B';
        if (n < 1024 ** 2) return (n / 1024).toFixed(1) + ' KB';
        if (n < 1024 ** 3) return (n / 1024 / 1024).toFixed(1) + ' MB';
        if (n < 1024 ** 4) return (n / 1024 ** 3).toFixed(2) + ' GB';
        return (n / 1024 ** 4).toFixed(2) + ' TB';
      },

      formatDate(iso) {
        if (!iso) return '—';
        // Show "YYYY-MM-DD" only — full timestamp is overkill in a table.
        const d = new Date(iso);
        if (isNaN(d.getTime())) return iso;
        return d.toISOString().slice(0, 10);
      },
    };
  }
</script>
