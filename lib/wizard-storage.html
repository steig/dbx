<!--
  Storage view fragment. Loaded by `dbx wizard` only (NOT embedded in mkdocs).
  Three panels:
    1. Stat tiles from real usage data (on disk / backups / reclaimable / after sweep).
    2. Usage-by-database horizontal-bar list, x-for over per-pair usage.
    3. Retention sweep preview + Run sweep button that spawns `dbx clean`.

  /api/storage/usage    — composed payload from DATA_DIR + statvfs.
  /api/storage/clean-preview?keep=N&older_than=D — preview the sweep.
  /api/storage/clean    — actually spawns dbx clean with the chosen args.

  Job output streams via /api/jobs/<id>/events, same SSE machinery used by
  Restore + Backup views.
-->
<style>
  /* view-unique: horizontal usage-by-database bars. Track uses --surface-2,
     fill uses --accent (per design system; no hex). */
  .dbx-st-bars { display: flex; flex-direction: column; gap: 14px; }
  .dbx-st-bar { display: grid; grid-template-columns: 220px 1fr 84px; align-items: center; gap: 16px; }
  .dbx-st-bar__label { font-weight: 550; }
  .dbx-st-bar__track { height: 8px; border-radius: 999px; background: var(--surface-2); overflow: hidden; }
  .dbx-st-bar__fill { height: 100%; border-radius: 999px; background: var(--accent); transition: width .2s ease; }
  .dbx-st-bar__size { text-align: right; font-variant-numeric: tabular-nums; color: var(--text-2); font-size: 13px; }
  @media (max-width: 640px) {
    .dbx-st-bar { grid-template-columns: 1fr 64px; }
    .dbx-st-bar__track { grid-column: 1 / -1; }
  }
</style>

<div x-data="dbxStorage()" x-init="init()">
  <div class="page-head">
    <div>
      <p class="page-title">Insights</p>
      <h1 class="page-h1">Storage</h1>
      <p class="page-sub">Disk used by backups — and what a retention sweep would reclaim.</p>
    </div>
    <div class="head-actions">
      <span class="updated" x-show="loading">Reading…</span>
      <button class="btn btn--ghost" @click="load()" :disabled="loading">Refresh</button>
      <button class="btn btn--primary" @click="apply(false)"
              :disabled="!canApply() || running"
              :title="canApply() ? 'Spawn dbx clean for real' : 'Nothing to reclaim'">
        <span x-show="!running">Run retention sweep</span>
        <span x-show="running">Running…</span>
      </button>
    </div>
  </div>

  <template x-if="loading">
    <div class="empty">
      <div class="empty__title">Loading…</div>
      Reading storage usage under DATA_DIR.
    </div>
  </template>

  <template x-if="!loading">
    <div>
      <!-- STAT TILES — derived from real usage + preview data. -->
      <div class="tiles" style="margin-bottom:18px;">
        <div class="tile">
          <div class="tile__label">On disk</div>
          <div class="tile__value" x-text="formatSize(usage.total_bytes)"></div>
          <div class="tile__meta" x-text="'across ' + usage.total_files + ' backup' + (usage.total_files === 1 ? '' : 's')"></div>
        </div>
        <div class="tile">
          <div class="tile__label">Backups</div>
          <div class="tile__value" x-text="usage.total_files"></div>
          <div class="tile__meta" x-text="usage.by_pair.length + ' host/db pair' + (usage.by_pair.length === 1 ? '' : 's')"></div>
        </div>
        <div class="tile">
          <div class="tile__label">Reclaimable</div>
          <div class="tile__value" x-text="preview.error ? '—' : formatSize(preview.reclaim_bytes)"></div>
          <div class="tile__meta">
            <template x-if="!preview.error && preview.reclaim_count > 0">
              <span class="delta delta--down" x-text="'▼ ' + preview.reclaim_count + ' old backup' + (preview.reclaim_count === 1 ? '' : 's')"></span>
            </template>
            <template x-if="preview.error || preview.reclaim_count === 0">
              <span x-text="preview.error ? 'preview unavailable' : 'nothing to sweep'"></span>
            </template>
          </div>
        </div>
        <div class="tile">
          <div class="tile__label">After sweep</div>
          <div class="tile__value" x-text="preview.error ? '—' : formatSize(afterSweepBytes())"></div>
          <div class="tile__meta">projected</div>
        </div>
      </div>

      <!-- USAGE BY DATABASE — horizontal bars over real per-pair usage. -->
      <div class="card">
        <div class="card__head">
          <div>
            <div class="card__title">Usage by database</div>
            <div class="card__hint" x-text="usage.total_files + ' backups · ' + formatSize(usage.total_bytes) + ' total'"></div>
          </div>
        </div>

        <template x-if="usage.by_pair.length === 0">
          <div class="empty">
            <div class="empty__title">No backups yet</div>
            Nothing under <span class="mono" x-text="usage.data_dir || 'DATA_DIR'"></span>.
            Run <span class="mono">dbx backup &lt;host&gt;</span> to create some.
          </div>
        </template>

        <template x-if="usage.by_pair.length > 0">
          <div class="dbx-st-bars">
            <template x-for="p in usage.by_pair" :key="p.host + '/' + p.database">
              <div class="dbx-st-bar" @click="drillInto(p)"
                   role="button" tabindex="0"
                   @keydown.enter.prevent="drillInto(p)"
                   @keydown.space.prevent="drillInto(p)"
                   :title="'View backups for ' + p.host + '/' + p.database"
                   style="cursor:pointer;">
                <div class="dbx-st-bar__label">
                  <span x-text="p.host"></span>
                  <span class="muted" style="font-weight:400;" x-text="'/ ' + p.database"></span>
                </div>
                <div class="dbx-st-bar__track">
                  <div class="dbx-st-bar__fill" :style="'width:' + barWidth(p) + '%'"></div>
                </div>
                <div class="dbx-st-bar__size" x-text="formatSize(p.bytes)"></div>
              </div>
            </template>
          </div>
        </template>
      </div>

      <!-- RETENTION SWEEP — preview + danger sweep wired to dbx clean. -->
      <div class="section-title">Retention sweep</div>
      <div class="card">
        <!-- Mode + value controls drive the live preview (existing watchers). -->
        <div class="row" style="margin-bottom:14px; flex-wrap:wrap; gap:16px;">
          <div class="seg">
            <button :class="{ active: mode === 'keep' }" @click="mode = 'keep'">Keep N per pair</button>
            <button :class="{ active: mode === 'older' }" @click="mode = 'older'">Older than N days</button>
          </div>
          <template x-if="mode === 'keep'">
            <label class="check">Keep newest
              <input type="number" min="1" max="1000" x-model.number="keepN" style="width:90px;">
              per host/db
            </label>
          </template>
          <template x-if="mode === 'older'">
            <label class="check">Older than
              <input type="number" min="1" max="3650" x-model.number="olderDays" style="width:90px;">
              days
            </label>
          </template>
        </div>

        <template x-if="preview.error">
          <div class="note note--danger" style="margin-bottom:14px;" x-text="preview.error"></div>
        </template>

        <template x-if="!preview.error">
          <div class="note note--warn" style="margin-bottom:14px;">
            <template x-if="preview.reclaim_count > 0">
              <span>
                Sweeping now removes
                <strong x-text="preview.reclaim_count + ' backup' + (preview.reclaim_count === 1 ? '' : 's')"></strong>
                <span x-text="mode === 'keep' ? ('beyond the newest ' + keepN + ' per pair') : ('older than ' + olderDays + ' days')"></span>,
                reclaiming <strong x-text="formatSize(preview.reclaim_bytes)"></strong>.
              </span>
            </template>
            <template x-if="preview.reclaim_count === 0">
              <span x-text="previewSentence()"></span>
            </template>
          </div>
        </template>

        <template x-if="!preview.error && preview.would_delete.length > 0">
          <table class="tbl">
            <thead>
              <tr>
                <th>File</th>
                <th>Host / DB</th>
                <th>Age</th>
                <th class="num">Size</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              <template x-for="f in preview.would_delete" :key="f.path">
                <tr>
                  <td class="mono" x-text="fileName(f.path)"></td>
                  <td x-text="f.host + ' / ' + f.database"></td>
                  <td x-text="ageLabel(f.timestamp)"></td>
                  <td class="num" x-text="formatSize(f.bytes)"></td>
                  <td><span class="chip chip--stale">remove</span></td>
                </tr>
              </template>
            </tbody>
          </table>
        </template>

        <div class="row" style="margin-top:16px; flex-wrap:wrap;">
          <button class="btn btn--danger" @click="apply(false)"
                  :disabled="!canApply() || running"
                  :title="canApply() ? 'Spawn dbx clean for real' : 'Nothing to reclaim'">
            <span x-show="!running" x-text="applyLabel()"></span>
            <span x-show="running">Running…</span>
          </button>
          <button class="btn btn--ghost" @click="apply(true)" :disabled="running"
                  title="Run dbx clean --dry-run; nothing is deleted">
            Dry run
          </button>
          <button class="btn btn--ghost" @click="load()" :disabled="running">Cancel</button>
          <span class="spacer muted"
                x-show="!preview.error && preview.reclaim_count > 0"
                x-text="'Reclaims ' + formatSize(preview.reclaim_bytes) + ' · ' + preview.reclaim_count + ' file' + (preview.reclaim_count === 1 ? '' : 's')"></span>
        </div>
      </div>

      <!-- Cleanup output panel (same SSE pattern as Restore/Backup views). -->
      <template x-if="status || log.length">
        <div class="card" style="margin-top:14px;">
          <template x-if="status">
            <div class="note" :class="statusNote()" style="margin-bottom:12px;" x-text="status"></div>
          </template>
          <div class="console">
            <template x-if="!log.length">
              <span class="console__line--dim">(no output yet)</span>
            </template>
            <template x-for="(line, i) in log" :key="i">
              <div x-text="line"></div>
            </template>
          </div>
        </div>
      </template>
    </div>
  </template>
</div>

<script>
  function dbxStorage() {
    return {
      usage: { total_bytes: 0, total_files: 0, free_bytes: null, by_pair: [] },
      loading: true,

      // Retention controls. `mode` flips between keep-count and older-than.
      // The preview endpoint accepts either or both, but the UI is
      // deliberately one-mode-at-a-time so the user matches what the real
      // `dbx clean` is going to do.
      mode: 'keep',
      keepN: 7,
      olderDays: 30,
      preview: { would_delete: [], reclaim_bytes: 0, reclaim_count: 0, error: '' },
      debounceHandle: null,

      // Run state (same shape Restore/Backup use).
      jobId: null,
      eventSource: null,
      running: false,
      log: [],
      status: '',
      exitCode: null,

      init() {
        // Reload usage on tab entry so a backup just taken on the Backup
        // tab is reflected when the user navigates back here. The preview
        // is recomputed in the same watcher because reclaim totals would
        // otherwise lag behind the table.
        this.$watch('$store.dbx.view', (v) => { if (v === 'storage') this.load(); });
        // Recompute the preview whenever the relevant inputs change.
        // Debounced inside refreshPreview so a held-down arrow key on the
        // spinner doesn't hammer the server.
        this.$watch('mode',       () => this.refreshPreview());
        this.$watch('keepN',      () => this.refreshPreview());
        this.$watch('olderDays',  () => this.refreshPreview());
        this.load();
      },

      async load() {
        this.loading = true;
        try {
          const r = await fetch(Alpine.store('dbx').api('/storage/usage'));
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          this.usage = await r.json();
          this.usage.by_pair = this.usage.by_pair || [];
        } catch (e) {
          this.usage = { total_bytes: 0, total_files: 0, free_bytes: null, by_pair: [] };
          console.error('Failed to load storage usage:', e);
        } finally {
          this.loading = false;
        }
        this.refreshPreview();
      },

      refreshPreview() {
        // Debounce so spinner clicks / typed input don't fire one request
        // per keystroke. 300ms matches the spec.
        if (this.debounceHandle) clearTimeout(this.debounceHandle);
        this.debounceHandle = setTimeout(() => this.fetchPreview(), 300);
      },

      async fetchPreview() {
        // Build the query for the chosen mode only. Sending both would
        // give union semantics on the server, but the UI/Apply path only
        // ever invokes one flag — keep them in lockstep.
        const params = new URLSearchParams();
        if (this.mode === 'keep') {
          if (!Number.isInteger(this.keepN) || this.keepN < 1 || this.keepN > 1000) {
            this.preview = { would_delete: [], reclaim_bytes: 0, reclaim_count: 0,
                             error: 'Keep must be an integer between 1 and 1000.' };
            return;
          }
          params.set('keep', String(this.keepN));
        } else {
          if (!Number.isInteger(this.olderDays) || this.olderDays < 1 || this.olderDays > 3650) {
            this.preview = { would_delete: [], reclaim_bytes: 0, reclaim_count: 0,
                             error: 'Older-than must be an integer between 1 and 3650.' };
            return;
          }
          params.set('older_than', String(this.olderDays));
        }
        try {
          const r = await fetch(Alpine.store('dbx').api('/storage/clean-preview') + '&' + params.toString());
          if (!r.ok) {
            const body = await r.json().catch(() => ({ error: `HTTP ${r.status}` }));
            this.preview = { would_delete: [], reclaim_bytes: 0, reclaim_count: 0,
                             error: body.error || `HTTP ${r.status}` };
            return;
          }
          const data = await r.json();
          data.error = '';
          this.preview = data;
        } catch (e) {
          this.preview = { would_delete: [], reclaim_bytes: 0, reclaim_count: 0,
                           error: `Network error: ${e}` };
        }
      },

      canApply() {
        return !this.preview.error && this.preview.reclaim_count > 0;
      },

      applyLabel() {
        if (!this.preview.reclaim_count) return 'Nothing to clean';
        return `Run sweep (delete ${this.preview.reclaim_count})`;
      },

      previewSentence() {
        const flag = this.mode === 'keep'
          ? `--keep ${this.keepN}`
          : `--older-than ${this.olderDays}`;
        if (!this.preview.reclaim_count) {
          return `dbx clean ${flag} would not delete anything.`;
        }
        return `If you ran \`dbx clean ${flag}\` you'd reclaim ${this.formatSize(this.preview.reclaim_bytes)} across ${this.preview.reclaim_count} file${this.preview.reclaim_count === 1 ? '' : 's'}.`;
      },

      // The Apply button is destructive — confirm before spawning.
      // `dryRun` skips the confirm (and passes --dry-run to dbx clean).
      async apply(dryRun) {
        if (this.running) return;
        if (!dryRun) {
          if (!this.canApply()) return;
          const msg = `Delete ${this.preview.reclaim_count} backup file${this.preview.reclaim_count === 1 ? '' : 's'} reclaiming ${this.formatSize(this.preview.reclaim_bytes)}?\n\nThis cannot be undone.`;
          if (!window.confirm(msg)) return;
        }
        const body = { dry_run: !!dryRun };
        if (this.mode === 'keep') body.keep = this.keepN;
        else                       body.older_than = this.olderDays;

        this.log = [];
        this.status = dryRun ? 'Starting dry run…' : 'Starting cleanup…';
        this.running = true;
        this.exitCode = null;
        try {
          const r = await fetch(Alpine.store('dbx').api('/storage/clean'), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          if (!r.ok) {
            const err = await r.json().catch(() => ({ error: `HTTP ${r.status}` }));
            this.status = `Failed to start: ${err.error || r.status}`;
            this.running = false;
            return;
          }
          const { job_id } = await r.json();
          this.jobId = job_id;
          this.attachStream(job_id);
        } catch (e) {
          this.status = `Network error: ${e}`;
          this.running = false;
        }
      },

      attachStream(jobId) {
        const url = Alpine.store('dbx').api(`/jobs/${jobId}/events`);
        const es = new EventSource(url);
        this.eventSource = es;
        es.onmessage = (ev) => {
          try {
            const { line } = JSON.parse(ev.data);
            if (line !== undefined) this.log.push(line);
          } catch (e) { /* ignore */ }
        };
        es.addEventListener('done', (ev) => {
          try {
            const { exit_code } = JSON.parse(ev.data);
            this.exitCode = exit_code;
            this.status = exit_code === 0
              ? 'Cleanup completed.'
              : `Cleanup failed (exit ${exit_code}).`;
          } catch (e) {
            this.status = 'Cleanup finished (unknown exit code).';
          } finally {
            this.running = false;
            es.close();
            this.eventSource = null;
            // Refresh usage + preview after the sweep so the table reflects
            // what's actually still on disk. Skip on dry-run (nothing
            // changed) but the extra fetch is cheap enough that we don't
            // bother branching on it.
            this.load();
          }
        });
        es.onerror = () => {
          if (!this.running) { es.close(); this.eventSource = null; }
        };
      },

      statusClass() {
        if (this.running) return 'dbx-storage__status--running';
        if (this.exitCode === 0) return 'dbx-storage__status--ok';
        if (this.exitCode != null) return 'dbx-storage__status--err';
        return '';
      },

      // Map run state to a shared-skin note variant for the output panel.
      statusNote() {
        if (this.running) return 'note--info';
        if (this.exitCode === 0) return 'note--info';
        if (this.exitCode != null) return 'note--danger';
        return '';
      },

      drillInto(p) {
        // Same backupFilter convention the dashboard cards use — the
        // Backups view consumes the shared store value on next render.
        Alpine.store('dbx').backupFilter = p.host + '/' + p.database;
        Alpine.store('dbx').view = 'backups';
      },

      // Largest per-pair bytes, used to scale the usage bars. Returns at
      // least 1 so the width math never divides by zero on empty data.
      maxPairBytes() {
        let max = 0;
        for (const p of this.usage.by_pair) {
          if (p.bytes > max) max = p.bytes;
        }
        return max || 1;
      },

      // Bar width as a percent of the largest pair, floored so tiny pairs
      // still render a visible sliver.
      barWidth(p) {
        const pct = Math.round((p.bytes / this.maxPairBytes()) * 100);
        return Math.max(2, Math.min(100, pct));
      },

      // Projected on-disk bytes once the previewed sweep runs.
      afterSweepBytes() {
        const after = this.usage.total_bytes - this.preview.reclaim_bytes;
        return after > 0 ? after : 0;
      },

      // Last path segment — the user-facing backup filename.
      fileName(path) {
        if (!path) return '—';
        const parts = String(path).split('/');
        return parts[parts.length - 1] || path;
      },

      // Whole-day age relative to now, derived from the file timestamp.
      ageLabel(iso) {
        if (!iso) return '—';
        const then = new Date(iso);
        if (isNaN(then.getTime())) return '—';
        const days = Math.max(0, Math.floor((Date.now() - then.getTime()) / 86400000));
        return `${days}d`;
      },

      // Used / free presentation helpers.
      usedBytesOnFs() {
        // Free space is a property of the filesystem, not just DATA_DIR —
        // so "used" here is *everything else* on that filesystem. The bar
        // shows total occupied vs total capacity, with the backup share
        // surfaced in the meta line below.
        if (this.usage.free_bytes == null) return null;
        // We don't have a total capacity number; approximate from
        // "free + something" by treating the free fraction as 1 - usage.
        // The percent label uses (1 - free / (free + estimated_used)),
        // but without total we fall back to "free bytes vs free + total
        // backup bytes" which at least shows growth as backups accumulate.
        return null;
      },

      usagePercent() {
        // If we have neither free_bytes nor any backups, render an empty
        // bar (0%). When free_bytes is known, the bar shows the share of
        // backup bytes against (backup + free) so the user sees their
        // backups grow against headroom rather than against unknowable
        // total capacity.
        const total = this.usage.total_bytes;
        const free = this.usage.free_bytes;
        if (free == null || total + free === 0) return 0;
        return Math.round((total / (total + free)) * 100);
      },

      usageBarLabel() {
        const total = this.usage.total_bytes;
        return `Backups on disk: ${this.formatSize(total)}`;
      },

      usagePercentLabel() {
        if (this.usage.free_bytes == null) return '';
        return `${this.usagePercent()}% of available space used`;
      },

      usageMetaLabel() {
        if (this.usage.free_bytes == null) {
          return `${this.usage.total_files} file${this.usage.total_files === 1 ? '' : 's'}.`;
        }
        return `${this.usage.total_files} file${this.usage.total_files === 1 ? '' : 's'} · ${this.formatSize(this.usage.free_bytes)} free on the filesystem holding DATA_DIR.`;
      },

      // Shared formatters — kept in lockstep with Backups + Dashboard so
      // table cells render uniformly across the wizard.
      formatSize(n) {
        if (n == null) return '—';
        if (n < 1024) return n + ' B';
        if (n < 1024 ** 2) return (n / 1024).toFixed(1) + ' KB';
        if (n < 1024 ** 3) return (n / 1024 / 1024).toFixed(1) + ' MB';
        if (n < 1024 ** 4) return (n / 1024 ** 3).toFixed(2) + ' GB';
        return (n / 1024 ** 4).toFixed(2) + ' TB';
      },

      formatDate(iso) {
        if (!iso) return '—';
        // Show "YYYY-MM-DD" only — full timestamp is overkill in a table.
        const d = new Date(iso);
        if (isNaN(d.getTime())) return iso;
        return d.toISOString().slice(0, 10);
      },
    };
  }
</script>
