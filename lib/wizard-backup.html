<!--
  Backup view fragment. Loaded by `dbx wizard` only.

  Wraps `dbx backup <host> <database> [-v] [--upload]` with a form +
  EventSource log stream + cancel. Same job/SSE plumbing as the Restore
  view; same /api/jobs/<id>/(events|cancel) endpoints. The new server
  endpoint is POST /api/backup; it validates host against config.json's
  hosts allowlist before spawning so a hand-crafted POST can't run
  `dbx backup` against an unconfigured target.

  Host + Database are dropdowns sourced from GET /api/config so the
  user picks from the same set they configured. (Free-text would also
  reach the host-allowlist validator on the server, but exposing only
  configured options keeps the surface tighter and the UX nicer.)
-->
<style>
  /* View-unique: backup has no numeric percent, so the progress bar runs
     as an indeterminate sweep while a job is live. Uses shared tokens only. */
  .progress--indet .progress__bar {
    width: 35%;
    border-radius: 999px;
    animation: dbx-indet 1.1s ease-in-out infinite;
  }
  @keyframes dbx-indet {
    0%   { margin-left: -35%; }
    100% { margin-left: 100%; }
  }
</style>

<div x-data="dbxBackup()" x-init="init()">
  <div class="page-head">
    <div>
      <p class="page-title">Operate</p>
      <h1 class="page-h1">Backup</h1>
      <p class="page-sub">Create an on-demand backup of a database.</p>
    </div>
  </div>

  <template x-if="hosts.length === 0 && !loadingHosts">
    <div class="empty">
      <div class="empty__title">No hosts configured yet</div>
      <div>Add one in the
        <a @click="$store.dbx.view='config'" style="cursor: pointer;">Config</a> tab first.
      </div>
    </div>
  </template>

  <template x-if="hosts.length > 0">
    <div class="card">
      <div class="card__head">
        <div class="card__title">Backup options</div>
        <div class="card__hint">Host + Database come from <span class="mono">config.json</span></div>
      </div>

      <div class="form-grid">
        <div class="field-row">
          <div class="field" style="flex:1; min-width:200px;">
            <label>Host</label>
            <select x-model="form.host" @change="onHostChange()" :disabled="running">
              <template x-for="h in hosts" :key="h.alias">
                <option :value="h.alias" x-text="h.alias + (h.flavor ? ' (' + h.flavor + ')' : '')"></option>
              </template>
            </select>
          </div>

          <div class="field" style="flex:1; min-width:200px;">
            <label>Database</label>
            <template x-if="databasesForSelected().length > 0">
              <select x-model="form.database" :disabled="running">
                <option value="">(all databases)</option>
                <template x-for="db in databasesForSelected()" :key="db">
                  <option :value="db" x-text="db"></option>
                </template>
              </select>
            </template>
            <template x-if="databasesForSelected().length === 0">
              <input type="text" x-model.trim="form.database" placeholder="(host has no databases[] in config; type one or leave blank for all)" :disabled="running">
            </template>
          </div>
        </div>

        <div class="field">
          <label>Flags</label>
          <div class="field-row">
            <label class="check"><input type="checkbox" x-model="form.verbose" :disabled="running"> Verbose <span class="mono muted">(-v)</span></label>
            <label class="check"><input type="checkbox" x-model="form.upload" :disabled="running"> Upload to cloud storage <span class="mono muted">(--upload)</span></label>
          </div>
          <div class="hint" x-show="form.database === ''">Empty database = back up every DB on the host (<span class="mono">dbx backup &lt;host&gt;</span>).</div>
        </div>
      </div>

      <hr class="divider">

      <div class="row">
        <button class="btn btn--primary" @click="start()" :disabled="running || !form.host">
          <span x-show="!running">Start backup</span>
          <span x-show="running">Running…</span>
        </button>
        <button class="btn btn--danger" @click="cancel()" :disabled="!running">Cancel</button>
        <button class="btn btn--ghost" @click="clearLog()" :disabled="running || log.length === 0">Clear log</button>
      </div>
    </div>
  </template>

  <template x-if="status && !running">
    <div class="note" :class="exitCode === 0 ? 'note--info' : (exitCode != null ? 'note--danger' : '')" style="margin-top:14px;" x-text="status"></div>
  </template>

  <div class="section-title" x-show="running || log.length > 0">Live</div>

  <div class="jobbar" x-show="running">
    <span class="sdot sdot--run"></span>
    <span class="jobbar__status" x-text="status || ('Backing up ' + form.host + (form.database ? ' / ' + form.database : ''))"></span>
    <div class="progress progress--indet"><div class="progress__bar"></div></div>
    <span class="elapsed" x-text="formatElapsed(elapsed)"></span>
  </div>

  <template x-if="log.length > 0">
    <div x-ref="logEl" @scroll="onLogScroll()" class="console"><template x-for="(line, i) in log" :key="i"><span x-text="line + '\n'"></span></template><span class="console__cursor" x-show="running"></span></div>
  </template>
</div>

<script>
  function dbxBackup() {
    return {
      hosts: [],            // [{alias, flavor, databases: []}]
      loadingHosts: false,
      form: { host: '', database: '', verbose: false, upload: false },
      log: [],
      // Cap the live log at a tail window. Verbose dumps (-v) emit a line per
      // object/table, so an unbounded array + one DOM node per line via x-for
      // grows until the browser tab runs out of memory. Keep the most recent
      // lines; older output scrolls off.
      maxLogLines: 5000,
      autoFollow: true,     // tail the log to the bottom unless the user scrolls up
      jobId: null,
      eventSource: null,
      running: false,
      status: '',
      exitCode: null,
      startedAt: null,
      elapsed: 0,
      tickHandle: null,

      init() {
        this.$watch('$store.dbx.view', (v) => { if (v === 'backup') this.refresh(); });
        if (Alpine.store('dbx').view === 'backup') this.refresh();
        this.resumeJob();
      },

      // A backup runs as a server-side job that keeps going (and buffers its
      // output) independently of this page. If one was running when the page
      // was last open, reattach to it after a reload instead of showing an
      // idle form. The server replays the buffered log from the start; a job
      // id that no longer exists (server restarted) streams a 404, which the
      // onerror handler treats as "nothing to resume" and clears.
      resumeJob() {
        let saved = null;
        try { saved = localStorage.getItem('dbx:job:backup'); } catch (e) { return; }
        if (!saved) return;
        this.jobId = saved;
        this.running = true;
        this.status = 'Reattaching to running backup…';
        this.log = [];
        this.autoFollow = true;
        this.startedAt = Date.now();   // original start time is lost across reload
        this.startTicker();
        this.attachStream(saved);
      },

      async refresh() {
        // Reload hosts only if we don't already have them — they don't
        // change while the wizard is running unless the user saves the
        // Config view, in which case re-entering this tab will refresh.
        if (this.hosts.length === 0 && !this.loadingHosts) await this.loadHosts();
      },

      async loadHosts() {
        this.loadingHosts = true;
        try {
          const r = await fetch(Alpine.store('dbx').api('/config'));
          if (!r.ok) { this.hosts = []; return; }
          const cfg = await r.json();
          this.hosts = this.parseHosts(cfg);
          if (!this.form.host && this.hosts.length > 0) this.form.host = this.hosts[0].alias;
        } catch (e) {
          this.hosts = [];
        } finally {
          this.loadingHosts = false;
        }
      },

      // config.json shape: `hosts` is an OBJECT keyed by alias (e.g.
      // {"prod-mysql": {"type":"mysql","databases":{"b2b":{...}}}}).
      // `databases` is the same — keyed by db name. Tolerate the
      // array-of-objects shape too in case someone has a hand-edited
      // config from an older / informal source.
      parseHosts(cfg) {
        const out = [];
        const hosts = cfg && cfg.hosts;
        if (hosts && typeof hosts === 'object' && !Array.isArray(hosts)) {
          for (const [alias, h] of Object.entries(hosts)) {
            if (!h || typeof h !== 'object') continue;
            out.push({ alias, flavor: h.type || h.flavor || '', databases: this.extractDbs(h.databases) });
          }
        } else if (Array.isArray(hosts)) {
          for (const h of hosts) {
            if (!h || typeof h !== 'object' || !h.alias) continue;
            out.push({ alias: h.alias, flavor: h.type || h.flavor || '', databases: this.extractDbs(h.databases) });
          }
        }
        return out;
      },

      extractDbs(dbs) {
        if (Array.isArray(dbs)) return dbs.filter(d => typeof d === 'string');
        if (dbs && typeof dbs === 'object') return Object.keys(dbs);
        return [];
      },

      onHostChange() {
        // When the host changes, clear database so the user explicitly
        // re-picks instead of carrying over a value that doesn't apply
        // (e.g. mysql db name on a postgres host).
        this.form.database = '';
      },

      databasesForSelected() {
        const h = this.hosts.find(h => h.alias === this.form.host);
        return h ? h.databases : [];
      },

      buildBody() {
        const body = { host: this.form.host };
        if (this.form.database) body.database = this.form.database;
        if (this.form.verbose) body.verbose = true;
        if (this.form.upload)  body.upload = true;
        return body;
      },

      async start() {
        if (this.running) return;
        if (!this.form.host) { this.status = 'Pick a host first.'; return; }
        this.log = [];
        this.autoFollow = true;
        this.status = 'Starting backup…';
        this.running = true;
        this.startedAt = null;
        this.elapsed = 0;
        this.stopTicker();
        try {
          const r = await fetch(Alpine.store('dbx').api('/backup'), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(this.buildBody()),
          });
          if (!r.ok) {
            const err = await r.json().catch(() => ({ error: `HTTP ${r.status}` }));
            this.status = `Failed to start: ${err.error || r.status}`;
            this.running = false;
            return;
          }
          const { job_id } = await r.json();
          this.jobId = job_id;
          try { localStorage.setItem('dbx:job:backup', job_id); } catch (e) {}
          this.startedAt = Date.now();
          this.startTicker();
          this.attachStream(job_id);
        } catch (e) {
          this.status = `Network error: ${e}`;
          this.running = false;
        }
      },

      startTicker() {
        this.stopTicker();
        this.elapsed = Math.floor((Date.now() - this.startedAt) / 1000);
        this.tickHandle = setInterval(() => {
          if (!this.startedAt) return;
          this.elapsed = Math.floor((Date.now() - this.startedAt) / 1000);
        }, 1000);
      },

      stopTicker() {
        if (this.tickHandle != null) {
          clearInterval(this.tickHandle);
          this.tickHandle = null;
        }
      },

      formatElapsed(secs) {
        if (!Number.isFinite(secs) || secs < 0) return '0s';
        const s = Math.floor(secs);
        if (s < 60) return s + 's';
        if (s < 3600) return Math.floor(s / 60) + 'm ' + (s % 60) + 's';
        const h = Math.floor(s / 3600);
        const rem = s % 3600;
        return h + 'h ' + Math.floor(rem / 60) + 'm ' + (rem % 60) + 's';
      },

      attachStream(jobId) {
        const url = Alpine.store('dbx').api(`/jobs/${jobId}/events`);
        const es = new EventSource(url);
        this.eventSource = es;
        es.onmessage = (ev) => {
          try {
            const { line } = JSON.parse(ev.data);
            if (line !== undefined) {
              this.log.push(line);
              if (this.log.length > this.maxLogLines) {
                this.log.splice(0, this.log.length - this.maxLogLines);
              }
              if (this.autoFollow) this.scrollLogToBottom();
            }
          } catch (e) { /* ignore */ }
        };
        es.addEventListener('done', (ev) => {
          try {
            const { exit_code } = JSON.parse(ev.data);
            this.exitCode = exit_code;
            this.status = exit_code === 0
              ? 'Backup completed successfully.'
              : `Backup failed (exit ${exit_code}).`;
          } catch (e) {
            this.status = 'Backup finished (unknown exit code).';
          } finally {
            this.running = false;
            if (this.startedAt) {
              this.elapsed = Math.floor((Date.now() - this.startedAt) / 1000);
            }
            this.stopTicker();
            try { localStorage.removeItem('dbx:job:backup'); } catch (e) {}
            es.close();
            this.eventSource = null;
          }
        });
        es.onerror = () => {
          // readyState CLOSED = the server failed the stream outright (e.g. a
          // stale job id after a server restart) and the browser won't retry —
          // stop and drop the saved id. CONNECTING = a transient drop the
          // browser is already retrying, so leave a live job alone.
          if (es.readyState === EventSource.CLOSED) {
            this.running = false;
            this.stopTicker();
            es.close();
            this.eventSource = null;
            try { localStorage.removeItem('dbx:job:backup'); } catch (e) {}
            if (this.log.length === 0) this.status = 'No running backup to resume.';
          } else if (!this.running) {
            es.close();
            this.eventSource = null;
          }
        };
      },

      async cancel() {
        if (!this.jobId) return;
        try {
          await fetch(Alpine.store('dbx').api(`/jobs/${this.jobId}/cancel`), { method: 'POST' });
        } catch (e) { /* swallow */ }
      },

      // Pin/unpin the log tail. When the user scrolls up to read, stop
      // auto-following; when they scroll back to the bottom, resume. 24px of
      // slack so it still counts as "at bottom" mid-render.
      onLogScroll() {
        const el = this.$refs.logEl;
        if (!el) return;
        this.autoFollow = (el.scrollHeight - el.scrollTop - el.clientHeight) < 24;
      },

      scrollLogToBottom() {
        // Defer until Alpine has rendered the appended line(s).
        this.$nextTick(() => {
          const el = this.$refs.logEl;
          if (el) el.scrollTop = el.scrollHeight;
        });
      },

      clearLog() {
        this.log = [];
        this.autoFollow = true;
        this.status = '';
        this.exitCode = null;
        this.startedAt = null;
        this.elapsed = 0;
        this.stopTicker();
      },
    };
  }
</script>
