name: Docs

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - mkdocs.yml
      # The config-builder page includes lib/wizard-form.html via
      # pymdownx.snippets — changes there must also trigger a rebuild.
      - lib/wizard-form.html
      - .github/workflows/docs.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one in-flight deployment; cancel queued ones (don't cancel an
# in-progress run so it can finish cleanly).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install mkdocs-material
        run: pip install -r docs/requirements.txt

      - name: Build (strict)
        env:
          # PostHog project key (public — designed to be exposed client-side).
          # Lives as a repo variable so we don't commit it to YAML; empty
          # means analytics snippet is skipped (PR / fork builds, etc).
          POSTHOG_API_KEY: ${{ vars.POSTHOG_API_KEY }}
        run: mkdocs build --strict --site-dir _site

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
