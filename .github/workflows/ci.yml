name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege GITHUB_TOKEN: CI only reads the repo. Overridable per-job if a
# future job needs more (e.g. packages: write).
permissions:
  contents: read

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # v2.0.0
        with:
          scandir: '.'
          severity: error
          additional_files: 'dbx'
          check_together: 'yes'

  test-install:
    name: Test Install
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y jq zstd

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install jq zstd

      - name: Test install script (local)
        run: |
          # Test local install (not curl)
          mkdir -p ~/.local/bin ~/.local/lib/dbx
          cp dbx ~/.local/bin/
          cp lib/*.sh ~/.local/lib/dbx/
          sed -i.bak 's|LIB_DIR="$SCRIPT_DIR/lib"|LIB_DIR="$HOME/.local/lib/dbx"|' ~/.local/bin/dbx || \
            sed -i '' 's|LIB_DIR="$SCRIPT_DIR/lib"|LIB_DIR="$HOME/.local/lib/dbx"|' ~/.local/bin/dbx
          chmod +x ~/.local/bin/dbx

      - name: Verify dbx runs
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          dbx help

      - name: Test config init
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          dbx config init
          test -f ~/.config/dbx/config.json

  test-syntax:
    name: Bash Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check bash syntax
        run: |
          bash -n dbx
          for f in lib/*.sh; do
            bash -n "$f"
          done

  release-consistency:
    name: Release consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Fails the PR if install.sh's MAN_PAGES / lib lists drift from the files
      # on disk, or if any man-page .TH version != VERSION in dbx. Catches the
      # desync class that shipped dbx-build-image.1 broken (#122, #147).
      - name: Check release-synchronized files are in sync
        run: bash scripts/check-release-consistency.sh

  ruff:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Pinned so a ruff release can't turn main red without a deliberate bump.
      # Config (scope + rules) lives in pyproject.toml; format-check is omitted
      # on purpose — see the comment there.
      - name: Install ruff
        run: pip install ruff==0.15.14

      - name: Run ruff check
        run: ruff check

  unit-tests:
    name: Unit tests (bats)
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bats jq zstd

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install bats-core jq zstd

      - name: Run unit tests
        run: bats tests/unit/

  integration-tests:
    name: Integration tests (docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y bats jq zstd age

      - name: Run integration tests
        run: bats tests/integration/

  docker-image:
    name: Build container image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Build-only (no push) so a broken Dockerfile fails the PR. The release
      # publish (multi-arch → GHCR) lives in release-image.yml, on tags.
      - name: Build image
        run: docker build -f docker/Dockerfile -t dbx:ci .

      - name: Smoke test (version prints, libs resolve)
        run: |
          version=$(docker run --rm dbx:ci version)
          echo "$version"
          echo "$version" | grep -qE '^dbx [0-9]+\.[0-9]+\.[0-9]+$'
          docker run --rm dbx:ci --help >/dev/null
